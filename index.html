function ServicosPage({ data, setData }) {
  const blankSvc={name:"",description:"",color:"#6366f1",status:"todo",priority:"media",recurrence:"",defaultDue:"",mesInicio:"",sector:"",assignees:[],labels:[],checklist:[]};
  const [open,setOpen]=useState(false);
  const [editing,setEditing]=useState(null);
  const [form,setForm]=useState(blankSvc);
  const [tab,setTab]=useState("geral");
  const [ckTxt,setCkTxt]=useState("");
  const [viewSvc,setViewSvc]=useState(null); // serviço cujas tarefas estão sendo visualizadas
  const [toast2,setToast2]=useState(null);
  const showToast=(msg,t="ok")=>{setToast2({msg,t});setTimeout(()=>setToast2(null),3000);};

  const openNew=()=>{setEditing(null);setForm(blankSvc);setTab("geral");setCkTxt("");setOpen(true);};
  const openEdit=(s)=>{setEditing(s);setForm({...blankSvc,...s,assignees:toArr(s.assignees),labels:toArr(s.labels),checklist:toArr(s.checklist)});setTab("geral");setCkTxt("");setOpen(true);};
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const tog=(k,id)=>setForm(f=>({...f,[k]:toArr(f[k]).includes(id)?toArr(f[k]).filter(x=>x!==id):[...toArr(f[k]),id]}));
  const addCk=()=>{if(!ckTxt.trim())return;set("checklist",[...toArr(form.checklist),{id:uid(),text:ckTxt.trim(),done:false}]);setCkTxt("");};
  const {ask:askDel,modal:delModal}=useConfirmDelete();

  // Gera tarefas para um serviço numa empresa específica
  const gerarTarefas=(svc,coId)=>{
    const rec=data.recurrences.find(r=>r.id===svc.recurrence);
    const existing=data.tasks.filter(t=>t._serviceId===svc.id&&t.company===coId&&t.status!=="archived");
    if(existing.length>0){
      if(!window.confirm(`Já existem ${existing.length} tarefa(s) ativa(s) deste serviço para esta empresa. Gerar mais mesmo assim?`)) return 0;
    }
    const base={
      id:uid(),title:svc.name,description:svc.description||"",
      status:svc.status||"todo",priority:svc.priority||"media",
      company:coId,sector:svc.sector||"",
      assignees:toArr(svc.assignees),labels:toArr(svc.labels),
      checklist:toArr(svc.checklist).map(ck=>({...ck,id:uid(),done:false})),
      dependencies:[],recurrence:"",
      dueDate:svc.defaultDue||"",
      createdAt:todayStr(),completedAt:null,archivedAt:null,
      _serviceId:svc.id,
    };
    const startDate=svc.mesInicio?new Date(svc.mesInicio+"-01T00:00:00"):new Date();
    startDate.setHours(0,0,0,0);
    const endDate=new Date(startDate);endDate.setMonth(startDate.getMonth()+3);
    const tasks=[];
    const gId=base.id;
    const recId=svc.recurrence;
    const push=(ds)=>tasks.push({...base,id:uid(),dueDate:ds,_recGroup:gId,_recurrenceId:recId,checklist:toArr(svc.checklist).map(ck=>({...ck,id:uid(),done:false}))});
    if(rec){
      if(rec.interval==="monthly"){
        const td=svc.defaultDue?new Date(svc.defaultDue+"T12:00:00").getDate():1;
        for(let m=0;m<4;m++){const d=new Date(startDate.getFullYear(),startDate.getMonth()+m,td);if(d>=startDate)push(d.toISOString().slice(0,10));}
      } else if(rec.interval==="lastday"){
        for(let m=0;m<4;m++){const d=new Date(startDate.getFullYear(),startDate.getMonth()+m+1,0);if(d>=startDate)push(d.toISOString().slice(0,10));}
      } else if(rec.interval==="quarterly"){
        for(let q=0;q<4;q++){const d=new Date(startDate.getFullYear(),startDate.getMonth()+q*3,svc.defaultDue?new Date(svc.defaultDue+"T12:00:00").getDate():1);if(d>=startDate)push(d.toISOString().slice(0,10));}
      } else if(rec.interval==="custom_days"&&Array.isArray(rec.days)&&rec.days.length>0){
        for(let d=new Date(startDate);d<=endDate;d.setDate(d.getDate()+1)){if(rec.days.includes(d.getDay()))push(d.toISOString().slice(0,10));}
      } else if(rec.interval==="weekly"){
        const tdow=svc.defaultDue?new Date(svc.defaultDue+"T12:00:00").getDay():1;
        for(let d=new Date(startDate);d<=endDate;d.setDate(d.getDate()+1)){if(d.getDay()===tdow)push(d.toISOString().slice(0,10));}
      } else if(rec.interval==="biweekly"){
        const tdow=svc.defaultDue?new Date(svc.defaultDue+"T12:00:00").getDay():1;
        let cnt=0;
        for(let d=new Date(startDate);d<=endDate;d.setDate(d.getDate()+1)){if(d.getDay()===tdow){if(cnt%2===0)push(d.toISOString().slice(0,10));cnt++;}}
      } else if(rec.interval==="daily"){
        const ed28=new Date(startDate);ed28.setDate(startDate.getDate()+28);
        for(let d=new Date(startDate);d<=ed28;d.setDate(d.getDate()+1))push(d.toISOString().slice(0,10));
      } else if(rec.interval==="yearly"){
        if(svc.defaultDue){const d=new Date(svc.defaultDue+"T12:00:00");push(new Date(startDate.getFullYear(),d.getMonth(),d.getDate()).toISOString().slice(0,10));}
      }
    } else {
      tasks.push(base);
    }
    if(tasks.length>0) setData(d=>({...d,tasks:[...d.tasks,...tasks]}));
    return tasks.length;
  };

  // Duplicar serviço para outra empresa
  const duplicarParaEmpresa=(svc)=>{
    const opts=data.companies.filter(co=>!toArr(co.services).includes(svc.id));
    if(opts.length===0){showToast("Este serviço já está em todas as empresas.","warn");return;}
    const names=opts.map((co,i)=>(i+1)+". "+co.name).join("\n");
    const idx=window.prompt("Escolha a empresa (número):\n"+names);
    const n=parseInt(idx)-1;
    if(isNaN(n)||!opts[n]) return;
    const co=opts[n];
    // Vincular serviço à empresa
    setData(d=>({...d,companies:d.companies.map(c=>c.id===co.id?{...c,services:[...toArr(c.services),svc.id]}:c)}));
    // Gerar tarefas
    const count=gerarTarefas(svc,co.id);
    showToast(`✦ Serviço vinculado a ${co.name}. ${count} tarefa(s) gerada(s).`,"ok");
  };

  const save=()=>{
    if(!form.name.trim())return;
    const svc={...form,checklist:toArr(form.checklist),assignees:toArr(form.assignees),labels:toArr(form.labels)};
    if(editing){
      const affectedTasks=data.tasks.filter(t=>t._serviceId===editing.id&&t.status!=="archived"&&t.status!=="done");
      const propagate=affectedTasks.length===0||window.confirm(
        `Este serviço está vinculado a ${affectedTasks.length} tarefa(s) ativa(s).\n\nDeseja propagar as alterações (título, checklist, responsáveis, prioridade) para todas as tarefas pendentes?\n\nOK = Propagar | Cancelar = Salvar só o serviço`
      );
      setData(d=>{
        const services=d.services.map(s=>s.id===editing.id?{...s,...svc}:s);
        const tasks=propagate?d.tasks.map(t=>{
          if(t._serviceId!==editing.id||t.status==="archived"||t.status==="done") return t;
          // Preserve checked items if checklist was modified; replace only undone items
          const newCk=toArr(svc.checklist).map(ck=>{
            const existing=t.checklist.find(x=>x.text===ck.text||x.id===ck.id);
            return existing?{...ck,done:existing.done}:{...ck,id:uid(),done:false};
          });
          return {...t,title:svc.name,description:svc.description||t.description,priority:svc.priority||t.priority,
            sector:svc.sector||t.sector,assignees:toArr(svc.assignees).length>0?toArr(svc.assignees):t.assignees,
            labels:toArr(svc.labels).length>0?toArr(svc.labels):t.labels,
            checklist:newCk,
          };
        }):d.tasks;
        return {...d,services,tasks};
      });
    } else {
      setData(d=>({...d,services:[...(d.services||[]),{id:uid(),...svc}]}));
    }
    setOpen(false);
    showToast(editing?"✦ Serviço e tarefas atualizados!":"✦ Serviço criado!","ok");
  };

  const del=(id)=>{const item=(data.services||[]).find(x=>x.id===id);askDel(`Serviço: "${item?.name||""}"`,()=>setData(d=>({...d,services:d.services.filter(s=>s.id!==id)})));};
  const tabSt=(t)=>({padding:"7px 16px",border:"none",borderRadius:9,cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:"inherit",transition:"all .12s",background:tab===t?"#6366f1":"#f1f5f9",color:tab===t?"#fff":"#64748b"});

  return (
    <div>
      {toast2&&<div style={{position:"fixed",top:16,right:16,zIndex:9999,padding:"10px 18px",borderRadius:10,background:toast2.t==="ok"?"#22c55e":"#f59e0b",color:"#fff",fontWeight:700,fontSize:13,boxShadow:"0 4px 16px rgba(0,0,0,.2)"}}>{toast2.msg}</div>}
      <PH title="Serviços" icon="S" badge={(data.services||[]).length} action={<Btn onClick={openNew}>+ Novo Serviço</Btn>}/>
      <p style={{fontSize:13,color:"#64748b",marginBottom:16}}>Modelos de tarefa com checklist, responsáveis e recorrência. Vincule a empresas para gerar tarefas automaticamente.</p>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:14}}>
        {(data.services||[]).map(s=>{
          const rec=data.recurrences.find(r=>r.id===s.recurrence);
          const usedBy=data.companies.filter(c=>toArr(c.services).includes(s.id));
          const activeTasks=data.tasks.filter(t=>t._serviceId===s.id&&t.status!=="archived");
          const doneTasks=activeTasks.filter(t=>t.status==="done");
          const pendTasks=activeTasks.filter(t=>t.status!=="done");
          const ck=toArr(s.checklist);
          const asg=data.collaborators.filter(c=>toArr(s.assignees).includes(c.id));
          const lbs=data.labels.filter(l=>toArr(s.labels).includes(l.id));
          const pri=PRI[s.priority]||PRI.media;
          return (
            <div key={s.id} style={{background:"var(--bg2)",borderRadius:14,padding:18,border:"1px solid var(--border)",boxShadow:"0 2px 8px rgba(0,0,0,.06)",display:"flex",flexDirection:"column",gap:10}}>
              {/* Header */}
              <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
                <div style={{width:40,height:40,borderRadius:10,background:(s.color||"#6366f1")+"18",border:"2px solid "+(s.color||"#6366f1")+"44",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:900,color:s.color||"#6366f1",flexShrink:0}}>S</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:900,fontSize:14,color:"var(--text)",marginBottom:2}}>{s.name}</div>
                  {s.description&&<div style={{fontSize:11,color:"#94a3b8",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.description}</div>}
                </div>
              </div>
              {/* Badges */}
              <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                <span style={{fontSize:10,padding:"2px 7px",borderRadius:20,background:pri.bg,color:pri.t,fontWeight:700}}>{pri.l}</span>
                {rec&&<span style={{fontSize:10,padding:"2px 7px",borderRadius:20,background:"#6366f118",color:"#6366f1",fontWeight:700}}>↻ {rec.name}</span>}
                {s.defaultDue&&<span style={{fontSize:10,padding:"2px 7px",borderRadius:20,background:"#f59e0b18",color:"#f59e0b",fontWeight:700}}>{fmtDate(s.defaultDue)}</span>}
                {lbs.map(l=><span key={l.id} style={{fontSize:10,padding:"2px 7px",borderRadius:20,background:l.color+"18",color:l.color,fontWeight:700}}>{l.name}</span>)}
              </div>
              {/* Contadores de tarefas */}
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                <button onClick={()=>setViewSvc(viewSvc?.id===s.id?null:s)} style={{display:"flex",alignItems:"center",gap:5,padding:"4px 10px",borderRadius:8,border:"1px solid #e2e8f0",background:"var(--bg3)",cursor:"pointer",fontSize:11,fontWeight:700,color:"#64748b",fontFamily:"inherit",transition:"all .15s"}}
                  onMouseEnter={e=>e.currentTarget.style.borderColor="#6366f1"}
                  onMouseLeave={e=>e.currentTarget.style.borderColor="#e2e8f0"}
                >
                  📋 {pendTasks.length} pendente{pendTasks.length!==1?"s":""}
                  {doneTasks.length>0&&<span style={{color:"#22c55e",marginLeft:4}}>✓{doneTasks.length}</span>}
                </button>
                {usedBy.length>0&&<span style={{fontSize:11,color:"#94a3b8",padding:"4px 8px",borderRadius:8,background:"var(--bg3)",border:"1px solid var(--border)"}}>🏢 {usedBy.map(c=>c.name).join(", ")}</span>}
              </div>
              {ck.length>0&&<div style={{fontSize:11,color:"#94a3b8",fontWeight:600}}>☑ {ck.length} item{ck.length!==1?"s":""} no checklist</div>}
              {asg.length>0&&<div style={{display:"flex"}}>{asg.slice(0,5).map((u,i)=><div key={u.id} style={{marginLeft:i>0?-7:0}}><Av initials={u.initials} color={u.color} size={26} title={u.name}/></div>)}{asg.length>5&&<div style={{width:26,height:26,borderRadius:"50%",background:"#f1f5f9",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:"#94a3b8",marginLeft:-7}}>+{asg.length-5}</div>}</div>}
              {/* Ações */}
              <div style={{display:"flex",gap:6,flexWrap:"wrap",paddingTop:4,borderTop:"1px solid var(--border)"}}>
                <Btn onClick={()=>openEdit(s)} v="ghost" sz="sm" xs={{flex:1,justifyContent:"center"}}>✎ Editar</Btn>
                {usedBy.length>0&&(
                  <Btn onClick={()=>{
                    const co=usedBy.length===1?usedBy[0]:usedBy[window.prompt(usedBy.map((c,i)=>`${i+1}. ${c.name}`).join("\n"))-1];
                    if(!co) return;
                    const n=gerarTarefas(s,co.id);
                    showToast(n>0?`↻ ${n} tarefa(s) gerada(s) para ${co.name}!`:"Nenhuma tarefa nova gerada.","ok");
                  }} sz="sm" v="ghost" xs={{color:"#6366f1",borderColor:"#6366f1"}}>↻ Gerar</Btn>
                )}
                <Btn onClick={()=>duplicarParaEmpresa(s)} sz="sm" v="ghost" xs={{fontSize:11}}>⊕ Empresa</Btn>
                <Btn onClick={()=>del(s.id)} v="danger" sz="sm">✕</Btn>
              </div>
            </div>
          );
        })}
      </div>

      {/* Painel de tarefas ativas do serviço selecionado */}
      {viewSvc&&(()=>{
        const svcTasks=data.tasks.filter(t=>t._serviceId===viewSvc.id&&t.status!=="archived");
        const byStatus={todo:svcTasks.filter(t=>t.status==="todo"),doing:svcTasks.filter(t=>t.status==="doing"),review:svcTasks.filter(t=>t.status==="review"),done:svcTasks.filter(t=>t.status==="done")};
        return(
          <div style={{marginTop:20,background:"var(--bg2)",borderRadius:14,padding:20,border:"1px solid var(--border)",boxShadow:"0 2px 8px rgba(0,0,0,.06)"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
              <h3 style={{fontSize:14,fontWeight:900,color:"var(--text)",margin:0}}>📋 Tarefas ativas — {viewSvc.name}</h3>
              <button onClick={()=>setViewSvc(null)} style={{background:"none",border:"none",cursor:"pointer",color:"#94a3b8",fontSize:18,lineHeight:1}}>✕</button>
            </div>
            <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
              {Object.entries(byStatus).map(([st,ts])=>{
                const s=STS.find(x=>x.id===st);
                return <div key={st} style={{padding:"4px 12px",borderRadius:20,fontSize:12,fontWeight:700,background:s.c+"18",color:s.c}}>{s.l}: {ts.length}</div>;
              })}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:8,maxHeight:340,overflowY:"auto"}}>
              {svcTasks.length===0&&<div style={{color:"#94a3b8",fontSize:13,padding:"20px 0"}}>Nenhuma tarefa ativa.</div>}
              {svcTasks.sort((a,b)=>(a.dueDate||"").localeCompare(b.dueDate||"")).map(t=>{
                const st=STS.find(x=>x.id===t.status)||STS[0];
                const co=(taskCompanies(t).map(id=>data.companies.find(c=>c.id===id)).filter(Boolean))[0]||null;
                const over=isLate(t);
                return(
                  <div key={t.id} style={{padding:"10px 12px",borderRadius:10,border:"1px solid var(--border)",background:"var(--bg3)",display:"flex",flexDirection:"column",gap:4}}>
                    <div style={{fontSize:12,fontWeight:800,color:"var(--text)",lineHeight:1.3}}>{t.title}</div>
                    <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>
                      <span style={{fontSize:10,padding:"1px 6px",borderRadius:10,background:st.c+"18",color:st.c,fontWeight:700}}>{st.l}</span>
                      {t.dueDate&&<span style={{fontSize:10,color:over?"#ef4444":"#94a3b8",fontWeight:over?700:400}}>📅 {fmtDate(t.dueDate)}</span>}
                      {co&&<span style={{fontSize:10,color:co.color,fontWeight:700}}>{co.logo}</span>}
                    </div>
                    {t.checklist?.length>0&&(
                      <div style={{height:3,borderRadius:2,background:"#f1f5f9",overflow:"hidden"}}>
                        <div style={{width:`${Math.round((t.checklist.filter(x=>x.done).length/t.checklist.length)*100)}%`,height:"100%",background:"#6366f1",borderRadius:2}}/>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        );
      })()}

      {/* Modal de edição */}
      <Modal open={open} onClose={()=>setOpen(false)} title={editing?"Editar Serviço":"Novo Serviço"} width={640}>
        <div style={{display:"flex",gap:6,marginBottom:18,flexWrap:"wrap"}}>
          {[["geral","Geral"],["responsaveis","Responsáveis"],["checklist","Checklist"],["config","Recorrência"]].map(([t,l])=>(
            <button key={t} style={tabSt(t)} onClick={()=>setTab(t)}>{l}</button>
          ))}
        </div>
        {tab==="geral"&&<div style={{display:"flex",flexDirection:"column",gap:13}}>
          <Inp label="Nome do Serviço *" value={form.name} onChange={v=>set("name",v)} placeholder="Ex: Folha de Pagamento"/>
          <Txt label="Descrição / Instruções" value={form.description} onChange={v=>set("description",v)} placeholder="Descreva o serviço e instruções para execução..." rows={3}/>
          <div className="g2">
            <Sel label="Prioridade" value={form.priority} onChange={v=>set("priority",v)} options={Object.entries(PRI).map(([k,v])=>({value:k,label:v.l}))}/>
            <Sel label="Status inicial" value={form.status} onChange={v=>set("status",v)} options={getFullSTS(data.customStatuses).filter(s=>s.id!=="archived").map(s=>({value:s.id,label:s.l}))}/>
          </div>
          <Sel label="Setor padrão" value={form.sector||""} onChange={v=>set("sector",v)} placeholder="Nenhum" options={data.sectors.map(s=>({value:s.id,label:s.name}))}/>
          <Fld label="Marcadores padrão">
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
              {data.labels.map(l=>{const sel=toArr(form.labels).includes(l.id);return(
                <button key={l.id} onClick={()=>tog("labels",l.id)} style={{padding:"3px 10px",borderRadius:20,cursor:"pointer",fontSize:12,fontWeight:700,border:"2px solid "+(sel?l.color:"#e5e7eb"),background:sel?l.color+"18":"#f9fafb",color:sel?l.color:"#6b7280",fontFamily:"inherit"}}>{l.name}</button>
              );})}
            </div>
          </Fld>
          <CPick value={form.color} onChange={v=>set("color",v)}/>
        </div>}
        {tab==="responsaveis"&&<div style={{display:"flex",flexDirection:"column",gap:14}}>
          <p style={{fontSize:12,color:"#64748b"}}>Responsáveis padrão que serão atribuídos ao gerar a tarefa.</p>
          {data.collaborators.length===0
            ?<p style={{fontSize:13,color:"#94a3b8"}}>Nenhum colaborador cadastrado.</p>
            :<div style={{display:"flex",flexWrap:"wrap",gap:8}}>
              {data.collaborators.map(u=>{const sel=toArr(form.assignees).includes(u.id);return(
                <button key={u.id} onClick={()=>tog("assignees",u.id)} style={{display:"flex",alignItems:"center",gap:7,padding:"6px 12px 6px 6px",borderRadius:22,border:"2px solid "+(sel?u.color:"#e5e7eb"),background:sel?u.color+"18":"#f9fafb",color:sel?u.color:"#6b7280",cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:"inherit",transition:"all .12s"}}>
                  <Av initials={u.initials} color={u.color} size={26}/>{u.name}
                </button>
              );})}
            </div>
          }
        </div>}
        {tab==="checklist"&&<div style={{display:"flex",flexDirection:"column",gap:12}}>
          <p style={{fontSize:12,color:"#64748b"}}>Itens de checklist que toda tarefa gerada por este serviço terá.</p>
          <div style={{display:"flex",gap:8}}>
            <input value={ckTxt} onChange={e=>setCkTxt(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addCk()} placeholder="Novo item... (Enter para adicionar)" style={{flex:1,padding:"8px 13px",borderRadius:9,fontSize:13,border:"2px solid #e5e7eb",outline:"none",fontFamily:"inherit"}}/>
            <Btn onClick={addCk} sz="sm">+ Add</Btn>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:5,maxHeight:320,overflowY:"auto"}}>
            {toArr(form.checklist).length===0&&<div style={{padding:"24px",textAlign:"center",color:"#cbd5e1",fontSize:13,border:"2px dashed #f1f5f9",borderRadius:10}}>Nenhum item ainda.</div>}
            {toArr(form.checklist).map((ck,idx)=>(
              <div key={ck.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",borderRadius:9,background:"var(--bg4)",border:"1px solid #f3f4f6"}}>
                <span style={{width:22,height:22,borderRadius:6,border:"2px solid #e5e7eb",background:"var(--bg2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:"#94a3b8",flexShrink:0}}>{idx+1}</span>
                <span style={{flex:1,fontSize:13,color:"#374151"}}>{ck.text}</span>
                <button onClick={()=>set("checklist",toArr(form.checklist).filter(x=>x.id!==ck.id))} style={{background:"none",border:"none",cursor:"pointer",color:"#cbd5e1",fontSize:18,lineHeight:1,padding:"0 3px"}}>✕</button>
              </div>
            ))}
          </div>
        </div>}
        {tab==="config"&&<div style={{display:"flex",flexDirection:"column",gap:14}}>
          <Sel label="Recorrência padrão" value={form.recurrence||""} onChange={v=>set("recurrence",v)} placeholder="Sem recorrência" options={data.recurrences.map(r=>({value:r.id,label:r.name}))}/>
          <div className="g2">
            <Inp label="Mês de início" value={form.mesInicio||""} onChange={v=>set("mesInicio",v)} type="month" hint="Mês em que a recorrência inicia"/>
            <Inp label="Vencimento padrão" value={form.defaultDue||""} onChange={v=>set("defaultDue",v)} type="date" hint="Data de vencimento da primeira ocorrência"/>
          </div>
          <div style={{padding:"14px",background:"var(--bg3)",borderRadius:10,fontSize:12,color:"#64748b",lineHeight:1.7,border:"1px solid var(--border)"}}>
            <strong style={{color:"var(--text)",display:"block",marginBottom:6}}>Como funciona:</strong>
            1. Preencha todas as abas (Geral, Responsáveis, Checklist, Recorrência).<br/>
            2. Vá em <strong>Empresas</strong>, abra a aba Serviços e marque este serviço — as tarefas são geradas automaticamente.<br/>
            3. Ou use o botão <strong>↻ Gerar</strong> no card do serviço para gerar tarefas manualmente.<br/>
            4. Use <strong>⊕ Empresa</strong> para vincular a uma nova empresa e já gerar as tarefas.
          </div>
        </div>}
        <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:20,paddingTop:14,borderTop:"1px solid #f1f5f9"}}>
          <Btn onClick={()=>setOpen(false)} v="ghost">Cancelar</Btn>
          <Btn onClick={save}>Salvar Serviço</Btn>
        </div>
      </Modal>
      {delModal}
    </div>
  );
}

function TemplatesPage({ data, setData, onUseTemplate }) {
  const [open,setOpen]=useState(false);
  const [editing,setEditing]=useState(null);
  const [form,setForm]=useState({name:"",description:"",labels:[],checklist:[],recurrence:""});
  const [ckInput,setCkInput]=useState("");
  const openNew=()=>{setEditing(null);setForm({name:"",description:"",labels:[],checklist:[],recurrence:""});setCkInput("");setOpen(true);};
  const openEdit=(t)=>{setEditing(t);setForm({name:t.name,description:t.description,labels:[...t.labels],checklist:[...t.checklist],recurrence:t.recurrence||""});setCkInput("");setOpen(true);};
  const save=()=>{
    if(!form.name.trim())return;
    if(editing) setData(d=>({...d,taskTemplates:d.taskTemplates.map(t=>t.id===editing.id?{...t,...form}:t)}));
    else setData(d=>({...d,taskTemplates:[...d.taskTemplates,{id:uid(),...form}]}));
    setOpen(false);
  };
  const {ask:askDel,modal:delModal}=useConfirmDelete();
  const del=(id)=>{const item=data.taskTemplates.find(x=>x.id===id);askDel(`Modelo: "${item?.name||""}"`,()=>setData(d=>({...d,taskTemplates:d.taskTemplates.filter(t=>t.id!==id)})));};
  const addCk=()=>{if(!ckInput.trim())return;setForm(f=>({...f,checklist:[...f.checklist,ckInput.trim()]}));setCkInput("");};
  const toggleL=(id)=>setForm(f=>({...f,labels:f.labels.includes(id)?f.labels.filter(x=>x!==id):[...f.labels,id]}));

  return (
    <div>
      <PH title="Modelos de Tarefa" icon="◧" badge={data.taskTemplates.length} action={<Btn onClick={openNew}>+ Novo Modelo</Btn>}/>
      <div className="g-templates" style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))",gap:14}}>
        {data.taskTemplates.map(t=>{
          const labels=data.labels.filter(l=>t.labels.includes(l.id));
          const rec=t.recurrence?data.recurrences.find(r=>r.id===t.recurrence):null;
          return (
            <div key={t.id} style={{background:"var(--bg2)",borderRadius:16,padding:20,border:"1px solid var(--border)",boxShadow:"0 2px 8px rgba(0,0,0,.06)"}}>
              <div style={{display:"flex",gap:5,marginBottom:10,flexWrap:"wrap"}}>
                {labels.map(l=><Chip key={l.id} label={l.name} color={l.color}/>)}
                {rec&&<span style={{fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:20,background:"#f0fdf4",color:"#14b8a6"}}>↻ {rec.name}</span>}
              </div>
              <div style={{fontWeight:900,fontSize:15,color:"#0f172a",marginBottom:6}}>{t.name}</div>
              <p style={{fontSize:12,color:"#94a3b8",marginBottom:14,lineHeight:1.5}}>{t.description}</p>
              <div style={{marginBottom:14}}>
                <div style={{fontSize:11,fontWeight:700,color:"#64748b",marginBottom:6}}>CHECKLIST ({t.checklist.length} itens)</div>
                {t.checklist.slice(0,4).map((c,i)=>(
                  <div key={i} style={{display:"flex",alignItems:"center",gap:7,fontSize:12,color:"#6b7280",marginBottom:3}}>
                    <span style={{width:5,height:5,borderRadius:"50%",background:"#cbd5e1",flexShrink:0}}/> {c}
                  </div>
                ))}
                {t.checklist.length>4&&<div style={{fontSize:11,color:"#94a3b8"}}>+{t.checklist.length-4} itens</div>}
              </div>
              <div style={{display:"flex",gap:7}}>
                <Btn onClick={()=>onUseTemplate(t)} sz="sm" xs={{flex:1,justifyContent:"center"}}>▶ Usar Modelo</Btn>
                <Btn onClick={()=>openEdit(t)} v="ghost" sz="sm">✎</Btn>
                <Btn onClick={()=>del(t.id)} v="danger" sz="sm">×</Btn>
              </div>
            </div>
          );
        })}
      </div>
      <Modal open={open} onClose={()=>setOpen(false)} title={editing?"Editar Modelo":"Novo Modelo"} width={560}>
        <div style={{display:"flex",flexDirection:"column",gap:16}}>
          <Inp label="Nome *" value={form.name} onChange={v=>setForm(f=>({...f,name:v}))} placeholder="Nome do modelo"/>
          <Txt label="Descrição" value={form.description} onChange={v=>setForm(f=>({...f,description:v}))} placeholder="Descreva o modelo..."/>
          <Sel label="Recorrência padrão" value={form.recurrence||""} onChange={v=>setForm(f=>({...f,recurrence:v}))} placeholder="Sem recorrência" options={data.recurrences.map(r=>({value:r.id,label:r.name}))}/>
          <Fld label="Marcadores padrão">
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {data.labels.map(l=>{
                const sel=form.labels.includes(l.id);
                return <button key={l.id} onClick={()=>toggleL(l.id)} style={{padding:"3px 11px",borderRadius:20,cursor:"pointer",fontSize:12,fontWeight:700,border:`2px solid ${sel?l.color:"#e5e7eb"}`,background:sel?l.color+"18":"#f9fafb",color:sel?l.color:"#6b7280",fontFamily:"inherit",transition:"all .12s"}}>{l.name}</button>;
              })}
            </div>
          </Fld>
          <Fld label="Checklist padrão">
            <div style={{display:"flex",gap:8,marginBottom:8}}>
              <input value={ckInput} onChange={e=>setCkInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addCk()} placeholder="Adicionar item (Enter)..." style={{flex:1,padding:"7px 12px",borderRadius:9,fontSize:13,border:"2px solid #e5e7eb",outline:"none",fontFamily:"inherit"}}/>
              <Btn onClick={addCk} sz="sm">+</Btn>
            </div>
            {form.checklist.map((c,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",borderRadius:8,background:"var(--bg4)",marginBottom:4}}>
                <span style={{flex:1,fontSize:13}}>{c}</span>
                <button onClick={()=>setForm(f=>({...f,checklist:f.checklist.filter((_,j)=>j!==i)}))} style={{background:"none",border:"none",cursor:"pointer",color:"#cbd5e1",fontSize:16}}>×</button>
              </div>
            ))}
          </Fld>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
            <Btn onClick={()=>setOpen(false)} v="ghost">Cancelar</Btn>
            <Btn onClick={save}>Salvar Modelo</Btn>
          </div>
        </div>
      </Modal>
      {delModal}
    </div>
  );
}

// ===================================================================
//  PART 6: Dashboard com filtros mensais + gráficos por empresa/colaborador
// ===================================================================

function Dashboard({ data }) {
  const thisMonth = new Date().getMonth();
  const thisYear  = new Date().getFullYear();
  const [fMonth, setFMonth] = useState(thisMonth);
  const [fYear,  setFYear]  = useState(thisYear);
  const [coFilter, setCoFilter] = useState("");
  // mNames alias removed - using MS constant

  const [viewMode, setViewMode] = useState("month"); // month | year
  const [dashTab, setDashTab] = useState("overview"); // overview | colaboradores | setores

  const filteredTasks = useMemo(()=>{
    return data.tasks.filter(t=>{
      if(t.status==="archived") return false;
      if(coFilter && !taskHasCompany(t,coFilter)) return false;
      const dateStr = t.createdAt || t.dueDate || "";
      if(!dateStr) return true; // show tasks without date
      const d = new Date(dateStr+"T12:00:00");
      if(viewMode==="year") return d.getFullYear()===fYear;
      return d.getMonth()===fMonth && d.getFullYear()===fYear;
    });
  },[data.tasks,fMonth,fYear,coFilter,viewMode]);

  const allTasks = coFilter ? data.tasks.filter(t=>t.company===coFilter) : data.tasks;

  const stats = useMemo(()=>{
    const t=filteredTasks;
    const total=t.length;
    const byStatus={};
    STS.forEach(s=>{byStatus[s.id]=t.filter(x=>x.status===s.id).length;});
    const overdue=t.filter(x=>isLate(x)).length;
    const totalCk=t.reduce((a,x)=>a+x.checklist.length,0);
    const doneCk=t.reduce((a,x)=>a+x.checklist.filter(c=>c.done).length,0);
    const faturamento=t.filter(x=>x.status==="done"&&x.valor).reduce((a,x)=>a+Number(x.valor||0),0);
    const aReceber=t.filter(x=>x.status!=="done"&&x.valor).reduce((a,x)=>a+Number(x.valor||0),0);
    return {total,byStatus,overdue,totalCk,doneCk,faturamento,aReceber};
  },[filteredTasks]);

  // Por empresa
  const byCompany = useMemo(()=>data.companies.map(c=>{
    const tasks=filteredTasks.filter(t=>taskHasCompany(t,c.id));
    const done=tasks.filter(t=>t.status==="done").length;
    const doing=tasks.filter(t=>t.status==="doing").length;
    const overdue=tasks.filter(t=>isLate(t)).length;
    const faturamento=tasks.filter(t=>t.status==="done"&&t.valor).reduce((a,t)=>a+Number(t.valor||0),0);
    const aReceber=tasks.filter(t=>t.status!=="done"&&t.valor).reduce((a,t)=>a+Number(t.valor||0),0);
    return {...c,total:tasks.length,done,doing,overdue,faturamento,aReceber};
  }),[filteredTasks,data.companies]);

  // Por colaborador
  const byCollaborator = useMemo(()=>data.collaborators.map(u=>{
    const tasks=filteredTasks.filter(t=>t.assignees.includes(u.id));
    const done=tasks.filter(t=>t.status==="done").length;
    const doing=tasks.filter(t=>t.status==="doing").length;
    const overdue=tasks.filter(t=>isLate(t)).length;
    return {...u,total:tasks.length,done,doing,overdue};
  }).filter(u=>u.total>0),[filteredTasks,data.collaborators]);

  // Por setor
  const bySector = useMemo(()=>data.sectors.map(s=>{
    const tasks=filteredTasks.filter(t=>t.sector===s.id);
    return {...s,total:tasks.length,done:tasks.filter(t=>t.status==="done").length};
  }).filter(s=>s.total>0),[filteredTasks,data.sectors]);

  // Burndown - tarefas concluídas por dia nos últimos 14 dias
  const burndown = useMemo(()=>{
    const days=[];
    for(let i=13;i>=0;i--){
      const d=new Date();d.setDate(d.getDate()-i);d.setHours(0,0,0,0);
      const ds=d.toISOString().slice(0,10);
      const done=data.tasks.filter(t=>t.completedAt&&t.completedAt.slice(0,10)===ds&&(coFilter?t.company===coFilter:true)).length;
      days.push({date:ds,done,label:d.toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"})});
    }
    return days;
  },[data.tasks,coFilter]);

  const maxBurndown=Math.max(1,...burndown.map(d=>d.done));

  // Heatmap - tarefas concluídas por dia nos últimos 12 semanas
  const heatmap = useMemo(()=>{
    const map={};
    data.tasks.forEach(t=>{
      if(t.completedAt&&(coFilter?taskHasCompany(t,coFilter):true)){
        const d=t.completedAt.slice(0,10);
        map[d]=(map[d]||0)+1;
      }
    });
    const weeks=[];
    const now=new Date();now.setHours(0,0,0,0);
    const start=new Date(now);start.setDate(now.getDate()-83); // 12 semanas
    // alinhar ao domingo
    start.setDate(start.getDate()-start.getDay());
    for(let w=0;w<12;w++){
      const week=[];
      for(let d=0;d<7;d++){
        const dt=new Date(start);dt.setDate(start.getDate()+w*7+d);
        const ds=dt.toISOString().slice(0,10);
        week.push({date:ds,count:map[ds]||0,future:dt>now});
      }
      weeks.push(week);
    }
    return weeks;
  },[data.tasks,coFilter]);

  const maxHeat=Math.max(1,...heatmap.flat().map(d=>d.count));
  const heatColor=(c)=>{if(c===0)return"#f1f5f9";const p=c/maxHeat;if(p<.25)return"#bbf7d0";if(p<.5)return"#4ade80";if(p<.75)return"#16a34a";return"#14532d";};

  return (
    <div>
      {/* Filtros de período */}
      <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:24,padding:"14px 18px",background:"var(--bg2)",borderRadius:14,border:"1px solid var(--border)",boxShadow:"0 1px 4px rgba(0,0,0,.05)"}}>
        <span style={{fontSize:13,fontWeight:700,color:"#64748b"}}>📊 Período:</span>
        <div style={{display:"flex",gap:4,background:"#f1f5f9",borderRadius:8,padding:3}}>
          {[["month","Mensal"],["year","Anual"]].map(([v,l])=>(
            <button key={v} onClick={()=>setViewMode(v)} style={{padding:"5px 12px",borderRadius:6,border:"none",cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:700,background:viewMode===v?"#fff":"transparent",color:viewMode===v?"#6366f1":"#64748b",transition:"all .15s"}}>{l}</button>
          ))}
        </div>
        {viewMode==="month" && (
          <select value={fMonth} onChange={e=>setFMonth(Number(e.target.value))} style={{padding:"6px 10px",borderRadius:8,fontSize:13,border:"2px solid #e5e7eb",outline:"none",fontFamily:"inherit",background:"var(--bg2)"}}>
            {MS.map((m,i)=><option key={i} value={i}>{m}</option>)}
          </select>
        )}
        <select value={fYear} onChange={e=>setFYear(Number(e.target.value))} style={{padding:"6px 10px",borderRadius:8,fontSize:13,border:"2px solid #e5e7eb",outline:"none",fontFamily:"inherit",background:"var(--bg2)"}}>
          {[2024,2025,2026,2027,2028].map(y=><option key={y} value={y}>{y}</option>)}
        </select>
        <select value={coFilter} onChange={e=>setCoFilter(e.target.value)} style={{padding:"6px 10px",borderRadius:8,fontSize:13,border:"2px solid #e5e7eb",outline:"none",fontFamily:"inherit",background:"var(--bg2)"}}>
          <option value="">Todas as empresas</option>
          {data.companies.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
        </select>
        <span style={{fontSize:12,color:"#94a3b8",marginLeft:"auto"}}>
          Exibindo {viewMode==="year"?fYear:`${MS[fMonth]} / ${fYear}`} - {filteredTasks.length} tarefa{filteredTasks.length!==1?"s":""}
        </span>
      </div>

      {/* Tab switcher */}
      <div style={{display:"flex",gap:6,marginBottom:20}}>
        {[["overview","📊 Visão Geral"],["colaboradores","👥 Por Colaborador"],["setores","◫ Por Setor"]].map(([v,l])=>(
          <button key={v} onClick={()=>setDashTab(v)} style={{padding:"7px 16px",borderRadius:10,border:"1.5px solid "+(dashTab===v?"#6366f1":"var(--border)"),background:dashTab===v?"#6366f1":"var(--bg3)",color:dashTab===v?"#fff":"#64748b",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit",transition:"all .15s"}}>{l}</button>
        ))}
      </div>

      {/* KPIs — only in overview */}
      {dashTab==="colaboradores"&&(
        <div>
          <h3 style={{fontSize:14,fontWeight:800,color:"var(--text)",marginBottom:16}}>Carga de trabalho por colaborador</h3>
          {byCollaborator.length===0&&<p style={{color:"#94a3b8",fontSize:13}}>Nenhum dado para o período selecionado.</p>}
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {[...byCollaborator].sort((a,b)=>b.total-a.total).map(u=>{
              const pct=u.total>0?Math.round((u.done/u.total)*100):0;
              return(
                <div key={u.id} style={{background:"var(--bg2)",borderRadius:12,padding:"14px 18px",border:"1px solid var(--border)",display:"flex",gap:12,alignItems:"center",flexWrap:"wrap"}}>
                  <Av initials={u.initials} color={u.color} size={38}/>
                  <div style={{flex:1,minWidth:140}}>
                    <div style={{fontWeight:800,fontSize:13,color:"var(--text)",marginBottom:6}}>{u.name}</div>
                    <div style={{height:8,borderRadius:4,background:"#f1f5f9",overflow:"hidden",marginBottom:4}}>
                      <div style={{width:`${pct}%`,height:"100%",background:pct===100?"#22c55e":"#6366f1",borderRadius:4,transition:"width .5s"}}/>
                    </div>
                    <div style={{display:"flex",gap:10,fontSize:11,color:"#64748b",flexWrap:"wrap"}}>
                      <span>Total: <strong style={{color:"var(--text)"}}>{u.total}</strong></span>
                      <span style={{color:"#22c55e"}}>✓ {u.done} concluídas</span>
                      <span style={{color:"#f59e0b"}}>⏳ {u.doing} em andamento</span>
                      {u.overdue>0&&<span style={{color:"#ef4444",fontWeight:700}}>⚠ {u.overdue} atrasadas</span>}
                      <span style={{fontWeight:700,color:pct>80?"#22c55e":pct>50?"#f59e0b":"#ef4444"}}>{pct}% concluído</span>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {dashTab==="setores"&&(
        <div>
          <h3 style={{fontSize:14,fontWeight:800,color:"var(--text)",marginBottom:16}}>Desempenho por setor</h3>
          {bySector.length===0&&<p style={{color:"#94a3b8",fontSize:13}}>Nenhum dado para o período selecionado.</p>}
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:12}}>
            {[...bySector].sort((a,b)=>b.total-a.total).map(s=>{
              const pct=s.total>0?Math.round((s.done/s.total)*100):0;
              const secTasks=filteredTasks.filter(t=>t.sector===s.id);
              const over=secTasks.filter(t=>isLate(t)).length;
              const doing=secTasks.filter(t=>t.status==="doing").length;
              return(
                <div key={s.id} style={{background:"var(--bg2)",borderRadius:12,padding:"16px",border:`1px solid ${over>0?"#fecaca":"var(--border)"}`,boxShadow:"0 1px 4px rgba(0,0,0,.04)"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                    <div style={{width:10,height:10,borderRadius:"50%",background:s.color||"#6366f1"}}/>
                    <span style={{fontWeight:800,fontSize:13,color:"var(--text)"}}>{s.name}</span>
                    <span style={{fontSize:11,fontWeight:700,marginLeft:"auto",color:"#64748b"}}>{s.total} tarefa{s.total!==1?"s":""}</span>
                  </div>
                  <div style={{height:8,borderRadius:4,background:"#f1f5f9",overflow:"hidden",marginBottom:8}}>
                    <div style={{width:`${pct}%`,height:"100%",background:s.color||"#6366f1",borderRadius:4,transition:"width .5s"}}/>
                  </div>
                  <div style={{display:"flex",gap:8,fontSize:11,flexWrap:"wrap"}}>
                    <span style={{color:"#22c55e"}}>✓{s.done}</span>
                    <span style={{color:"#f59e0b"}}>⏳{doing}</span>
                    {over>0&&<span style={{color:"#ef4444",fontWeight:700}}>⚠{over}</span>}
                    <span style={{marginLeft:"auto",fontWeight:800,color:pct>80?"#22c55e":pct>50?"#f59e0b":"#ef4444"}}>{pct}%</span>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {dashTab==="overview"&&<>

      {/* KPIs */}
      <div className="dash-kpis" style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:12,marginBottom:16}}>
        {[
          {l:"Total",        v:stats.total,            c:"#6366f1"},
          {l:"A Fazer",      v:stats.byStatus.todo,    c:"#6366f1"},
          {l:"Em Andamento", v:stats.byStatus.doing,   c:"#f59e0b"},
          {l:"Em Revisão",   v:stats.byStatus.review,  c:"#8b5cf6"},
          {l:"Concluídas",   v:stats.byStatus.done,    c:"#22c55e"},
          {l:"Atrasadas",    v:stats.overdue,           c:"#ef4444"},
        ].map(({l,v,c})=>(
          <div key={l} style={{background:"var(--bg2)",borderRadius:14,padding:"16px 18px",border:"1px solid var(--border)",boxShadow:"0 1px 4px rgba(0,0,0,.05)"}}>
            <div style={{fontSize:30,fontWeight:900,color:c,lineHeight:1}}>{v}</div>
            <div style={{fontSize:12,fontWeight:700,color:"#64748b",marginTop:4}}>{l}</div>
          </div>
        ))}
      </div>

      {/* Faturamento KPIs */}
      {(stats.faturamento>0||stats.aReceber>0)&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:24}}>
          <div style={{background:"linear-gradient(135deg,#f0fdf4,#dcfce7)",borderRadius:14,padding:"16px 18px",border:"1.5px solid #86efac",boxShadow:"0 1px 4px rgba(0,0,0,.05)"}}>
            <div style={{fontSize:11,fontWeight:700,color:"#16a34a",marginBottom:4,textTransform:"uppercase",letterSpacing:".05em"}}>💰 Faturado (concluídas)</div>
            <div style={{fontSize:26,fontWeight:900,color:"#16a34a"}}>R$ {stats.faturamento.toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
          </div>
          <div style={{background:"linear-gradient(135deg,#fffbeb,#fef3c7)",borderRadius:14,padding:"16px 18px",border:"1.5px solid #fcd34d",boxShadow:"0 1px 4px rgba(0,0,0,.05)"}}>
            <div style={{fontSize:11,fontWeight:700,color:"#d97706",marginBottom:4,textTransform:"uppercase",letterSpacing:".05em"}}>⏳ A Receber (em aberto)</div>
            <div style={{fontSize:26,fontWeight:900,color:"#d97706"}}>R$ {stats.aReceber.toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
          </div>
        </div>
      )}

      {/* Pizza + Status bar side by side */}
      <div style={{display:"grid",gridTemplateColumns:"220px 1fr",gap:16,marginBottom:24,alignItems:"start"}}>
        {/* Pie chart */}
        <div style={{background:"var(--bg2)",borderRadius:14,padding:20,border:"1px solid var(--border)",boxShadow:"0 1px 4px rgba(0,0,0,.05)"}}>
          <h3 style={{fontSize:13,fontWeight:800,color:"#0f172a",marginBottom:16}}>🥧 Por Status</h3>
          {(()=>{
            const slices=STS.filter(s=>s.id!=="archived"&&(stats.byStatus[s.id]||0)>0);
            if(slices.length===0) return <div style={{fontSize:12,color:"#94a3b8",textAlign:"center",padding:"20px 0"}}>Sem dados</div>;
            let cum=0;
            const total=slices.reduce((a,s)=>a+(stats.byStatus[s.id]||0),0)||1;
            const paths=slices.map(s=>{
              const pct=(stats.byStatus[s.id]||0)/total;
              const start=cum;cum+=pct;
              const a0=start*2*Math.PI-Math.PI/2;
              const a1=cum*2*Math.PI-Math.PI/2;
              const r=70,cx=90,cy=90;
              const x0=cx+r*Math.cos(a0),y0=cy+r*Math.sin(a0);
              const x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1);
              const lg=pct>0.5?1:0;
              return {s,pct,d:`M${cx},${cy} L${x0},${y0} A${r},${r} 0 ${lg},1 ${x1},${y1} Z`};
            });
            return(
              <div>
                <svg width={180} height={180} style={{display:"block",margin:"0 auto 12px"}}>
                  {paths.map(({s,d})=><path key={s.id} d={d} fill={s.c} stroke="#fff" strokeWidth={2}/>)}
                  <circle cx={90} cy={90} r={40} fill="var(--bg2)"/>
                  <text x={90} y={94} textAnchor="middle" fontSize={13} fontWeight={900} fill="#0f172a">{total}</text>
                </svg>
                <div style={{display:"flex",flexDirection:"column",gap:4}}>
                  {slices.map(s=>(
                    <div key={s.id} style={{display:"flex",alignItems:"center",gap:6,fontSize:11}}>
                      <span style={{width:8,height:8,borderRadius:"50%",background:s.c,flexShrink:0}}/>
                      <span style={{flex:1,color:"#374151",fontWeight:600}}>{s.l}</span>
                      <span style={{fontWeight:800,color:s.c}}>{stats.byStatus[s.id]||0}</span>
                    </div>
                  ))}
                </div>
              </div>
            );
          })()}
        </div>

        {/* Status bar */}
        <div style={{background:"var(--bg2)",borderRadius:14,padding:20,border:"1px solid var(--border)",boxShadow:"0 1px 4px rgba(0,0,0,.05)"}}>
          <h3 style={{fontSize:14,fontWeight:800,color:"#0f172a",marginBottom:16}}>Status das Tarefas — {MS[fMonth]}/{fYear}</h3>
          {STS.map(s=>{
            const cnt=stats.byStatus[s.id]||0;
            const pct=stats.total?Math.round((cnt/stats.total)*100):0;
            return (
              <div key={s.id} style={{marginBottom:12}}>

/* ===========================================
   POMODORO TIMER */
function PomodoroTimer({taskTitle,onClose}){
  const MODES=[{id:"focus",label:"🍅 Foco",mins:25,color:"#ef4444"},{id:"short",label:"☕ Pausa curta",mins:5,color:"#22c55e"},{id:"long",label:"🛋 Pausa longa",mins:15,color:"#6366f1"}];
  const [mode,setMode]=useState(0);
  const [secs,setSecs]=useState(MODES[0].mins*60);
  const [running,setRunning]=useState(false);
  const [rounds,setRounds]=useState(0);
  const cur=MODES[mode];
  const total=cur.mins*60;
  const pct=Math.round((1-secs/total)*100);

  useEffect(()=>{
    if(!running) return;
    const id=setInterval(()=>setSecs(s=>{
      if(s<=1){setRunning(false);if(mode===0)setRounds(r=>r+1);return 0;}
      return s-1;
    }),1000);
    return()=>clearInterval(id);
  },[running,mode]);

  const switchMode=(idx)=>{setMode(idx);setSecs(MODES[idx].mins*60);setRunning(false);};
  const mm=String(Math.floor(secs/60)).padStart(2,"0");
  const ss=String(secs%60).padStart(2,"0");
  const circ=2*Math.PI*45;

  return(
    <div style={{position:"fixed",bottom:90,right:90,zIndex:5000,background:"var(--bg2)",borderRadius:20,boxShadow:"0 20px 60px rgba(0,0,0,.25)",border:"1px solid var(--border)",width:260,overflow:"hidden",animation:"popIn .2s ease"}}>
      <div style={{background:`linear-gradient(135deg,${cur.color}22,${cur.color}08)`,padding:"14px 16px 10px",borderBottom:"1px solid var(--border)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <span style={{fontSize:12,fontWeight:800,color:cur.color}}>⏱ Pomodoro</span>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:10,color:"#94a3b8"}}>🍅×{rounds}</span>
            <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",color:"#94a3b8",fontSize:16,lineHeight:1}}>×</button>
          </div>
        </div>
        <div style={{fontSize:10,color:"#64748b",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginBottom:10}}>{taskTitle}</div>
        <div style={{display:"flex",gap:4,marginBottom:12}}>
          {MODES.map((m,i)=>(
            <button key={m.id} onClick={()=>switchMode(i)} style={{flex:1,padding:"3px 0",borderRadius:8,border:`1.5px solid ${mode===i?m.color:"#e2e8f0"}`,background:mode===i?m.color:"transparent",color:mode===i?"#fff":"#64748b",fontSize:9,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}}>{m.label}</button>
          ))}
        </div>
        <div style={{display:"flex",justifyContent:"center",marginBottom:12,position:"relative"}}>
          <svg width={110} height={110} style={{transform:"rotate(-90deg)"}}>
            <circle cx={55} cy={55} r={45} fill="none" stroke={cur.color+"22"} strokeWidth={8}/>
            <circle cx={55} cy={55} r={45} fill="none" stroke={cur.color} strokeWidth={8}
              strokeDasharray={circ} strokeDashoffset={circ*(1-pct/100)}
              style={{transition:"stroke-dashoffset .5s ease"}} strokeLinecap="round"/>
          </svg>
          <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",textAlign:"center"}}>
            <div style={{fontSize:26,fontWeight:900,color:cur.color,fontVariantNumeric:"tabular-nums"}}>{mm}:{ss}</div>
            <div style={{fontSize:9,color:"#94a3b8",fontWeight:700}}>{pct}%</div>
          </div>
        </div>
        <div style={{display:"flex",gap:8,justifyContent:"center"}}>
          <button onClick={()=>setRunning(r=>!r)} style={{padding:"8px 28px",borderRadius:10,border:"none",background:cur.color,color:"#fff",fontSize:13,fontWeight:800,cursor:"pointer",fontFamily:"inherit",boxShadow:`0 4px 12px ${cur.color}55`}}>
            {running?"⏸ Pausar":"▶ Iniciar"}
          </button>
          <button onClick={()=>{setSecs(cur.mins*60);setRunning(false);}} style={{padding:"8px 12px",borderRadius:10,border:`1.5px solid ${cur.color}44`,background:"transparent",color:cur.color,fontSize:13,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}}>↺</button>
        </div>
      </div>
    </div>
  );
}

function MentionInput({value,onChange,onSubmit,collaborators,placeholder}){
  const [show,setShow]=useState(false);
  const [query,setQuery]=useState("");
  const [sel,setSel]=useState(0);
  const inputRef=useRef(null);
  const atPosRef=useRef(-1);

  const matches=useMemo(()=>{
    if(!query&&!show) return [];
    return collaborators.filter(u=>u.name.toLowerCase().includes(query.toLowerCase())).slice(0,6);
  },[query,collaborators,show]);

  useEffect(()=>setSel(0),[matches]);

  const handleChange=(e)=>{
    const v=e.target.value;
    onChange(v);
    const caret=e.target.selectionStart;
    // Find the last @ before caret
    const before=v.slice(0,caret);
    const atIdx=before.lastIndexOf("@");
    if(atIdx>=0){
      const afterAt=before.slice(atIdx+1);
      if(!/\s/.test(afterAt)){
        atPosRef.current=atIdx;
        setQuery(afterAt);
        setShow(true);
        return;
      }
    }
    setShow(false);
    setQuery("");
  };

  const pick=(collab)=>{
    const v=value;
    const before=v.slice(0,atPosRef.current);
    const caret=inputRef.current?.selectionStart||v.length;
    const after=v.slice(caret);
    const newVal=before+"@"+collab.name+" "+after;
    onChange(newVal);
    setShow(false);setQuery("");
    setTimeout(()=>inputRef.current?.focus(),0);
  };

  const handleKey=(e)=>{
    if(show&&matches.length>0){
      if(e.key==="ArrowDown"){e.preventDefault();setSel(s=>Math.min(s+1,matches.length-1));return;}
      if(e.key==="ArrowUp"){e.preventDefault();setSel(s=>Math.max(s-1,0));return;}
      if(e.key==="Tab"||e.key==="Enter"&&show){e.preventDefault();if(matches[sel])pick(matches[sel]);return;}
      if(e.key==="Escape"){setShow(false);return;}
    }
    if(e.key==="Enter"&&!e.shiftKey&&!show){e.preventDefault();onSubmit();}
  };

  return(
    <div style={{position:"relative",flex:1}}>
      <input
        ref={inputRef}
        value={value}
        onChange={handleChange}
        onKeyDown={handleKey}
        onBlur={()=>setTimeout(()=>setShow(false),150)}
        placeholder={placeholder||"Mensagem... @nome para mencionar"}
        style={{width:"100%",padding:"7px 12px",borderRadius:9,fontSize:12,border:"2px solid #e5e7eb",outline:"none",fontFamily:"inherit",boxSizing:"border-box"}}
        onFocus={e=>e.target.style.borderColor="#6366f1"}
      />
      {show&&matches.length>0&&(
        <div style={{position:"absolute",bottom:"100%",left:0,marginBottom:4,background:"#fff",borderRadius:10,boxShadow:"0 8px 24px rgba(0,0,0,.15)",border:"1px solid #e2e8f0",zIndex:500,minWidth:200,overflow:"hidden"}}>
          {matches.map((u,i)=>(
            <div key={u.id} onMouseDown={()=>pick(u)}
              style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",cursor:"pointer",background:i===sel?"#eef2ff":"transparent",transition:"background .1s"}}
              onMouseEnter={()=>setSel(i)}
            >
              <Av initials={u.initials} color={u.color} size={24}/>
              <div>
                <div style={{fontSize:12,fontWeight:700,color:"#0f172a"}}>{u.name}</div>
                <div style={{fontSize:10,color:"#94a3b8"}}>{u.role}</div>
              </div>
            </div>
          ))}
          <div style={{padding:"4px 12px 6px",fontSize:10,color:"#94a3b8",borderTop:"1px solid #f1f5f9"}}>Tab ou Enter para selecionar</div>
        </div>
      )}
    </div>
  );
}

/* Helper: render text with @mentions highlighted */
function RichText({text,collaborators}){
  if(!text) return null;
  const parts=text.split(/(@[\w\s]+?)(?=\s|$|@)/g);
  return(
    <span>
      {parts.map((p,i)=>{
        if(p.startsWith("@")){
          const name=p.slice(1).trim();
          const u=collaborators.find(c=>c.name.toLowerCase()===name.toLowerCase());
          return <span key={i} style={{color:u?u.color:"#6366f1",fontWeight:700,background:u?u.color+"15":"#eef2ff",borderRadius:4,padding:"0 3px"}}>{p}</span>;
        }
        return <span key={i}>{p}</span>;
      })}
    </span>
  );
}

            {mine.length===0&&<div style={{padding:"24px",textAlign:"center",fontSize:13,color:"#94a3b8"}}>Nenhuma notificação</div>}
            {mine.slice().reverse().map(n=>(

              >
                <span style={{fontSize:18,flexShrink:0}}>{n.icon||"🔔"}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,fontWeight:n.read?500:700,color:"#0f172a",lineHeight:1.4}}>{n.text}</div>

                </div>
                {!n.read&&<span style={{width:8,height:8,borderRadius:"50%",background:"#6366f1",flexShrink:0,marginTop:4}}/>}

        </div>
      )}
    </div>
  );
}

function ChatWidget({data,setData,currentUser,currentUserId,myCollab,unreadCount}){
  const [open,setOpen]=useState(false);
  const [minimized,setMinimized]=useState(false);

  // All sectors the current user belongs to, or all if admin
  const mySectors=myCollab
    ? (toArr(myCollab.sectors).length>0?toArr(myCollab.sectors):(myCollab.sector?[myCollab.sector]:[]))
    : data.sectors.map(s=>s.id);
  const availSectors=data.sectors.filter(s=>mySectors.length===0||mySectors.includes(s.id)||!myCollab);
  const [activeSector,setActiveSector]=useState(()=>availSectors[0]?.id||"");
  const [msg,setMsg]=useState("");
  const bottomRef=useRef(null);

  const messages=(data.chatMessages||[]).filter(m=>m.sectorId===activeSector);

  useEffect(()=>{
    if(open&&!minimized) bottomRef.current?.scrollIntoView({behavior:"smooth"});
  },[messages.length,activeSector,open,minimized]);

  // Mark chat notifications as read when opened
  useEffect(()=>{
    if(open) setData(d=>({...d,notifications:(d.notifications||[]).map(n=>n.page==="chat"&&n.toId===currentUserId?{...n,read:true}:n)}));
  },[open]);

  const sendMsg=()=>{
    if(!msg.trim()) return;
    const text=msg.trim();
    const mentionNames=[];
    const re=/@([\w\s]+?)(?=\s|$|@)/g;
    let m;
    while((m=re.exec(text))!==null) mentionNames.push(m[1].trim());

    const newMsg={id:uid(),sectorId:activeSector,author:currentUser,authorId:currentUserId||null,text,createdAt:new Date().toISOString()};

    const newNotifs=[];
    mentionNames.forEach(name=>{
      const u=data.collaborators.find(x=>x.name.toLowerCase()===name.toLowerCase());
      if(u&&u.id!==currentUserId){
        newNotifs.push({id:uid(),toId:u.id,icon:"💬",text:`${currentUser} mencionou você no chat: "${text.slice(0,60)}${text.length>60?"...":""}"`,page:"chat",createdAt:new Date().toISOString(),read:false});
      }
    });

    setData(d=>({...d,chatMessages:[...(d.chatMessages||[]),newMsg],notifications:[...(d.notifications||[]),...newNotifs]}));
    setMsg("");
  };

  const sector=data.sectors.find(s=>s.id===activeSector);
  const chatUnread=(data.notifications||[]).filter(n=>n.toId===currentUserId&&!n.read&&n.page==="chat").length;

  return(
    <div style={{position:"fixed",bottom:24,right:24,zIndex:1000,display:"flex",flexDirection:"column",alignItems:"flex-end",gap:8,fontFamily:"inherit"}}>

      {/* Expanded panel */}
      {open&&(
        <div style={{
          width:380,height:minimized?0:480,
          background:"var(--bg2)",
          borderRadius:18,
          border:"1px solid var(--border)",
          boxShadow:"0 8px 40px rgba(0,0,0,.18)",
          display:"flex",flexDirection:"column",
          overflow:"hidden",
          transition:"height .25s cubic-bezier(.4,0,.2,1)",
          transformOrigin:"bottom right",
        }}>
          {/* Header */}
          <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 16px",background:"linear-gradient(135deg,#1e1b4b,#312e81)",flexShrink:0,cursor:"pointer"}} onClick={()=>setMinimized(m=>!m)}>
            <span style={{fontSize:16}}>💬</span>
            <span style={{fontSize:13,fontWeight:800,color:"#fff",flex:1}}>Chat — {sector?.name||"Selecione um canal"}</span>
            <span style={{fontSize:11,color:"#a5b4fc",marginRight:4}}>{messages.length} msg</span>
            <button onClick={e=>{e.stopPropagation();setMinimized(m=>!m);}} style={{background:"none",border:"none",color:"#a5b4fc",cursor:"pointer",fontSize:14,padding:"2px 6px",borderRadius:6}} title={minimized?"Expandir":"Minimizar"}>{minimized?"▲":"▼"}</button>
            <button onClick={e=>{e.stopPropagation();setOpen(false);}} style={{background:"none",border:"none",color:"#a5b4fc",cursor:"pointer",fontSize:16,padding:"2px 6px",borderRadius:6}} title="Fechar">×</button>
          </div>

          {!minimized&&<>
            {/* Channel tabs */}
            <div style={{display:"flex",gap:0,overflowX:"auto",borderBottom:"1px solid var(--border)",background:"var(--bg3)",flexShrink:0}}>
              {availSectors.map(s=>{
                const active=activeSector===s.id;
                const cnt=(data.chatMessages||[]).filter(m=>m.sectorId===s.id).length;
                return(
                  <button key={s.id} onClick={()=>setActiveSector(s.id)}
                    style={{display:"flex",alignItems:"center",gap:5,padding:"8px 13px",border:"none",borderBottom:active?`2px solid ${s.color}`:"2px solid transparent",background:"transparent",cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap",transition:"all .12s",flexShrink:0}}
                    onMouseEnter={e=>{if(!active)e.currentTarget.style.background="rgba(0,0,0,.04)";}}
                    onMouseLeave={e=>{if(!active)e.currentTarget.style.background="transparent";}}
                  >
                    <span style={{width:7,height:7,borderRadius:"50%",background:s.color,flexShrink:0}}/>
                    <span style={{fontSize:12,fontWeight:active?800:500,color:active?s.color:"#64748b"}}>{s.name}</span>
                    {cnt>0&&<span style={{fontSize:10,color:"#94a3b8"}}>{cnt}</span>}
                  </button>
                );
              })}
            </div>

            {/* Messages */}
            <div style={{flex:1,overflowY:"auto",padding:"12px 14px",display:"flex",flexDirection:"column",gap:2,background:"var(--bg)"}}>
              {messages.length===0&&(
                <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:6,color:"#94a3b8",paddingTop:40}}>
                  <span style={{fontSize:28}}>💬</span>
                  <span style={{fontSize:12,fontWeight:600}}>Nenhuma mensagem</span>
                  <span style={{fontSize:11}}>#{sector?.name} está em silêncio...</span>
                </div>
              )}
              {messages.map((m,i)=>{
                const isMe=m.authorId===currentUserId||m.author===currentUser;
                const prev=messages[i-1];
                const sameAuthor=prev&&prev.author===m.author&&(new Date(m.createdAt)-new Date(prev.createdAt))<120000;
                const u=data.collaborators.find(x=>x.id===m.authorId||x.name===m.author);
                return(
                  <div key={m.id} style={{display:"flex",gap:7,alignItems:"flex-end",flexDirection:isMe?"row-reverse":"row",marginTop:sameAuthor?1:8}}>
                    {!isMe&&!sameAuthor&&<Av initials={u?.initials||(m.author.slice(0,2).toUpperCase())} color={u?.color||"#6366f1"} size={26}/>}
                    {!isMe&&sameAuthor&&<div style={{width:26,flexShrink:0}}/>}
                    <div style={{maxWidth:"78%"}}>
                      {!sameAuthor&&<div style={{fontSize:10,fontWeight:700,color:u?.color||"#6366f1",marginBottom:2,textAlign:isMe?"right":"left"}}>{isMe?"Você":m.author}</div>}
                      <div style={{padding:"7px 11px",borderRadius:isMe?"13px 13px 3px 13px":"13px 13px 13px 3px",background:isMe?"linear-gradient(135deg,#6366f1,#8b5cf6)":"var(--bg2)",color:isMe?"#fff":"#0f172a",fontSize:12,lineHeight:1.5,boxShadow:"0 1px 3px rgba(0,0,0,.07)",border:isMe?"none":"1px solid var(--border)"}}>
                        <RichText text={m.text} collaborators={data.collaborators}/>
                      </div>
                      <div style={{fontSize:9,color:"#94a3b8",marginTop:1,textAlign:isMe?"right":"left"}}>
                        {new Date(m.createdAt).toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})}
                      </div>
                    </div>
                  </div>
                );
              })}
              <div ref={bottomRef}/>
            </div>

            {/* Input */}
            <div style={{padding:"10px 12px",background:"var(--bg2)",borderTop:"1px solid var(--border)",display:"flex",gap:7,alignItems:"flex-end",flexShrink:0}}>
              {!activeSector
                ?<div style={{flex:1,fontSize:12,color:"#94a3b8",padding:"6px 0"}}>Selecione um canal acima</div>
                :<>
                  <MentionInput value={msg} onChange={setMsg} onSubmit={sendMsg} collaborators={data.collaborators} placeholder={`#${sector?.name||"canal"}... @nome para mencionar`}/>
                  <Btn onClick={sendMsg} disabled={!msg.trim()} sz="sm" xs={{padding:"7px 14px",flexShrink:0}}>↑</Btn>
                </>
              }
            </div>
          </>}
        </div>
      )}

      {/* FAB button */}
      <button onClick={()=>{setOpen(o=>!o);setMinimized(false);}}
        style={{
          width:52,height:52,borderRadius:"50%",
          background:open?"#1e1b4b":"linear-gradient(135deg,#6366f1,#8b5cf6)",
          border:"none",cursor:"pointer",
          boxShadow:"0 4px 16px rgba(99,102,241,.4)",
          display:"flex",alignItems:"center",justifyContent:"center",
          fontSize:22,color:"#fff",
          transition:"all .2s",
          transform:open?"rotate(15deg) scale(.95)":"scale(1)",
          position:"relative",
        }}
        onMouseEnter={e=>e.currentTarget.style.transform=open?"rotate(15deg) scale(1)":"scale(1.08)"}
        onMouseLeave={e=>e.currentTarget.style.transform=open?"rotate(15deg) scale(.95)":"scale(1)"}
        title={open?"Fechar chat":"Abrir chat"}
      >
        {open?"✕":"💬"}
        {!open&&chatUnread>0&&(
          <span style={{position:"absolute",top:-3,right:-3,minWidth:18,height:18,borderRadius:9,background:"#ef4444",color:"#fff",fontSize:10,fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 4px",border:"2px solid #fff",boxShadow:"0 1px 4px rgba(0,0,0,.2)"}}>
            {chatUnread>9?"9+":chatUnread}
          </span>
        )}
      </button>
    </div>
  );
}

/* ===========================================
   PAINEL DE RECORRÊNCIAS */
function PainelRecorrencias({data,setData,onEdit,toast}){
  const [filter,setFilter]=useState("all"); // "all"|"active"|"paused"
  const today=todayStr();

  // Agrupar tarefas por _recGroup e descobrir metadados
  const groups=useMemo(()=>{
    const map={};
    data.tasks.forEach(t=>{
      if(!t._recGroup) return;
      if(!map[t._recGroup]) map[t._recGroup]={id:t._recGroup,tasks:[],title:t.title,company:t.company,sector:t.sector,recurrenceId:t._recurrenceId||null,serviceId:t._serviceId||null};
      map[t._recGroup].tasks.push(t);
    });
    return Object.values(map).map(g=>{
      const active=g.tasks.filter(t=>t.status!=="archived"&&t.status!=="done");
      const done=g.tasks.filter(t=>t.status==="done");
      const archived=g.tasks.filter(t=>t.status==="archived");
      const future=active.filter(t=>(t.dueDate||"")>=today).sort((a,b)=>a.dueDate.localeCompare(b.dueDate));
      const overdue=active.filter(t=>t.dueDate&&t.dueDate<today);
      const nextDue=future[0]?.dueDate||null;
      const rec=g.recurrenceId?data.recurrences.find(r=>r.id===g.recurrenceId):null;
      const svc=g.serviceId?data.services.find(s=>s.id===g.serviceId):null;
      const co=data.companies.find(c=>c.id===g.company);
      const paused=g.tasks.every(t=>t.status==="archived"||t.status==="done")||(active.length===0&&done.length>0);
      return {...g,active,done,archived,future,overdue,nextDue,rec,svc,co,paused,totalTasks:g.tasks.length};
    }).sort((a,b)=>(a.nextDue||"9999").localeCompare(b.nextDue||"9999"));
  },[data.tasks,data.recurrences,data.services,data.companies,today]);

  const filtered=groups.filter(g=>{
    if(filter==="active") return !g.paused&&g.active.length>0;
    if(filter==="paused") return g.paused;
    return true;
  });

  const archiveGroup=(grpId)=>{
    if(!window.confirm("Arquivar todas as tarefas futuras desta série?")) return;
    setData(d=>({...d,tasks:d.tasks.map(t=>
      t._recGroup===grpId&&t.status!=="done"&&t.status!=="archived"&&(t.dueDate||"")>=today
        ?{...t,status:"archived",archivedAt:today}:t
    )}));
    toast("📦 Série arquivada.","ok");
  };

  const restoreGroup=(grpId)=>{
    setData(d=>({...d,tasks:d.tasks.map(t=>
      t._recGroup===grpId&&t.status==="archived"
        ?{...t,status:"todo",archivedAt:null}:t
    )}));
    toast("↻ Série restaurada.","ok");
  };

  return(
    <div>
      <PH title="Painel de Recorrências" icon="⊹" badge={groups.length}/>
      <p style={{fontSize:13,color:"#64748b",marginBottom:16}}>Visualize e gerencie todos os grupos de tarefas recorrentes. Pause ou reative séries inteiras.</p>

      {/* Filtros */}
      <div style={{display:"flex",gap:6,marginBottom:18,flexWrap:"wrap"}}>
        {[["all","☰ Todos"],["active","▶ Ativos"],["paused","⏸ Pausados"]].map(([v,l])=>(
          <button key={v} onClick={()=>setFilter(v)} style={{padding:"5px 14px",borderRadius:20,border:"1.5px solid "+(filter===v?"#6366f1":"#e2e8f0"),background:filter===v?"#6366f1":"var(--bg3)",color:filter===v?"#fff":"#64748b",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit",transition:"all .15s"}}>{l}</button>
        ))}
        <span style={{fontSize:12,color:"#94a3b8",marginLeft:"auto",alignSelf:"center"}}>{filtered.length} série{filtered.length!==1?"s":""}</span>
      </div>

      {filtered.length===0&&<div style={{padding:"40px",textAlign:"center",color:"#94a3b8",fontSize:14,border:"2px dashed var(--border)",borderRadius:14}}>Nenhuma série recorrente encontrada.</div>}

      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {filtered.map(g=>(
          <div key={g.id} style={{background:"var(--bg2)",borderRadius:14,padding:"14px 18px",border:`1px solid ${g.overdue.length>0?"#fecaca":"var(--border)"}`,boxShadow:"0 1px 4px rgba(0,0,0,.05)",display:"flex",gap:14,alignItems:"flex-start",flexWrap:"wrap"}}>
            {/* Indicador de status */}
            <div style={{width:10,height:10,borderRadius:"50%",background:g.paused?"#94a3b8":g.overdue.length>0?"#ef4444":"#22c55e",flexShrink:0,marginTop:4}}/>

            <div style={{flex:1,minWidth:200}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
                <span style={{fontSize:13,fontWeight:800,color:"var(--text)"}}>{g.title}</span>
                {g.co&&<span style={{fontSize:11,color:g.co.color,fontWeight:700,background:g.co.color+"15",padding:"1px 7px",borderRadius:10}}>{g.co.logo} {g.co.name}</span>}
                {g.rec&&<span style={{fontSize:11,color:"#6366f1",fontWeight:700,background:"#eef2ff",padding:"1px 7px",borderRadius:10}}>↻ {g.rec.name}</span>}
                {g.svc&&<span style={{fontSize:11,color:"#14b8a6",fontWeight:700,background:"#f0fdfa",padding:"1px 7px",borderRadius:10}}>S {g.svc.name}</span>}
                {g.paused&&<span style={{fontSize:10,color:"#94a3b8",fontWeight:700,background:"#f1f5f9",padding:"1px 7px",borderRadius:10}}>⏸ Pausado</span>}
              </div>
              <div style={{display:"flex",gap:10,flexWrap:"wrap",fontSize:12,color:"#64748b"}}>
                <span>📋 {g.active.length} pendente{g.active.length!==1?"s":""}</span>
                <span style={{color:"#22c55e"}}>✓ {g.done.length} concluída{g.done.length!==1?"s":""}</span>
                {g.overdue.length>0&&<span style={{color:"#ef4444",fontWeight:700}}>⚠ {g.overdue.length} atrasada{g.overdue.length!==1?"s":""}</span>}
                {g.nextDue&&<span style={{color:"#6366f1",fontWeight:700}}>Próxima: {fmtDate(g.nextDue)}</span>}
              </div>
              {/* Linha do tempo simplificada */}
              {g.future.length>0&&(
                <div style={{display:"flex",gap:4,marginTop:8,flexWrap:"wrap"}}>
                  {g.future.slice(0,8).map(t=>{
                    const st=STS.find(x=>x.id===t.status)||STS[0];
                    return(
                      <div key={t.id} title={`${fmtDate(t.dueDate)} — ${st.l}`} style={{width:28,height:28,borderRadius:7,background:st.c+"20",border:`1.5px solid ${st.c}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:st.c,cursor:"pointer",flexShrink:0}}
                        onClick={()=>onEdit(t)}
                      >
                        {t.dueDate?.slice(8)}
                      </div>
                    );
                  })}
                  {g.future.length>8&&<div style={{width:28,height:28,borderRadius:7,background:"#f1f5f9",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:"#94a3b8"}}>+{g.future.length-8}</div>}
                </div>
              )}
            </div>

            {/* Ações */}
            <div style={{display:"flex",gap:6,flexShrink:0,alignSelf:"flex-start"}}>
              {!g.paused
                ?<button onClick={()=>archiveGroup(g.id)} title="Pausar/arquivar série" style={{padding:"5px 12px",borderRadius:8,border:"1px solid #e2e8f0",background:"var(--bg3)",cursor:"pointer",fontSize:11,fontWeight:700,color:"#64748b",fontFamily:"inherit",transition:"all .15s"}}
                  onMouseEnter={e=>e.currentTarget.style.color="#f59e0b"}
                  onMouseLeave={e=>e.currentTarget.style.color="#64748b"}
                >⏸ Pausar</button>
                :<button onClick={()=>restoreGroup(g.id)} style={{padding:"5px 12px",borderRadius:8,border:"1px solid #22c55e",background:"#f0fdf4",cursor:"pointer",fontSize:11,fontWeight:700,color:"#22c55e",fontFamily:"inherit",transition:"all .15s"}}>▶ Reativar</button>
              }
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ===========================================
   HOJE PAGE */
function HojePage({data,myCollabId,onEdit,onDelete,onComplete,onAdd}){
  const today=todayStr();
  const tasks=data.tasks.filter(t=>{
    if(t.status==="archived"||t.status==="done") return false;
    if(!t.dueDate) return false;
    return t.dueDate<=today;
  }).sort((a,b)=>{
    // atrasadas primeiro, depois hoje; dentro de cada grupo por prioridade
    const priOrder={critica:0,alta:1,media:2,baixa:3};
    if(a.dueDate!==b.dueDate) return a.dueDate.localeCompare(b.dueDate);
    return (priOrder[a.priority]||2)-(priOrder[b.priority]||2);
  });

  const overdue=tasks.filter(t=>t.dueDate<today);
  const dueToday=tasks.filter(t=>t.dueDate===today);

  const SectionHeader=({label,count,color})=>(
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,marginTop:20}}>
      <div style={{width:10,height:10,borderRadius:"50%",background:color}}/>
      <span style={{fontSize:13,fontWeight:800,color:"var(--text)"}}>{label}</span>
      <span style={{fontSize:11,fontWeight:700,padding:"1px 8px",borderRadius:20,background:color+"18",color}}>{count}</span>
    </div>
  );

  const Row=({task})=>{
    const taskCos=taskCompanies(task).map(id=>data.companies.find(x=>x.id===id)).filter(Boolean);
  const co=taskCos[0]||null; // primary company for color/icon
    const asg=data.collaborators.filter(x=>toArr(task.assignees).includes(x.id));
    const st=STS.find(x=>x.id===task.status)||STS[0];
    const p=PRI[task.priority]||PRI.media;
    const ckDone=toArr(task.checklist).filter(c=>c.done).length;
    const ckTot=toArr(task.checklist).length;
    const isOver=task.dueDate<today;
    return(
      <div onClick={()=>onEdit(task)} style={{display:"flex",gap:12,padding:"12px 16px",borderRadius:12,background:"var(--bg2)",border:`1px solid ${isOver?"#fecaca":"var(--border)"}`,cursor:"pointer",alignItems:"center",transition:"background .1s",marginBottom:7}}
        onMouseEnter={e=>e.currentTarget.style.background="var(--bg3)"}
        onMouseLeave={e=>e.currentTarget.style.background="var(--bg2)"}
      >
        <QCBtn status={task.status} onClick={e=>{e.stopPropagation();onComplete(task);}} size={28} absolute={false}/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:800,fontSize:13,color:"var(--text)",marginBottom:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{task.title}</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
            {co&&<span style={{fontSize:11,color:co.color,fontWeight:700}}>{co.logo} {co.name}</span>}
            <span style={{fontSize:10,padding:"1px 6px",borderRadius:10,background:p.bg,color:p.t,fontWeight:700}}>{p.l}</span>
            <span style={{fontSize:10,padding:"1px 6px",borderRadius:10,background:st.c+"18",color:st.c,fontWeight:700}}>{st.l}</span>
            {ckTot>0&&<span style={{fontSize:10,color:"#94a3b8"}}>☑ {ckDone}/{ckTot}</span>}
          </div>
        </div>
        <div style={{display:"flex",gap:4,alignItems:"center",flexShrink:0}}>
          {asg.map(u=><Av key={u.id} initials={u.initials} color={u.color} size={24} title={u.name}/>)}
          <span style={{fontSize:11,fontWeight:800,color:isOver?"#ef4444":"#6366f1",minWidth:50,textAlign:"right"}}>{fmtDate(task.dueDate)}</span>
        </div>
      </div>
    );
  };

  return(
