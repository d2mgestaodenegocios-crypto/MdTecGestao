/* ===========================================
   CSV EXPORT */
function exportTasksCSV(tasks,data){
  const coName=id=>data.companies.find(c=>c.id===id)?.name||"";
  const coNames=ids=>toArr(ids).map(id=>data.companies.find(c=>c.id===id)?.name||"").filter(Boolean).join("; ");
  const secName=id=>data.sectors.find(s=>s.id===id)?.name||"";
  const asgNames=ids=>toArr(ids).map(id=>data.collaborators.find(u=>u.id===id)?.name||"").filter(Boolean).join("; ");
  const lblNames=ids=>toArr(ids).map(id=>data.labels.find(l=>l.id===id)?.name||"").filter(Boolean).join("; ");
  const stLabel=id=>STS.find(s=>s.id===id)?.l||id;
  const priLabel=id=>PRI[id]?.l||id;
  const esc=v=>`"${String(v||"").replace(/"/g,'""')}"`;
  const headers=["ID","Título","Status","Prioridade","Empresa","Setor","Responsáveis","Marcadores","Vencimento","Hora","SLA(h)","Criado em","Concluído em","Checklist concluído","Checklist total","Série recorrente"];
  const rows=tasks.map(t=>[
    t.id,t.title,stLabel(t.status),priLabel(t.priority),
    coNames(taskCompanies(t)),secName(t.sector),asgNames(t.assignees),lblNames(t.labels),
    t.dueDate||"",t.dueTime||"",t.slaHours||"",
    t.createdAt||"",t.completedAt||"",
    toArr(t.checklist).filter(x=>x.done).length,
    toArr(t.checklist).length,
    t._recGroup?"Sim":"Não"
  ].map(esc).join(","));
  const csv=[headers.map(esc).join(","),...rows].join("\n");
  const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=`mdtec_tarefas_${todayStr()}.csv`;a.click();
  URL.revokeObjectURL(url);
}

function GlobalSearch({data,onEdit,onNavigate,onClose}){
  const [q,setQ]=useState("");
  const inputRef=useRef(null);
  useEffect(()=>{if(inputRef.current)inputRef.current.focus();},[]);

  const results=useMemo(()=>{
    if(!q.trim()) return [];
    const ql=q.toLowerCase();
    const tasks=data.tasks.filter(t=>t.status!=="archived"&&(t.title.toLowerCase().includes(ql)||t.description?.toLowerCase().includes(ql))).slice(0,6).map(t=>({type:"task",item:t}));
    const pages=[
      {id:"dashboard",label:"Dashboard",icon:"✦"},{id:"kanban",label:"Kanban",icon:"⊞"},
      {id:"lista",label:"Lista",icon:"☰"},{id:"calendario",label:"Calendário",icon:"📅"},
      {id:"tabela",label:"Tabela",icon:"▦"},{id:"colaboradores",label:"Colaboradores",icon:"◉"},
      {id:"empresas",label:"Empresas",icon:"⬡"},{id:"configuracoes",label:"Configurações",icon:"⚙"},
    ].filter(p=>p.label.toLowerCase().includes(ql)).slice(0,3).map(p=>({type:"page",item:p}));
    return [...pages,...tasks];
  },[q,data.tasks]);

  const [sel,setSel]=useState(0);
  useEffect(()=>setSel(0),[results]);

  const go=(r)=>{
    if(r.type==="task"){onEdit(r.item);}
    else if(r.type==="page"){onNavigate(r.item.id);}
    onClose();
  };

  const handleKey=(e)=>{
    if(e.key==="ArrowDown"){e.preventDefault();setSel(s=>Math.min(s+1,results.length-1));}
    else if(e.key==="ArrowUp"){e.preventDefault();setSel(s=>Math.max(s-1,0));}
    else if(e.key==="Enter"&&results[sel]){go(results[sel]);}
    else if(e.key==="Escape"){onClose();}
  };

  const co=(task)=>data.companies.find(c=>c.id===task.company);
  const st=(task)=>STS.find(s=>s.id===task.status)||STS[0];

  return(
    <div onClick={e=>e.target===e.currentTarget&&onClose()} style={{position:"fixed",inset:0,background:"rgba(15,23,42,.6)",zIndex:9000,display:"flex",alignItems:"flex-start",justifyContent:"center",paddingTop:"15vh",backdropFilter:"blur(4px)"}}>
      <div style={{background:"var(--bg2)",borderRadius:18,width:"100%",maxWidth:560,boxShadow:"0 32px 80px rgba(0,0,0,.3)",overflow:"hidden",animation:"popIn .18s ease"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,padding:"14px 18px",borderBottom:"1px solid var(--border)"}}>
          <span style={{fontSize:18,color:"#94a3b8"}}>🔍</span>
          <input ref={inputRef} value={q} onChange={e=>setQ(e.target.value)} onKeyDown={handleKey} placeholder="Buscar tarefas, páginas..." style={{flex:1,border:"none",outline:"none",fontSize:15,fontFamily:"inherit",color:"#0f172a",background:"transparent"}}/>
          <kbd style={{padding:"2px 7px",borderRadius:5,background:"#f1f5f9",border:"1px solid #e2e8f0",fontSize:11,fontFamily:"monospace",color:"#64748b"}}>Esc</kbd>
        </div>
        {q.trim()===""&&(
          <div style={{padding:"20px 18px",fontSize:13,color:"#94a3b8",textAlign:"center"}}>Digite para buscar tarefas ou navegar entre páginas</div>
        )}
        {q.trim()!=""&&results.length===0&&(
          <div style={{padding:"20px 18px",fontSize:13,color:"#94a3b8",textAlign:"center"}}>Nenhum resultado para "{q}"</div>
        )}
        {results.length>0&&(
          <div style={{maxHeight:360,overflowY:"auto"}}>
            {results.map((r,i)=>(
              <div key={r.type+r.item.id} onClick={()=>go(r)}
                style={{padding:"10px 18px",cursor:"pointer",display:"flex",alignItems:"center",gap:12,background:i===sel?"#eef2ff":"transparent",borderBottom:"1px solid #f8fafc",transition:"background .1s"}}
                onMouseEnter={()=>setSel(i)}
              >
                {r.type==="page"&&(
                  <>
                    <span style={{fontSize:16,width:28,textAlign:"center"}}>{r.item.icon}</span>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:700,color:"#0f172a"}}>{r.item.label}</div>
                      <div style={{fontSize:11,color:"#94a3b8"}}>Página</div>
                    </div>
                    <span style={{fontSize:11,color:"#94a3b8"}}>→</span>
                  </>
                )}
                {r.type==="task"&&(()=>{const c=co(r.item);const s=st(r.item);return(
                  <>
                    <span style={{width:8,height:8,borderRadius:"50%",background:s.c,flexShrink:0}}/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,fontWeight:700,color:"#0f172a",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.item.title}</div>
                      <div style={{fontSize:11,color:"#94a3b8"}}>{s.l}{c?` · ${c.name}`:""}</div>
                    </div>
                    {r.item.dueDate&&<span style={{fontSize:11,color:"#94a3b8",whiteSpace:"nowrap"}}>{fmtDate(r.item.dueDate)}</span>}
                  </>
                );})()}
              </div>
            ))}
          </div>
        )}
        <div style={{padding:"8px 18px",borderTop:"1px solid #f1f5f9",display:"flex",gap:12,fontSize:11,color:"#94a3b8"}}>
          <span>↑↓ navegar</span><span>↵ abrir</span><span>Esc fechar</span>
        </div>
      </div>
    </div>
  );
}

/* ===========================================
   AUDITORIA PAGE */
function AuditoriaPage({data,setData}){
  const [tab,setTab]=useState("historico");
  const [filter,setFilter]=useState({user:"",action:"",dateFrom:"",dateTo:""});
  const [recDiag,setRecDiag]=useState(null);

  // Collect all history entries across all tasks
  const allHistory=useMemo(()=>{
    const entries=[];
    data.tasks.forEach(t=>{
      toArr(t.history).forEach(h=>{
        entries.push({...h,taskId:t.id,taskTitle:t.title,taskStatus:t.status,taskCompany:taskCompanies(t)[0]||""});
      });
    });
    return entries.sort((a,b)=>new Date(b.at||0)-new Date(a.at||0));
  },[data.tasks]);

  const filteredHistory=useMemo(()=>{
    return allHistory.filter(h=>{
      if(filter.user&&!h.user?.toLowerCase().includes(filter.user.toLowerCase())) return false;
      if(filter.action&&!h.changes?.toLowerCase().includes(filter.action.toLowerCase())) return false;
      if(filter.dateFrom&&h.at&&h.at<filter.dateFrom) return false;
      if(filter.dateTo&&h.at&&h.at.slice(0,10)>filter.dateTo) return false;
      return true;
    });
  },[allHistory,filter]);

  // Diagnose recurrence groups
  const recDiagnosis=useMemo(()=>{
    const groups={};
    data.tasks.forEach(t=>{
      if(!t._recGroup) return;
      if(!groups[t._recGroup]) groups[t._recGroup]={id:t._recGroup,tasks:[],title:t.title,company:taskCompanies(t)[0]||""};
      groups[t._recGroup].tasks.push(t);
    });
    return Object.values(groups).map(g=>{
      const active=g.tasks.filter(t=>t.status!=="done"&&t.status!=="archived");
      const done=g.tasks.filter(t=>t.status==="done");
      const overdue=active.filter(t=>isLate(t));
      const duplicates=g.tasks.filter((t,i,arr)=>arr.findIndex(x=>x.dueDate===t.dueDate&&x.status===t.status&&x.id!==t.id)>-1);
      const orphans=g.tasks.filter(t=>!t.dueDate);
      const issues=[];
      if(duplicates.length>0) issues.push({type:"duplicate",label:`${duplicates.length} tarefa(s) duplicada(s) por data`,tasks:duplicates});
      if(orphans.length>0) issues.push({type:"orphan",label:`${orphans.length} tarefa(s) sem data`,tasks:orphans});
      if(overdue.length>3) issues.push({type:"overdue",label:`${overdue.length} tarefas atrasadas acumuladas`,tasks:overdue});
      return {...g,active,done,overdue,duplicates,orphans,issues,hasIssues:issues.length>0};
    }).sort((a,b)=>b.hasIssues-a.hasIssues||(b.active.length-a.active.length));
  },[data.tasks]);

  const fixDuplicates=(grpId)=>{
    const g=recDiagnosis.find(x=>x.id===grpId);
    if(!g) return;
    // Keep one task per date (keep the most recent by id or done state)
    const byDate={};
    g.tasks.forEach(t=>{
      const k=t.dueDate||"nodate";
      if(!byDate[k]||t.status==="done") byDate[k]=t.id; // prefer done tasks
    });
    const keepIds=new Set(Object.values(byDate));
    const toRemove=g.tasks.filter(t=>!keepIds.has(t.id)).map(t=>t.id);
    if(toRemove.length===0){alert("Nenhum duplicado encontrado neste grupo.");return;}
    if(!window.confirm(`Remover ${toRemove.length} tarefa(s) duplicada(s) deste grupo?`)) return;
    setData(d=>({...d,tasks:d.tasks.filter(t=>!toRemove.includes(t.id))}));
  };

  const fixOrphans=(grpId)=>{
    const g=recDiagnosis.find(x=>x.id===grpId);
    if(!g) return;
    const orphanIds=g.tasks.filter(t=>!t.dueDate).map(t=>t.id);
    if(!window.confirm(`Remover ${orphanIds.length} tarefa(s) sem data deste grupo?`)) return;
    setData(d=>({...d,tasks:d.tasks.filter(t=>!orphanIds.includes(t.id))}));
  };

  const fixOverdueArchive=(grpId)=>{
    const today=todayStr();
    setData(d=>({...d,tasks:d.tasks.map(t=>{
      if(t._recGroup!==grpId||t.status==="done"||t.status==="archived") return t;
      if((t.dueDate||"")>=today) return t;
      return {...t,status:"archived",archivedAt:today};
    })}));
  };

  const ss={padding:"6px 9px",borderRadius:8,fontSize:12,border:"2px solid #e5e7eb",outline:"none",fontFamily:"inherit",background:"var(--bg2)",color:"var(--text)"};

  return(
    <div>
      <PH title="Auditoria" icon="🛡" badge={allHistory.length}/>
      <p style={{fontSize:13,color:"#64748b",marginBottom:16}}>Rastreie alterações, diagnostique erros em recorrências e monitore ações do sistema.</p>

      <div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap"}}>
        {[["historico","📋 Histórico de Alterações"],["recorrencias","🔄 Diagnóstico de Recorrências"],["sistema","⚙️ Integridade de Dados"]].map(([v,l])=>(
          <button key={v} onClick={()=>setTab(v)} style={{padding:"7px 16px",borderRadius:9,border:"none",background:tab===v?"#6366f1":"var(--bg3)",color:tab===v?"#fff":"#64748b",fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"inherit",transition:"all .15s"}}>{l}</button>
        ))}
      </div>

      {tab==="historico"&&(
        <div>
          {/* Filters */}
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14,padding:"10px 12px",background:"var(--bg3)",borderRadius:12,border:"1px solid var(--border)"}}>
            <input value={filter.user} onChange={e=>setFilter(f=>({...f,user:e.target.value}))} placeholder="🔍 Filtrar por usuário..." style={{...ss,minWidth:160}}/>
            <input value={filter.action} onChange={e=>setFilter(f=>({...f,action:e.target.value}))} placeholder="🔍 Filtrar por ação..." style={{...ss,minWidth:160}}/>
            <input type="date" value={filter.dateFrom} onChange={e=>setFilter(f=>({...f,dateFrom:e.target.value}))} style={ss}/>
            <input type="date" value={filter.dateTo} onChange={e=>setFilter(f=>({...f,dateTo:e.target.value}))} style={ss}/>
            <Btn onClick={()=>setFilter({user:"",action:"",dateFrom:"",dateTo:""})} v="ghost" sz="sm">× Limpar</Btn>
            <span style={{marginLeft:"auto",fontSize:12,color:"#94a3b8",alignSelf:"center"}}>{filteredHistory.length} registro{filteredHistory.length!==1?"s":""}</span>
          </div>
          {filteredHistory.length===0&&(
            <div style={{textAlign:"center",padding:"40px",color:"#94a3b8",border:"2px dashed var(--border)",borderRadius:14}}>
              <div style={{fontSize:40,marginBottom:8}}>📋</div>
              <div style={{fontSize:14,fontWeight:700}}>Nenhum registro encontrado</div>
              <div style={{fontSize:12,marginTop:4}}>O histórico é registrado ao editar tarefas (título, status, prioridade, prazo).</div>
            </div>
          )}
          <div style={{display:"flex",flexDirection:"column",gap:3}}>
            {filteredHistory.slice(0,200).map((h,i)=>{
              const co=data.companies.find(c=>c.id===h.taskCompany);
              return(
                <div key={i} style={{display:"flex",gap:12,padding:"10px 14px",background:"var(--bg2)",borderRadius:10,border:"1px solid var(--border)",alignItems:"flex-start"}}>
                  <div style={{width:32,height:32,borderRadius:9,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#fff",fontWeight:800,flexShrink:0}}>{(h.user||"?").slice(0,2).toUpperCase()}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:3}}>
                      <span style={{fontSize:13,fontWeight:800,color:"var(--text)"}}>{h.user||"Usuário"}</span>
                      {co&&<span style={{fontSize:11,color:co.color,fontWeight:700,background:co.color+"15",padding:"1px 6px",borderRadius:10}}>{co.logo} {co.name}</span>}
                      <span style={{fontSize:11,color:"#94a3b8",marginLeft:"auto"}}>{h.at?new Date(h.at).toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"}):"-"}</span>
                    </div>
                    <div style={{fontSize:11,color:"#64748b",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginBottom:2}}>
                      📋 <strong style={{color:"var(--text)"}}>{h.taskTitle}</strong>
                    </div>
                    <div style={{fontSize:12,color:"#374151",lineHeight:1.5}}>{h.changes}</div>
                  </div>
                </div>
              );
            })}
            {filteredHistory.length>200&&<div style={{textAlign:"center",padding:"12px",fontSize:12,color:"#94a3b8"}}>Mostrando 200 de {filteredHistory.length} registros. Use os filtros para refinar.</div>}
          </div>
        </div>
      )}

      {tab==="recorrencias"&&(
        <div>
          <p style={{fontSize:13,color:"#64748b",marginBottom:14}}>Identifique e corrija problemas em grupos de tarefas recorrentes: duplicatas, tarefas sem data, ou acúmulo de atrasos.</p>
          {recDiagnosis.length===0&&(
            <div style={{textAlign:"center",padding:"40px",color:"#94a3b8",border:"2px dashed var(--border)",borderRadius:14}}>
              <div style={{fontSize:40,marginBottom:8}}>🔄</div>
              <div style={{fontSize:14,fontWeight:700}}>Nenhum grupo recorrente encontrado</div>
            </div>
          )}
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {recDiagnosis.map(g=>{
              const co=data.companies.find(c=>c.id===g.company);
              return(
                <div key={g.id} style={{background:"var(--bg2)",borderRadius:14,padding:"14px 18px",border:`1.5px solid ${g.hasIssues?"#fecaca":"var(--border)"}`,boxShadow:"0 1px 4px rgba(0,0,0,.04)"}}>
                  <div style={{display:"flex",alignItems:"flex-start",gap:10,flexWrap:"wrap"}}>
                    <div style={{width:10,height:10,borderRadius:"50%",background:g.hasIssues?"#ef4444":g.overdue.length>0?"#f59e0b":"#22c55e",flexShrink:0,marginTop:4}}/>
                    <div style={{flex:1,minWidth:200}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:4}}>
                        <span style={{fontSize:13,fontWeight:800,color:"var(--text)"}}>{g.title}</span>
                        {co&&<span style={{fontSize:11,color:co.color,fontWeight:700,background:co.color+"15",padding:"1px 7px",borderRadius:10}}>{co.logo} {co.name}</span>}
                        {g.hasIssues&&<span style={{fontSize:11,color:"#ef4444",fontWeight:700,background:"#fef2f2",padding:"1px 8px",borderRadius:10,border:"1px solid #fecaca"}}>⚠ {g.issues.length} problema{g.issues.length>1?"s":""}</span>}
                      </div>
                      <div style={{display:"flex",gap:10,fontSize:12,color:"#64748b",flexWrap:"wrap",marginBottom:g.issues.length>0?10:0}}>
                        <span>📋 {g.active.length} pendente{g.active.length!==1?"s":""}</span>
                        <span style={{color:"#22c55e"}}>✓ {g.done.length} concluída{g.done.length!==1?"s":""}</span>
                        <span>📅 {g.tasks.length} total</span>
                        {g.overdue.length>0&&<span style={{color:"#ef4444",fontWeight:700}}>⚠ {g.overdue.length} atrasada{g.overdue.length!==1?"s":""}</span>}
                      </div>
                      {g.issues.length>0&&(
                        <div style={{display:"flex",flexDirection:"column",gap:6}}>
                          {g.issues.map((issue,ii)=>(
                            <div key={ii} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",borderRadius:8,background:"#fef2f2",border:"1px solid #fecaca"}}>
                              <span style={{fontSize:12,color:"#ef4444",fontWeight:700,flex:1}}>⚠ {issue.label}</span>
                              {issue.type==="duplicate"&&<Btn onClick={()=>fixDuplicates(g.id)} v="danger" sz="sm">🔧 Corrigir</Btn>}
                              {issue.type==="orphan"&&<Btn onClick={()=>fixOrphans(g.id)} v="danger" sz="sm">🔧 Remover</Btn>}
                              {issue.type==="overdue"&&<Btn onClick={()=>fixOverdueArchive(g.id)} v="ghost" sz="sm">📦 Arquivar atrasadas</Btn>}
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {tab==="sistema"&&(
        <div>
          <p style={{fontSize:13,color:"#64748b",marginBottom:14}}>Verifique a integridade dos dados e execute operações de manutenção.</p>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:12,marginBottom:20}}>
            {[
              {l:"Total de Tarefas",v:data.tasks.length,c:"#6366f1"},
              {l:"Tarefas Arquivadas",v:data.tasks.filter(t=>t.status==="archived").length,c:"#94a3b8"},
              {l:"Grupos Recorrentes",v:new Set(data.tasks.map(t=>t._recGroup).filter(Boolean)).size,c:"#8b5cf6"},
              {l:"Empresas Cadastradas",v:data.companies.length,c:"#14b8a6"},
              {l:"Colaboradores",v:data.collaborators.length,c:"#f59e0b"},
              {l:"Registros no Histórico",v:allHistory.length,c:"#22c55e"},
            ].map(({l,v,c})=>(
              <div key={l} style={{background:"var(--bg2)",borderRadius:12,padding:"16px",border:"1px solid var(--border)"}}>
                <div style={{fontSize:28,fontWeight:900,color:c,lineHeight:1}}>{v}</div>
                <div style={{fontSize:12,fontWeight:700,color:"#64748b",marginTop:4}}>{l}</div>
              </div>
            ))}
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {[
              {title:"Detectar e remover tarefas duplicadas",desc:"Remove tarefas com mesmo título, empresa e data",icon:"🔍",action:()=>{
                const seen=new Set();
                const dups=data.tasks.filter(t=>{
                  const key=`${t.title}|${t.company||""}|${t.dueDate||""}`;
                  if(seen.has(key)) return true;
                  seen.add(key); return false;
                });
                if(dups.length===0){alert("Nenhuma duplicata encontrada!");}
                else if(window.confirm(`Encontradas ${dups.length} tarefa(s) duplicada(s). Remover?`)){
                  setData(d=>({...d,tasks:d.tasks.filter(t=>!dups.map(x=>x.id).includes(t.id))}));
                  alert(`${dups.length} tarefa(s) removida(s).`);
                }
              }},
              {title:"Corrigir tarefas sem empresa",desc:"Lista tarefas ativas sem empresa vinculada",icon:"🏢",action:()=>{
                const orphans=data.tasks.filter(t=>t.status!=="archived"&&taskCompanies(t).length===0);
                alert(`${orphans.length} tarefa(s) sem empresa: ${orphans.slice(0,5).map(t=>t.title).join(", ")}${orphans.length>5?"...":""}`);
              }},
              {title:"Corrigir tarefas sem responsável",desc:"Lista tarefas ativas sem responsável atribuído",icon:"👤",action:()=>{
                const noAssignee=data.tasks.filter(t=>t.status!=="archived"&&t.status!=="done"&&toArr(t.assignees).length===0);
                alert(`${noAssignee.length} tarefa(s) sem responsável.`);
              }},
              {title:"Exportar relatório de auditoria",desc:"Baixa um JSON com todo o histórico de alterações",icon:"⬇️",action:()=>{
                const report={generatedAt:new Date().toISOString(),totalEntries:allHistory.length,entries:allHistory};
                const b=new Blob([JSON.stringify(report,null,2)],{type:"application/json"});
                const u=URL.createObjectURL(b);const a=document.createElement("a");
                a.href=u;a.download=`auditoria-${todayStr()}.json`;a.click();URL.revokeObjectURL(u);
              }},
            ].map(item=>(
              <div key={item.title} style={{display:"flex",alignItems:"center",gap:14,padding:"14px 18px",background:"var(--bg2)",borderRadius:12,border:"1px solid var(--border)"}}>
                <div style={{fontSize:24,flexShrink:0}}>{item.icon}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:800,color:"var(--text)",marginBottom:2}}>{item.title}</div>
                  <div style={{fontSize:11,color:"#64748b"}}>{item.desc}</div>
                </div>
                <Btn onClick={item.action} v="ghost" sz="sm">Executar</Btn>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* ===========================================
   APP ROOT */

function App(){
  const {user,loading:authLoading,signIn,signUp,signOut} = useAuth();
  const [data,setData,synced] = useSharedData();
  const {acquire,forceAcquire,release,getLock} = useLocks();
  const {list:toasts,add:toast} = useToast();
  const {ask:askDelete, modal:deleteModal} = useConfirmDelete();
  const [page,setPage]      = useState("dashboard");
  const [taskModal,setTM]   = useState({open:false,task:null,defStatus:"todo",lockInfo:null});
  const [sideCol,setSideCol]= useState(false);
  const [darkMode,setDarkMode] = useState(()=>localStorage.getItem("mdtec_dark")==="1");
  const [showSearch,setShowSearch] = useState(false);
  const [focusMode,setFocusMode] = useState(false);
  const [pomodoroTask,setPomodoroTask] = useState(null);
  const topbarRef = useRef(null);

  // Keep --topbar-h CSS var in sync with actual topbar height
  useEffect(()=>{
    if(!topbarRef.current) return;
    const obs=new ResizeObserver(()=>{
      const h=topbarRef.current?.offsetHeight||86;
      document.documentElement.style.setProperty("--topbar-h",h+"px");
    });
    obs.observe(topbarRef.current);
    return ()=>obs.disconnect();
  },[]);

  // Refs para acesso em callbacks sem re-registro de listeners
  const taskModalRef = useRef(taskModal);
  useEffect(()=>{ taskModalRef.current = taskModal; },[taskModal]);

  // Dark mode sync
  useEffect(()=>{
    document.body.classList.toggle("dark",darkMode);
    localStorage.setItem("mdtec_dark",darkMode?"1":"0");
  },[darkMode]);

  // Focus mode sync
  useEffect(()=>{
    const shell=document.querySelector(".shell");
    if(shell) shell.classList.toggle("focus-mode",focusMode);
  },[focusMode,page]);

  // Escuta erros de save do Supabase e exibe toast (antes dos returns condicionais)
  useEffect(()=>{
    const handler=(e)=>toast(`⚠️ Erro ao salvar: ${e.detail}`,"err",5000);
    window.addEventListener("mdtec_save_error",handler);
    return()=>window.removeEventListener("mdtec_save_error",handler);
  },[]);

  // Atalhos de teclado globais (antes dos returns condicionais)
  useEffect(()=>{
    const handler=(e)=>{
      // Cmd+K / Ctrl+K → busca global
      if((e.metaKey||e.ctrlKey)&&(e.key==="k"||e.key==="K")){e.preventDefault();setShowSearch(s=>!s);return;}
      if(["INPUT","TEXTAREA","SELECT"].includes(e.target.tagName)) return;
      if(e.metaKey||e.ctrlKey||e.altKey) return;
      const tm=taskModalRef.current;
      if(e.key==="n"||e.key==="N"){e.preventDefault();setTM({open:true,task:null,defStatus:"todo",lockInfo:null});}
      else if(e.key==="Escape"){if(tm.open) setTM(m=>({...m,open:false,lockInfo:null}));else setShowSearch(false);}
      else if(e.key==="k"||e.key==="K"){setPage("kanban");}
      else if(e.key==="l"||e.key==="L"){setPage("lista");}
      else if(e.key==="c"||e.key==="C"){setPage("calendario");}
      else if(e.key==="d"||e.key==="D"){setPage("dashboard");}
    };
    window.addEventListener("keydown",handler);
    return()=>window.removeEventListener("keydown",handler);
  },[]);

  // Arquivar tarefa manualmente
  const archiveTask=(id)=>{
    setData(d=>({...d,tasks:d.tasks.map(t=>t.id===id?{...t,status:"archived",archivedAt:todayStr()}:t)}));
    toast("📦 Tarefa arquivada.","ok");
  };

  // Auto-archive: tarefas concluídas há mais de archiveDays (padrão 7) dias
  // DEVE ficar ANTES dos early returns (regra dos hooks React)
  useEffect(()=>{
    if(!synced) return;
    const days=data.archiveDays||7;
    const cutoff=new Date();
    cutoff.setDate(cutoff.getDate()-days);
    const ids=[];
    data.tasks.forEach(t=>{
      if(t.status!=="done") return;
      const dt=new Date((t.completedAt||t.createdAt||"2000-01-01")+"T12:00:00");
      if(dt<cutoff) ids.push(t.id);
    });
    if(ids.length===0) return;
    const idSet=new Set(ids);
    setData(d=>({...d,tasks:d.tasks.map(t=>idSet.has(t.id)?{...t,status:"archived",archivedAt:todayStr()}:t)}));
    toast(`📦 ${ids.length} tarefa${ids.length>1?"s arquivadas automaticamente":"arquivada automaticamente"}.`,"ok");
  },[synced]); // eslint-disable-line react-hooks/exhaustive-deps

  // Encontrar colaborador vinculado ao email logado
  // Detectar colaborador pelo email do usuário logado
  const myCollab = (data?.collaborators||[]).find(c=>
    c.email && c.email.toLowerCase()===(user?.email||"").toLowerCase()
  );
  // isAdmin: tem accessLevel admin OU é Supabase Auth (dono) OU não achou collab E é Supabase Auth
  const isAdmin = user?._supabaseAuth
    ? (!myCollab || myCollab.accessLevel==="admin")
    : (myCollab?.accessLevel==="admin");
  const myCollabId = myCollab?.id || user?._collabId || null;

  // Alertar tarefas atrasadas via sino ao carregar
  useEffect(()=>{
    if(!synced||!myCollabId) return;
    const today=todayStr();
    const overdueMine=data.tasks.filter(t=>
      t.status!=="done"&&t.status!=="archived"&&
      t.dueDate&&t.dueDate<today&&
      toArr(t.assignees).includes(myCollabId)
    );
    if(overdueMine.length===0) return;
    // Only add if not already notified today
    const alreadyToday=(data.notifications||[]).some(n=>
      n.toId===myCollabId&&n.icon==="⚠️"&&(n.createdAt||"").slice(0,10)===today
    );
    if(alreadyToday) return;
    const txt=overdueMine.length===1
      ?`Tarefa atrasada: "${overdueMine[0].title}"`
      :`${overdueMine.length} tarefas atrasadas aguardando atenção`;
    setData(d=>({...d,notifications:[...(d.notifications||[]),{
      id:uid(),toId:myCollabId,icon:"⚠️",text:txt,page:"hoje",
      createdAt:new Date().toISOString(),read:false
    }]}));
  },[synced,myCollabId]); // eslint-disable-line react-hooks/exhaustive-deps

  // Auto-renovação: quando um grupo recorrente (_recGroup) não tem tarefas futuras
  // gera mais 4 semanas para ele — roda ao sincronizar
  useEffect(()=>{
    if(!synced) return;
    const today=new Date(); today.setHours(0,0,0,0);
    const horizon=new Date(today); horizon.setDate(today.getDate()+7); // renova quando restar ≤7 dias
    // Mapear todos os _recGroup existentes com suas tarefas ativas
    const groupMap={}; // recGroupId → {recurrence, tasks[], base tarefa}
    data.tasks.forEach(t=>{
      if(!t._recGroup||t.status==="archived") return;
      if(!groupMap[t._recGroup]) groupMap[t._recGroup]={tasks:[],base:null};
      groupMap[t._recGroup].tasks.push(t);
    });
    // Para cada grupo, verificar se tem tarefas futuras além do horizon
    const toAdd=[];
    Object.entries(groupMap).forEach(([grpId,grp])=>{
      // Encontrar o serviço ou recorrência original
      // Pegar tarefa de referência do grupo
      const sample=grp.tasks[0];
      if(!sample) return;
      // Descobrir recorrência via _serviceId → serviço → recorrência
      // OU via campo _recurrenceId se existir
      const svc=sample._serviceId?data.services.find(s=>s.id===sample._serviceId):null;
      const recId=svc?.recurrence||sample._recurrenceId||null;
      if(!recId) return;
      const rec=data.recurrences.find(r=>r.id===recId);
      if(!rec) return;
      // Verificar se a última tarefa pendente é antes do horizon
      const futurePending=grp.tasks.filter(t=>{
        if(t.status==="done"||t.status==="archived") return false;
        if(!t.dueDate) return false;
        return new Date(t.dueDate+"T12:00:00")>=today;
      });
      if(futurePending.length>0){
        const lastDate=futurePending.map(t=>t.dueDate).sort().pop();
        if(new Date(lastDate+"T12:00:00")>horizon) return; // ainda tem fôlego
      }
      // Precisa renovar — gerar próximas 4 semanas a partir de hoje
      const end=new Date(today); end.setDate(today.getDate()+28);
      const existingDates=new Set(grp.tasks.map(t=>t.dueDate||""));
      const cleanCk=(sample.checklist||[]).map(c=>({...c,id:uid(),done:false}));
      const base={...sample,status:"todo",completedAt:null,archivedAt:null,checklist:cleanCk};
      if(rec.interval==="daily"){
        for(let d=new Date(today);d<=end;d.setDate(d.getDate()+1)){
          const ds=d.toISOString().slice(0,10);
          if(!existingDates.has(ds)) toAdd.push({...base,id:uid(),dueDate:ds,createdAt:todayStr()});
        }
      } else if(rec.interval==="custom_days"&&Array.isArray(rec.days)&&rec.days.length>0){
        for(let d=new Date(today);d<=end;d.setDate(d.getDate()+1)){
          const ds=d.toISOString().slice(0,10);
          if(rec.days.includes(d.getDay())&&!existingDates.has(ds)) toAdd.push({...base,id:uid(),dueDate:ds,createdAt:todayStr()});
        }
      } else if(rec.interval==="weekly"){
        const tdow=sample.dueDate?new Date(sample.dueDate+"T12:00:00").getDay():today.getDay();
        for(let d=new Date(today);d<=end;d.setDate(d.getDate()+1)){
          const ds=d.toISOString().slice(0,10);
          if(d.getDay()===tdow&&!existingDates.has(ds)) toAdd.push({...base,id:uid(),dueDate:ds,createdAt:todayStr()});
        }
      } else if(rec.interval==="biweekly"){
        const tdow=sample.dueDate?new Date(sample.dueDate+"T12:00:00").getDay():today.getDay();
        let cnt=0;
        for(let d=new Date(today);d<=end;d.setDate(d.getDate()+1)){
          if(d.getDay()===tdow){
            const ds=d.toISOString().slice(0,10);
            if(cnt%2===0&&!existingDates.has(ds)) toAdd.push({...base,id:uid(),dueDate:ds,createdAt:todayStr()});
            cnt++;
          }
        }
      } else if(rec.interval==="monthly"){
        const targetDay=sample.dueDate?new Date(sample.dueDate+"T12:00:00").getDate():today.getDate();
        for(let m=0;m<3;m++){
          const d=new Date(today.getFullYear(),today.getMonth()+m,targetDay);
          const ds=d.toISOString().slice(0,10);
          if(d>=today&&!existingDates.has(ds)) toAdd.push({...base,id:uid(),dueDate:ds,createdAt:todayStr()});
        }
      } else if(rec.interval==="quarterly"){
        for(let q=0;q<2;q++){
          const d=new Date(today.getFullYear(),today.getMonth()+q*3,today.getDate());
          const ds=d.toISOString().slice(0,10);
          if(!existingDates.has(ds)) toAdd.push({...base,id:uid(),dueDate:ds,createdAt:todayStr()});
        }
      }
    });
    if(toAdd.length===0) return;
    setData(d=>({...d,tasks:[...d.tasks,...toAdd]}));
    toast(`↻ ${toAdd.length} tarefa${toAdd.length>1?"s recorrentes renovadas":"recorrente renovada"} automaticamente.`,"ok");
  },[synced]); // eslint-disable-line react-hooks/exhaustive-deps
  if(authLoading) return(
    <div style={{minHeight:"100dvh",display:"flex",alignItems:"center",justifyContent:"center",background:"#0f172a"}}>
      <div style={{textAlign:"center"}}>
        <div style={{width:48,height:48,borderRadius:14,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,color:"#fff",fontWeight:900,margin:"0 auto 16px"}}>M</div>
        <div style={{color:"#475569",fontSize:13}}>Carregando...</div>
      </div>
    </div>
  );

  // Não logado -> tela de login
  if(!user) return <LoginScreen onLogin={signIn}/>;

  // Dados ainda sincronizando
  if(!synced) return(
    <div style={{minHeight:"100dvh",display:"flex",alignItems:"center",justifyContent:"center",background:"#f1f5f9"}}>
      <div style={{textAlign:"center"}}>
        <div style={{width:48,height:48,borderRadius:14,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,color:"#fff",fontWeight:900,margin:"0 auto 16px"}}>M</div>
        <div style={{color:"#64748b",fontSize:13,fontWeight:600}}>Sincronizando dados...</div>
      </div>
    </div>
  );

  const userName = user.user_metadata?.name || user.email?.split("@")[0] || "Usuário";
  // Filtrar tarefas para o usuário atual
  // Admin vê tudo; colaboradores veem tarefas próprias + tarefas sem responsável
  const visibleTasks = isAdmin
    ? data.tasks
    : data.tasks.filter(t=>{
        const assignees=toArr(t.assignees);
        // Sem responsável OU inclui o usuário atual
        return assignees.length===0 || assignees.includes(myCollabId);
      });
  const dataForUser = isAdmin ? data : {...data, tasks: visibleTasks};

  const openNew=(status="todo")=>setTM({open:true,task:null,defStatus:status,lockInfo:null});

  const openEdit=(task)=>{
    const safeTask=sanitizeTask(task);
    const r=acquire(safeTask.id);
    if(!r.ok){
      setTM({open:true,task:safeTask,defStatus:safeTask.status,lockInfo:{user:r.holder}});
      toast(`🔒 ${r.holder} está editando esta tarefa.`,"lock",5000);
    } else {
      setTM({open:true,task:safeTask,defStatus:safeTask.status,lockInfo:null});
    }
  };

  const closeTask=()=>{
    if(taskModal.task) release(taskModal.task.id);
    setTM(m=>({...m,open:false,lockInfo:null}));
  };

  const forceLock=()=>{
    if(taskModal.task){ forceAcquire(taskModal.task.id); setTM(m=>({...m,lockInfo:null})); toast("✅ Você assumiu a edição.","ok"); }
  };


  // Gera tarefas reais independentes para recorrência (4 semanas à frente)
  const generateRecurringTasks=(base,rec)=>{
    const tasks=[];
    const today=new Date();
    today.setHours(0,0,0,0);
    const end=new Date(today);
    end.setDate(today.getDate()+28); // 4 semanas

    if(rec.interval==="daily"){
      for(let d=new Date(today);d<=end;d.setDate(d.getDate()+1)){
        const ds=d.toISOString().slice(0,10);
        tasks.push({...base,id:uid(),dueDate:ds,recurrence:"",_recGroup:base.id,createdAt:todayStr(),status:"todo",completedAt:null,checklist:(base.checklist||[]).map(c=>({...c,done:false}))});
      }
    } else if(rec.interval==="custom_days"&&Array.isArray(rec.days)&&rec.days.length>0){
      for(let d=new Date(today);d<=end;d.setDate(d.getDate()+1)){
        if(rec.days.includes(d.getDay())){
          const ds=d.toISOString().slice(0,10);
          tasks.push({...base,id:uid(),dueDate:ds,recurrence:"",_recGroup:base.id,createdAt:todayStr(),status:"todo",completedAt:null,checklist:(base.checklist||[]).map(c=>({...c,done:false}))});
        }
      }
    } else if(rec.interval==="weekly"){
      const targetDow=base.dueDate?new Date(base.dueDate+"T12:00:00").getDay():today.getDay();
      for(let d=new Date(today);d<=end;d.setDate(d.getDate()+1)){
        if(d.getDay()===targetDow){
          const ds=d.toISOString().slice(0,10);
          tasks.push({...base,id:uid(),dueDate:ds,recurrence:"",_recGroup:base.id,createdAt:todayStr(),status:"todo",completedAt:null,checklist:(base.checklist||[]).map(c=>({...c,done:false}))});
        }
      }
    } else if(rec.interval==="biweekly"){
      const targetDow=base.dueDate?new Date(base.dueDate+"T12:00:00").getDay():today.getDay();
      let count=0;
      for(let d=new Date(today);d<=end;d.setDate(d.getDate()+1)){
        if(d.getDay()===targetDow){
          if(count%2===0){
            const ds=d.toISOString().slice(0,10);
            tasks.push({...base,id:uid(),dueDate:ds,recurrence:"",_recGroup:base.id,createdAt:todayStr(),status:"todo",completedAt:null,checklist:(base.checklist||[]).map(c=>({...c,done:false}))});
          }
          count++;
        }
      }
    } else if(rec.interval==="monthly"){
      const targetDay=base.dueDate?new Date(base.dueDate+"T12:00:00").getDate():today.getDate();
      for(let m=0;m<3;m++){
        const d=new Date(today.getFullYear(),today.getMonth()+m,targetDay);
        if(d>=today){
          const ds=d.toISOString().slice(0,10);
          tasks.push({...base,id:uid(),dueDate:ds,recurrence:"",_recGroup:base.id,createdAt:todayStr(),status:"todo",completedAt:null,checklist:(base.checklist||[]).map(c=>({...c,done:false}))});
        }
      }
    } else if(rec.interval==="lastday"){
      // Último dia dos próximos 3 meses
      for(let m=0;m<3;m++){
        const d=new Date(today.getFullYear(),today.getMonth()+m+1,0); // dia 0 do mês seguinte = último dia do mês atual
        if(d>=today){
          const ds=d.toISOString().slice(0,10);
          tasks.push({...base,id:uid(),dueDate:ds,recurrence:"",_recGroup:base.id,createdAt:todayStr(),status:"todo",completedAt:null,checklist:(base.checklist||[]).map(c=>({...c,done:false}))});
        }
      }
    } else if(rec.interval==="quarterly"){
      for(let q=0;q<4;q++){
        const d=new Date(today.getFullYear(),today.getMonth()+q*3,base.dueDate?new Date(base.dueDate+"T12:00:00").getDate():today.getDate());
        if(d>=today){
          const ds=d.toISOString().slice(0,10);
          tasks.push({...base,id:uid(),dueDate:ds,recurrence:"",_recGroup:base.id,createdAt:todayStr(),status:"todo",completedAt:null,checklist:(base.checklist||[]).map(c=>({...c,done:false}))});
        }
      }
    } else if(rec.interval==="yearly"){
      const d=base.dueDate?new Date(base.dueDate+"T12:00:00"):today;
      const next=new Date(today.getFullYear(),d.getMonth(),d.getDate());
      if(next>=today){
        tasks.push({...base,id:uid(),dueDate:next.toISOString().slice(0,10),recurrence:"",_recGroup:base.id,createdAt:todayStr()});
      }
    }
    return tasks;
  };

  const saveTask=(updated)=>{
    const isNew=!data.tasks.find(t=>t.id===updated.id);
    // Detect new @mentions in comments and notify
    const prevComments=data.tasks.find(t=>t.id===updated.id)?.comments||[];
    const newComments=(updated.comments||[]).filter(nc=>!prevComments.find(pc=>pc.id===nc.id));
    newComments.forEach(comment=>{
      const mentionRe=/@([\w ]+?)(?=\s|$|@)/g;
      let match;
      while((match=mentionRe.exec(comment.text))!==null){
        const name=match[1].trim();
        const mentioned=data.collaborators.find(u=>u.name.toLowerCase()===name.toLowerCase());
        if(mentioned&&mentioned.id!==myCollabId){
          addNotification({toId:mentioned.id,icon:"💬",text:`💬 ${userName} mencionou você: "${comment.text.slice(0,60)}"`,page:"kanban"});
          if(mentioned.id===myCollabId) toast(`💬 ${userName} mencionou você!`,"mention",6000);
        }
      }
    });
    const base={
      ...updated,
      assignees: Array.isArray(updated.assignees)?updated.assignees:[],
      labels: Array.isArray(updated.labels)?updated.labels:[],
      checklist: Array.isArray(updated.checklist)?updated.checklist:[],
      dependencies: Array.isArray(updated.dependencies)?updated.dependencies:[],
      completedAt:updated.status==="done"&&!updated.completedAt?todayStr():updated.completedAt,
      // Normalize companies: always keep array + primary company alias
      companies: Array.isArray(updated.companies)&&updated.companies.length>0
        ? updated.companies
        : (updated.company?[updated.company]:[]),
      company: (Array.isArray(updated.companies)&&updated.companies[0])||updated.company||"",
    };

    // Se nova tarefa com recorrência: gerar cópias reais independentes
    if(isNew && base.recurrence){
      const rec=data.recurrences.find(r=>r.id===base.recurrence);
      if(rec){
        const copies=generateRecurringTasks(base,rec).map(t=>({...t,_recurrenceId:rec.id}));
        if(copies.length>0){
          setData(d=>({...d,tasks:[...d.tasks,...copies]}));
          if(taskModal.task) release(taskModal.task.id);
          setTM(m=>({...m,open:false}));
          toast(`✦ ${copies.length} tarefas recorrentes criadas!`,"ok");
          return;
        }
      }
    }

    // Se editar uma tarefa de série recorrente, perguntar se propaga
    if(!isNew && base._recGroup && !base.recurrence){
      const series=data.tasks.filter(t=>
        t._recGroup===base._recGroup &&
        t.id!==base.id &&
        t.status!=="done" && t.status!=="archived" &&
        (t.dueDate||"")>=(todayStr())
      );
      if(series.length>0){
        // Mostrar opção de propagar — usar um confirm simples por ora
        const propagate=window.confirm(
          `Esta tarefa pertence a uma série recorrente com ${series.length} ocorrência${series.length>1?"s":""}  futuras.\n\nDeseja aplicar as alterações de título, descrição, prioridade, setor e responsáveis a TODA A SÉRIE?`
        );
        if(propagate){
          setData(d=>({...d,tasks:d.tasks.map(t=>{
            if(t._recGroup!==base._recGroup||t.id===base.id||t.status==="done"||t.status==="archived") return t;
            if((t.dueDate||"")<todayStr()) return t; // não altera passadas
            return {...t,
              title:base.title,
              description:base.description,
              priority:base.priority,
              sector:base.sector,
              assignees:[...base.assignees],
              labels:[...base.labels],
            };
          })}));
          toast(`↻ Série atualizada em ${series.length} tarefa${series.length>1?"s":""}.`,"ok");
        }
      }
    }

    // Build history entry for edits
    let taskWithHistory=base;
    if(!isNew){
      const prev=data.tasks.find(t=>t.id===base.id);
      if(prev){
        const diffs=[];
        if(prev.title!==base.title) diffs.push(`Título: "${prev.title}" → "${base.title}"`);
        if(prev.status!==base.status){const sl=s=>STS.find(x=>x.id===s)?.l||s;diffs.push(`Status: ${sl(prev.status)} → ${sl(base.status)}`);}
        if(prev.priority!==base.priority){const pl=p=>PRI[p]?.l||p;diffs.push(`Prioridade: ${pl(prev.priority)} → ${pl(base.priority)}`);}
        if(prev.dueDate!==base.dueDate) diffs.push(`Prazo: ${prev.dueDate||"—"} → ${base.dueDate||"—"}`);
        if(prev.dueTime!==base.dueTime&&base.dueTime) diffs.push(`Hora: ${base.dueTime}`);
        if(diffs.length>0){
          const entry={user:userName||"Usuário",at:new Date().toISOString(),changes:diffs.join(" · ")};
          taskWithHistory={...base,history:[...toArr(base.history),entry]};
        }
      }
    }
    setData(d=>{
      const ex=d.tasks.find(t=>t.id===taskWithHistory.id);
      return {...d,tasks:ex?d.tasks.map(t=>t.id===taskWithHistory.id?taskWithHistory:t):[...d.tasks,taskWithHistory]};
    });
    if(taskModal.task) release(taskModal.task.id);
    setTM(m=>({...m,open:false}));
    toast(isNew?"✦ Tarefa criada!":"💾 Tarefa atualizada!","ok");
  };

  const deleteTask=(id)=>{
    const lk=getLock(id);
    if(lk){toast(`🔒 Não pode excluir: ${lk.user} está editando.`,"err");return;}
    const t=data.tasks.find(x=>x.id===id);
    askDelete(`Tarefa: "${t?.title||""}"`, ()=>{
      setData(d=>({...d,tasks:d.tasks.filter(t=>t.id!==id)}));
      toast("Tarefa excluída.","warn");
    });
  };

  const deduplicateTasks=()=>{
    const seen=new Set();
    const deduped=data.tasks.filter(t=>{
      const key=`${t.title}|${t.company||""}|${t.dueDate||""}|${t.recurrence||""}`;
      if(seen.has(key)) return false;
      seen.add(key); return true;
    });
    const removed=data.tasks.length-deduped.length;
    if(removed===0){toast("Nenhuma duplicata encontrada.","ok");return;}
    setData(d=>({...d,tasks:deduped}));
    toast(`${removed} tarefa${removed>1?"s duplicadas removidas":"duplicada removida"}!`,"ok");
  };

  const bulkUpdate=(action,ids,value)=>{
    if(action==="delete"){
      setData(d=>({...d,tasks:d.tasks.filter(t=>!ids.includes(t.id))}));
      toast(`🗑 ${ids.length} tarefa(s) excluída(s).`,"warn");
    } else if(action==="status"){
      setData(d=>({...d,tasks:d.tasks.map(t=>ids.includes(t.id)?{...t,status:value,completedAt:value==="done"?todayStr():(t.completedAt&&value!=="done"?null:t.completedAt)}:t)}));
      toast(`✅ ${ids.length} tarefa(s) movidas para ${STS.find(s=>s.id===value)?.l||value}.`,"ok");
    } else if(action==="priority"){
      setData(d=>({...d,tasks:d.tasks.map(t=>ids.includes(t.id)?{...t,priority:value}:t)}));
      toast(`🎯 Prioridade atualizada em ${ids.length} tarefa(s).`,"ok");
    } else if(action==="pin"){
      setData(d=>({...d,tasks:d.tasks.map(t=>ids.includes(t.id)?{...t,pinned:value}:t)}));
      toast(`📌 ${ids.length} tarefa(s) ${value?"fixadas":"desafixadas"}.`,"ok");
    }
  };

  const quickComplete=(task)=>{
    const lk=getLock(task.id);
    if(lk){toast(`🔒 ${lk.user} está editando. Aguarde.`,"lock",4000);return;}
    // Build cycle from full STS (respects custom statuses)
    const fullSTS=getFullSTS(data.customStatuses).filter(s=>s.id!=="backlog"&&s.id!=="archived");
    const cycleArr=fullSTS.sort((a,b)=>a.order-b.order).map(s=>s.id);
    const CYCLE=Object.fromEntries(cycleArr.map((id,i)=>[id,cycleArr[(i+1)%cycleArr.length]]));
    const LABELS=Object.fromEntries(fullSTS.map(s=>[s.id,s.l]));
    const cur=task.status||"todo";
    const next=CYCLE[cur]||"doing";
    // Se é tarefa recorrente e vai para "done", perguntar se é só hoje ou toda a série
    if(next==="done" && task._recGroup){
      const seriesFuture=data.tasks.filter(t=>
        t._recGroup===task._recGroup && t.id!==task.id &&
        t.status!=="done" && t.status!=="archived" &&
        (t.dueDate||"")>=(todayStr())
      );
      if(seriesFuture.length>0){
        // Só conclui esta — não altera as demais
        setData(d=>({...d,tasks:d.tasks.map(t=>t.id===task.id?{
          ...t,status:"done",completedAt:todayStr(),
          checklist:t.checklist.map(c=>({...c,done:true})),
        }:t)}));
        toast(`✓ Concluído (série continua com ${seriesFuture.length} ocorrência${seriesFuture.length>1?"s":""}).`,"ok");
        return;
      }
    }
    setData(d=>({...d,tasks:d.tasks.map(t=>t.id===task.id?{
      ...t,status:next,
      completedAt:next==="done"?todayStr():null,
      checklist:next==="done"
        ?t.checklist.map(c=>({...c,done:true}))
        :next==="todo"
          ?t.checklist.map(c=>({...c,done:false}))
          :t.checklist,
    }:t)}));
    toast(`→ ${LABELS[cur]}!`,"ok");
  };

  // Notificações
  const addNotification=(notif)=>{
    setData(d=>({...d,notifications:[...(d.notifications||[]),{id:uid(),createdAt:new Date().toISOString(),read:false,...notif}]}));
  };
  const markNotifRead=(id)=>{
    setData(d=>({...d,notifications:(d.notifications||[]).map(n=>n.id===id?{...n,read:true}:n)}));
  };
  const markAllNotifRead=(userId)=>{
    setData(d=>({...d,notifications:(d.notifications||[]).map(n=>n.toId===userId?{...n,read:true}:n)}));
  };

  // Drag & drop entre colunas do Kanban
  const dragStatusChange=(taskId,newStatus)=>{
    const lk=getLock(taskId);
    if(lk){toast(`🔒 ${lk.user} está editando.`,"lock",4000);return;}
    const statusLabel=STS.find(s=>s.id===newStatus)?.l||newStatus;
    setData(d=>({...d,tasks:d.tasks.map(t=>t.id===taskId?{
      ...t,status:newStatus,
      completedAt:newStatus==="done"?todayStr():(t.completedAt&&newStatus!=="done"?null:t.completedAt),
    }:t)}));
    toast(`→ ${statusLabel}!`,"ok");
  };

  const useTemplate=(tpl)=>{
    const nt={id:uid(),title:tpl.name,description:tpl.description,status:"todo",priority:"media",
      company:"",companies:[],sector:"",assignees:[],labels:tpl.labels,dueDate:"",
      checklist:tpl.checklist.map(text=>({id:uid(),text,done:false})),
      dependencies:[],recurrence:tpl.recurrence||"",createdAt:todayStr()};
    setTM({open:true,task:nt,defStatus:"todo",lockInfo:null});
    setPage("kanban");
  };

  const exportData=()=>{const b=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=`mdtec-backup-${todayStr()}.json`;a.click();URL.revokeObjectURL(u);toast("Backup exportado!","ok");};
  const importData=()=>{const i=document.createElement("input");i.type="file";i.accept=".json";i.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const p=JSON.parse(ev.target.result);if(p.tasks&&p.companies){setData(p);toast("Dados importados!","ok");}else toast("Arquivo inválido.","err");}catch{toast("Erro ao importar.","err");}};r.readAsText(f);};i.click();};
  const resetData=()=>{ askDelete("Todos os dados serão apagados e substituídos pelos dados iniciais!", ()=>{setData(SEED);toast("Dados restaurados.","warn");}); };

  const overdueCount=data.tasks.filter(t=>t.status!=="archived"&&isLate(t)).length;
  const doingCount  =data.tasks.filter(t=>t.status==="doing").length;
  const curPage     =NAV_GROUPS.flatMap(g=>g.items).find(i=>i.id===page);

  return(
    <div className="shell" style={{minHeight:"100dvh",width:"100%"}}>
      {/* Sidebar */}
      <aside className={`sidebar${sideCol?" slim":""}`}>
        <div className="sb-logo" style={{padding:sideCol?"14px 12px":"20px 16px",borderBottom:"1px solid rgba(255,255,255,.06)"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:36,height:36,borderRadius:10,flexShrink:0,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,color:"#fff",fontWeight:900,boxShadow:"0 4px 14px rgba(99,102,241,.5)"}}>M</div>
            {!sideCol&&<div><div style={{fontSize:14,fontWeight:900,color:"#f8fafc",lineHeight:1.2}}>MdTec Gestão</div><div style={{fontSize:10,color:"#475569",fontWeight:600}}>Sistema de Tarefas</div></div>}
          </div>
        </div>
        {!sideCol&&(
          <div className="sb-stats" style={{margin:"10px 12px",padding:"10px 12px",background:"rgba(255,255,255,.04)",borderRadius:10,border:"1px solid rgba(255,255,255,.06)"}}>
            <div style={{display:"flex",justifyContent:"space-between"}}>
              {[{v:data.tasks.length,l:"Total",c:"#818cf8"},{v:doingCount,l:"Andamento",c:"#fbbf24"},{v:overdueCount,l:"Atraso",c:overdueCount>0?"#f87171":"#475569"}].map(({v,l,c})=>(
                <div key={l} style={{textAlign:"center"}}>
                  <div style={{fontSize:16,fontWeight:900,color:c}}>{v}</div>
                  <div style={{fontSize:9,color:"#475569",fontWeight:600,textTransform:"uppercase",letterSpacing:".05em"}}>{l}</div>
                </div>
              ))}
            </div>
          </div>
        )}
        <nav className="sb-nav" style={{flex:1,padding:"8px 10px",overflowY:"auto",display:"flex",flexDirection:"column"}}>
          {NAV_GROUPS.filter(g=>isAdmin||g.label==="Visualizações"||g.label==="Relatórios").map(group=>(
            <div key={group.label} style={{marginBottom:8}}>
              {!sideCol&&<div className="sb-section-lbl" style={{fontSize:9,fontWeight:800,color:"#334155",textTransform:"uppercase",letterSpacing:".1em",padding:"8px 10px 4px"}}>{group.label}</div>}
              {group.items.map(item=>{
                const active=page===item.id;
                // Badge for chat: count unread notifications pointing to chat page
                const chatUnread=0;
                return(
                  <button key={item.id} className="nav-btn" onClick={()=>setPage(item.id)} title={sideCol?item.label:""} style={{width:"100%",display:"flex",alignItems:"center",gap:sideCol?0:10,padding:sideCol?"10px":"9px 10px",borderRadius:9,border:"none",cursor:"pointer",background:active?"rgba(99,102,241,.2)":"transparent",color:active?"#818cf8":"#64748b",fontSize:13,fontWeight:active?800:600,textAlign:"left",fontFamily:"inherit",transition:"all .12s",marginBottom:2,justifyContent:sideCol?"center":"flex-start"}}
                    onMouseEnter={e=>!active&&(e.currentTarget.style.background="rgba(255,255,255,.04)")}
                    onMouseLeave={e=>!active&&(e.currentTarget.style.background="transparent")}
                  >
                    <span className="nb-icon" style={{fontSize:15,width:sideCol?20:18,textAlign:"center",flexShrink:0,position:"relative"}}>
                      {item.icon}
                      {chatUnread>0&&<span style={{position:"absolute",top:-5,right:-6,width:14,height:14,borderRadius:"50%",background:"#ef4444",color:"#fff",fontSize:8,fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center",border:"1.5px solid #0f172a"}}>{chatUnread>9?"9+":chatUnread}</span>}
                    </span>
                    {!sideCol&&item.label}
                    {!sideCol&&chatUnread>0&&!active&&<span style={{marginLeft:"auto",padding:"1px 6px",borderRadius:10,background:"#ef4444",color:"#fff",fontSize:9,fontWeight:800}}>{chatUnread}</span>}
                    {!sideCol&&active&&<span className="nb-dot" style={{marginLeft:"auto",width:6,height:6,borderRadius:"50%",background:"#818cf8"}}/>}
                  </button>
                );
              })}
            </div>
          ))}
        </nav>
        <div className="sb-bottom" style={{padding:"10px 10px 14px",borderTop:"1px solid rgba(255,255,255,.06)"}}>
          {/* Usuário logado */}
          {!sideCol&&(
            <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",borderRadius:9,background:"rgba(255,255,255,.04)",marginBottom:8}}>
              <div style={{width:28,height:28,borderRadius:"50%",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#fff",fontWeight:800,flexShrink:0}}>{userName.slice(0,2).toUpperCase()}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:11,fontWeight:700,color:"#f8fafc",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{userName}</div>
                <div style={{fontSize:9,color:"#475569",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{user.email}</div>
              </div>
              <button onClick={signOut} aria-label="Sair" title="Sair" style={{background:"none",border:"none",cursor:"pointer",color:"#475569",fontSize:14,padding:2,flexShrink:0}} onMouseEnter={e=>e.currentTarget.style.color="#f87171"} onMouseLeave={e=>e.currentTarget.style.color="#475569"}>⎋</button>
            </div>
          )}
          {!sideCol&&<button onClick={openNew} style={{width:"100%",padding:"10px 0",borderRadius:10,border:"none",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",color:"#fff",fontSize:13,fontWeight:800,cursor:"pointer",fontFamily:"inherit",boxShadow:"0 4px 14px rgba(99,102,241,.4)",transition:"filter .15s",marginBottom:8,display:"flex",alignItems:"center",justifyContent:"center",gap:8}} onMouseEnter={e=>e.currentTarget.style.filter="brightness(.9)"} onMouseLeave={e=>e.currentTarget.style.filter="brightness(1)"}><span>+ Nova Tarefa</span><kbd style={{fontSize:9,padding:"1px 5px",borderRadius:4,background:"rgba(255,255,255,.2)",fontFamily:"monospace",fontWeight:700}}>N</kbd></button>}
          {!sideCol&&(
            <div style={{display:"flex",gap:4,marginBottom:8}}>
              <button onClick={exportData} aria-label="Exportar dados como JSON" title="Exportar JSON" style={{flex:1,padding:"5px",borderRadius:6,border:"1px solid rgba(255,255,255,.07)",background:"transparent",color:"#475569",cursor:"pointer",fontSize:10,fontFamily:"inherit"}} onMouseEnter={e=>e.currentTarget.style.color="#94a3b8"} onMouseLeave={e=>e.currentTarget.style.color="#475569"}>⬇ Export</button>
              <button onClick={importData} aria-label="Importar dados de arquivo JSON" title="Importar JSON" style={{flex:1,padding:"5px",borderRadius:6,border:"1px solid rgba(255,255,255,.07)",background:"transparent",color:"#475569",cursor:"pointer",fontSize:10,fontFamily:"inherit"}} onMouseEnter={e=>e.currentTarget.style.color="#94a3b8"} onMouseLeave={e=>e.currentTarget.style.color="#475569"}>⬆ Import</button>
              <button onClick={resetData} aria-label="Restaurar dados padrão" title="Restaurar dados" style={{padding:"5px 8px",borderRadius:6,border:"1px solid rgba(239,68,68,.18)",background:"transparent",color:"#475569",cursor:"pointer",fontSize:10,fontFamily:"inherit"}} onMouseEnter={e=>e.currentTarget.style.color="#f87171"} onMouseLeave={e=>e.currentTarget.style.color="#475569"}>⟳</button>
            </div>
          )}
          <button onClick={()=>setSideCol(s=>!s)} style={{width:"100%",padding:"7px",borderRadius:8,border:"1px solid rgba(255,255,255,.06)",background:"transparent",color:"#475569",cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"inherit",gap:4}} onMouseEnter={e=>e.currentTarget.style.color="#94a3b8"} onMouseLeave={e=>e.currentTarget.style.color="#475569"}>
            {sideCol?"›":"‹"}{!sideCol&&<span style={{fontSize:10}}>Recolher</span>}
          </button>
        </div>
      </aside>

      {/* Conteúdo principal */}
      <main className="main-content">
        <div ref={topbarRef} className="topbar" style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:20,gap:12,position:"sticky",top:0,zIndex:55,background:"var(--bg)",padding:"16px 0 12px",margin:"0 0 12px",borderBottom:"1px solid var(--border)"}}>
          <div>
            <h1 style={{fontSize:26,fontWeight:900,color:"#0f172a",lineHeight:1.1,letterSpacing:"-.02em"}}>{curPage?.icon} {curPage?.label}</h1>
            <p style={{fontSize:13,color:"#94a3b8",marginTop:4,fontWeight:500}}>{new Date().toLocaleDateString("pt-BR",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}</p>
          </div>
          <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
            {overdueCount>0&&(
              <div style={{display:"flex",alignItems:"center",gap:6,padding:"6px 12px",borderRadius:10,background:"#fef2f2",border:"1px solid #fecaca"}}>
                <span style={{width:8,height:8,borderRadius:"50%",background:"#ef4444",animation:"pulse 2s infinite"}}/>
                <span style={{fontSize:12,fontWeight:700,color:"#ef4444"}}>{overdueCount} atrasada{overdueCount>1?"s":""}</span>
              </div>
            )}
            {/* Notificações */}
            <NotificationBell
              notifications={data.notifications||[]}
              onRead={markNotifRead}
              onReadAll={markAllNotifRead}
              onNavigate={setPage}
              currentUserId={myCollabId}
            />
            {/* Busca Global */}
            <button onClick={()=>setShowSearch(true)} title="Busca global (Ctrl+K)" aria-label="Abrir busca global" style={{display:"flex",alignItems:"center",gap:6,padding:"6px 12px",borderRadius:10,border:"1.5px solid #e2e8f0",background:"var(--bg3)",color:"#64748b",cursor:"pointer",fontSize:12,fontWeight:600,fontFamily:"inherit",transition:"all .15s"}} onMouseEnter={e=>{e.currentTarget.style.borderColor="#6366f1";e.currentTarget.style.color="#6366f1";}} onMouseLeave={e=>{e.currentTarget.style.borderColor="#e2e8f0";e.currentTarget.style.color="#64748b";}}>
              🔍 <span style={{fontSize:11}}>Buscar</span><kbd style={{fontSize:9,padding:"1px 5px",borderRadius:4,background:"#e2e8f0",fontFamily:"monospace",marginLeft:2}}>⌘K</kbd>
            </button>
            {/* Dark Mode */}
            <button onClick={()=>setDarkMode(d=>!d)} title={darkMode?"Modo claro":"Modo escuro"} aria-label="Alternar tema" style={{width:34,height:34,borderRadius:"50%",border:"1.5px solid #e2e8f0",background:darkMode?"#1e293b":"#f8fafc",color:darkMode?"#f59e0b":"#64748b",cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",transition:"all .2s"}}>{darkMode?"☀️":"🌙"}</button>
            {/* Modo Foco — só no Kanban */}
            <button onClick={()=>setFocusMode(f=>!f)} title={focusMode?"Sair do modo foco":"Modo foco (tela cheia)"} aria-label="Modo foco" style={{width:34,height:34,borderRadius:"50%",border:`1.5px solid ${focusMode?"#6366f1":"#e2e8f0"}`,background:focusMode?"#6366f1":"#f8fafc",color:focusMode?"#fff":"#64748b",cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",transition:"all .2s",fontWeight:900}}>{focusMode?"✕":"⛶"}</button>
            {["kanban","lista","tabela","calendario"].includes(page)&&<Btn onClick={openNew}>+ Nova Tarefa</Btn>}
          </div>
        </div>

        {page==="dashboard"     && <Dashboard data={dataForUser}/>}
        {page==="kanban"        && <>
          {focusMode&&(
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,padding:"10px 16px",background:"var(--bg2)",borderRadius:12,border:"1px solid var(--border)",boxShadow:"0 2px 8px rgba(0,0,0,.08)"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:28,height:28,borderRadius:8,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,color:"#fff",fontWeight:900}}>M</div>
                <span style={{fontSize:14,fontWeight:800,color:"#0f172a"}}>Modo Foco — Kanban</span>
              </div>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <Btn onClick={openNew} sz="sm">+ Nova Tarefa</Btn>
                <button onClick={()=>setFocusMode(false)} style={{padding:"5px 12px",borderRadius:8,border:"1.5px solid #e2e8f0",background:"var(--bg3)",color:"#64748b",cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:"inherit"}} onMouseEnter={e=>{e.currentTarget.style.borderColor="#ef4444";e.currentTarget.style.color="#ef4444";}} onMouseLeave={e=>{e.currentTarget.style.borderColor="#e2e8f0";e.currentTarget.style.color="#64748b";}}>✕ Sair do foco</button>
              </div>
            </div>
          )}
          <KanbanView data={dataForUser} onEdit={openEdit} onDelete={deleteTask} onAdd={openNew} onComplete={quickComplete} onStatusChange={dragStatusChange} myCollabId={myCollabId} myCollab={myCollab} onArchive={archiveTask} onPomodoro={t=>setPomodoroTask(t)}
            onPin={(id,val)=>{setData(d=>({...d,tasks:d.tasks.map(t=>t.id===id?{...t,pinned:val}:t)}));toast(val?"📌 Tarefa fixada no topo!":"📍 Tarefa desafixada.","ok");}}
            onMoveTop={(id,colId)=>{
              setData(d=>{
                const tasks=[...d.tasks];
                const idx=tasks.findIndex(t=>t.id===id);
                if(idx<0) return d;
                // Find the earliest position in the same column
                const firstInCol=tasks.findIndex(t=>t.status===colId&&!t.pinned);
                if(idx===firstInCol||firstInCol<0) return d;
                const [moved]=tasks.splice(idx,1);
                const insertAt=firstInCol>idx?firstInCol-1:firstInCol;
                tasks.splice(insertAt,0,moved);
                return {...d,tasks};
              });
              toast("⬆ Tarefa movida para o topo!","ok");
            }}
          />
        </>}
        {page==="lista"         && <ListView data={dataForUser} onEdit={openEdit} onDelete={deleteTask} onComplete={quickComplete} onBulkUpdate={bulkUpdate}/>}
        {page==="hoje"          && <HojePage data={dataForUser} myCollabId={myCollabId} onEdit={openEdit} onDelete={deleteTask} onComplete={quickComplete} onAdd={openNew}/>}
        {page==="minhas"        && <MinhasTarefasPage data={{...dataForUser, tasks: (myCollabId ? dataForUser.tasks.filter(t=>t.assignees?.includes(myCollabId)) : dataForUser.tasks).filter(t=>t.status!=="archived")}} onEdit={openEdit} onDelete={deleteTask} onComplete={quickComplete}/>}
        {page==="calendario"    && <CalView data={dataForUser} onEdit={openEdit} onReschedule={(id,date)=>{setData(d=>({...d,tasks:d.tasks.map(t=>t.id===id?{...t,dueDate:date}:t)}));toast(`📅 Reagendado para ${date}.`,"ok");}}/>}
        {page==="tabela"        && <GridView data={dataForUser} onEdit={openEdit} onDelete={deleteTask} onComplete={quickComplete}/>}
        {page==="gantt"         && <GanttView data={dataForUser} onEdit={openEdit}/>}
        {page==="relatorio"     && <RelatorioPage data={data} isAdmin={isAdmin}/>}
        {page==="servicos"      && <ServicosPage data={data} setData={setData}/>}
        {page==="modelos"       && <TemplatesPage data={data} setData={setData} onUseTemplate={useTemplate}/>}
        {page==="empresas"      && <CompaniesPage data={data} setData={setData}/>}
        {page==="setores"       && <SectorsPage data={data} setData={setData}/>}
        {page==="colaboradores" && <CollaboratorsPage data={data} setData={setData}/>}
        {page==="marcadores"    && <LabelsPage data={data} setData={setData}/>}
        {page==="recorrencias"  && <RecurrencesPage data={data} setData={setData}/>}
        {page==="painel-rec"    && <PainelRecorrencias data={data} setData={setData} onEdit={openEdit} toast={toast}/>}
        {page==="arquivadas"    && <ArchivedPage data={data} setData={setData} toast={toast}/>}
        {page==="configuracoes" && <ConfigPage data={data} setData={setData} toast={toast} deduplicateTasks={deduplicateTasks}/>}
        {page==="auditoria"     && <AuditoriaPage data={data} setData={setData}/>}
      </main>

      {/* Modal de tarefa */}
      <Modal open={taskModal.open} onClose={closeTask}
        title={taskModal.task&&data.tasks.find(t=>t.id===taskModal.task?.id)?"✎ Editar Tarefa":"✦ Nova Tarefa"}
        width={650}
      >
        {taskModal.open&&(
          <TaskForm
            key={taskModal.task?.id||"new"}
            data={data}
            task={taskModal.task}
            defStatus={taskModal.defStatus}
            onSave={saveTask}
            onClose={closeTask}
            onDelete={deleteTask}
            lockInfo={taskModal.lockInfo}
            onForce={forceLock}
            currentUser={userName}
          />
        )}
      </Modal>

      {deleteModal}
      <Toasts list={toasts}/>
      {pomodoroTask&&<PomodoroTimer taskTitle={pomodoroTask.title} onClose={()=>setPomodoroTask(null)}/>}
      <ChatWidget data={data} setData={setData} currentUser={userName} currentUserId={myCollabId} myCollab={myCollab}/>
      <MentionAlertBanner
        notifications={data.notifications||[]}
        currentUserId={myCollabId}
        onRead={markNotifRead}
        onNavigate={setPage}
      />
      {showSearch&&<GlobalSearch data={dataForUser} onEdit={(task)=>{openEdit(task);}} onNavigate={(p)=>setPage(p)} onClose={()=>setShowSearch(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
