/* ═══════════════════════════════════════════
   AUTH HOOK
═══════════════════════════════════════════ */
function useAuth() {
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    // Sessão atual
    sb.auth.getSession().then(({ data: { session } }) => {
      setUser(session?.user ?? null);
      setLoading(false);
    });
    // Escuta mudanças de sessão
    const { data: { subscription } } = sb.auth.onAuthStateChange((_event, session) => {
      setUser(session?.user ?? null);
    });
    return () => subscription.unsubscribe();
  }, []);

  const signIn = async (email, password) => {
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) throw error;
  };

  const signUp = async (email, password, name) => {
    const { error } = await sb.auth.signUp({
      email, password,
      options: { data: { name } }
    });
    if (error) throw error;
  };

  const signOut = () => sb.auth.signOut();

  return { user, loading, signIn, signUp, signOut };
}

/* ═══════════════════════════════════════════
   SUPABASE DATA HOOK
   Substitui useSharedData — agora tudo vai
   para o banco de dados online em tempo real
═══════════════════════════════════════════ */
function useSharedData() {
  const [data, setRaw] = useState(SEED);
  const [synced, setSynced] = useState(false);

  // Carrega dados do Supabase
  const load = useCallback(async () => {
    try {
      const { data: row } = await sb
        .from("app_data")
        .select("payload")
        .eq("id", 1)
        .single();

      if (row?.payload) {
        const p = row.payload;
        if (!p.sectors) p.sectors = SEED.sectors;
        p.tasks = (p.tasks || []).map(t => ({ sector: "", recurrence: null, dependencies: [], ...t }));
        setRaw(p);
      } else {
        // Primeira vez — salva o seed
        await sb.from("app_data").upsert({ id: 1, payload: SEED });
        setRaw(SEED);
      }
      setSynced(true);
    } catch (e) {
      console.error("Erro ao carregar dados:", e);
      setSynced(true);
    }
  }, []);

  useEffect(() => {
    load();

    // Escuta mudanças em tempo real (Realtime)
    const channel = sb
      .channel("app_data_changes")
      .on("postgres_changes", {
        event: "UPDATE",
        schema: "public",
        table: "app_data",
        filter: "id=eq.1"
      }, (payload) => {
        if (payload.new?.payload) {
          const p = payload.new.payload;
          if (!p.sectors) p.sectors = SEED.sectors;
          p.tasks = (p.tasks || []).map(t => ({ sector: "", recurrence: null, dependencies: [], ...t }));
          setRaw(p);
        }
      })
      .subscribe();

    return () => sb.removeChannel(channel);
  }, [load]);

  const setData = useCallback(async (updater) => {
    setRaw(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      // Salva no Supabase de forma assíncrona
      sb.from("app_data").upsert({ id: 1, payload: next }).then(({ error }) => {
        if (error) console.error("Erro ao salvar:", error);
      });
      return next;
    });
  }, []);

  return [data, setData, synced];
}

function useLocks(){
  const [locks,setLocksState]=useState(()=>{
    try{return JSON.parse(localStorage.getItem(LOCK_KEY)||"{}");}catch{return {};}
  });
  const bcRef=useRef(null);

  const pruneExpired=useCallback(raw=>{
    const now=Date.now(),out={};
    Object.entries(raw).forEach(([k,v])=>{if(now-v.ts<LOCK_TTL)out[k]=v;});
    return out;
  },[]);

  const persist=useCallback(l=>{
    localStorage.setItem(LOCK_KEY,JSON.stringify(l));
    setLocksState(l);
    bcRef.current?.postMessage({t:"locks",l});
  },[]);

  useEffect(()=>{
    try{
      bcRef.current=new BroadcastChannel("mdtec_locks_v6");
      bcRef.current.onmessage=e=>{if(e.data?.t==="locks")setLocksState(e.data.l);};
    }catch(e){}

    // Heartbeat: keep own locks alive, prune stale ones
    const iv=setInterval(()=>{
      try{
        const raw=pruneExpired(JSON.parse(localStorage.getItem(LOCK_KEY)||"{}"));
        Object.entries(raw).forEach(([k,v])=>{if(v.sid===SESSION_ID)raw[k]={...v,ts:Date.now()};});
        persist(raw);
      }catch(e){}
    },8000);

    // Release own locks on tab close
    const onUnload=()=>{
      try{
        const raw=pruneExpired(JSON.parse(localStorage.getItem(LOCK_KEY)||"{}"));
        const cleaned={};
        Object.entries(raw).forEach(([k,v])=>{if(v.sid!==SESSION_ID)cleaned[k]=v;});
        localStorage.setItem(LOCK_KEY,JSON.stringify(cleaned));
        bcRef.current?.postMessage({t:"locks",l:cleaned});
      }catch(e){}
    };
    window.addEventListener("beforeunload",onUnload);
    return()=>{clearInterval(iv);bcRef.current?.close();window.removeEventListener("beforeunload",onUnload);};
  },[persist,pruneExpired]);

  // Try to acquire a lock. Returns {ok:true} or {ok:false, holder:"Name"}
  const acquire=useCallback(taskId=>{
    try{
      const raw=pruneExpired(JSON.parse(localStorage.getItem(LOCK_KEY)||"{}"));
      const ex=raw[taskId];
      if(ex&&ex.sid!==SESSION_ID&&Date.now()-ex.ts<LOCK_TTL)return{ok:false,holder:ex.user};
      persist({...raw,[taskId]:{sid:SESSION_ID,user:MY_NAME,ts:Date.now()}});
      return{ok:true};
    }catch{return{ok:true};}
  },[persist,pruneExpired]);

  // Force-acquire (override another user's lock)
  const forceAcquire=useCallback(taskId=>{
    try{
      const raw=pruneExpired(JSON.parse(localStorage.getItem(LOCK_KEY)||"{}"));
      persist({...raw,[taskId]:{sid:SESSION_ID,user:MY_NAME,ts:Date.now()}});
    }catch(e){}
  },[persist,pruneExpired]);

  // Release own lock on a task
  const release=useCallback(taskId=>{
    try{
      const raw=pruneExpired(JSON.parse(localStorage.getItem(LOCK_KEY)||"{}"));
      if(raw[taskId]?.sid===SESSION_ID){delete raw[taskId];persist(raw);}
    }catch(e){}
  },[persist,pruneExpired]);

  // Get lock info if ANOTHER user holds it, else null
  const getLock=useCallback(taskId=>{
    const l=locks[taskId];
    if(!l||l.sid===SESSION_ID||Date.now()-l.ts>=LOCK_TTL)return null;
    return l;
  },[locks]);

  return{acquire,forceAcquire,release,getLock};
}

function useToast(){
  const [list,setList]=useState([]);
  const add=useCallback((msg,type="ok",ms=3800)=>{
    const id=uid();
    setList(p=>[...p.slice(-4),{id,msg,type}]);
    setTimeout(()=>setList(p=>p.filter(t=>t.id!==id)),ms);
  },[]);
  return{list,add};
}

function Toasts({list}){

    </div>
  );

/* ═══════════════════════════════════════════
   FILTERS
═══════════════════════════════════════════ */
function applyFilters(tasks,f){
  return tasks.filter(t=>{
    if(f.search&&!t.title.toLowerCase().includes(f.search.toLowerCase()))return false;
    if(f.status&&t.status!==f.status)return false;
    if(f.priority&&t.priority!==f.priority)return false;
    if(f.company&&t.company!==f.company)return false;
    if(f.sector&&t.sector!==f.sector)return false;
    if(f.label&&!t.labels.includes(f.label))return false;
    if(f.assignee&&!t.assignees.includes(f.assignee))return false;
    if(f.month!=null&&f.month!==""&&t.dueDate){const d=new Date(t.dueDate+"T12:00:00");if(d.getMonth()!==+f.month)return false;}
    if(f.year&&t.dueDate){const d=new Date(t.dueDate+"T12:00:00");if(d.getFullYear()!==+f.year)return false;}
    return true;
  });
}

    <div className="fbar" style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16,padding:"10px 12px",background:"#f8fafc",borderRadius:12,border:"1px solid #f1f5f9",alignItems:"center"}}>

      <select style={ss} value={filters.priority||""} onChange={e=>sf("priority",e.target.value)}><option value="">Prioridade</option>{Object.entries(PRI).map(([k,v])=><option key={k} value={k}>{v.l}</option>)}</select>
      <select style={ss} value={filters.company||""} onChange={e=>sf("company",e.target.value)}><option value="">Empresa</option>{data.companies.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select>
      <select style={ss} value={filters.sector||""} onChange={e=>sf("sector",e.target.value)}><option value="">Setor</option>{data.sectors.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</select>
      <select style={ss} value={filters.label||""} onChange={e=>sf("label",e.target.value)}><option value="">Marcador</option>{data.labels.map(l=><option key={l.id} value={l.id}>{l.name}</option>)}</select>
      <select style={ss} value={filters.assignee||""} onChange={e=>sf("assignee",e.target.value)}><option value="">Responsável</option>{data.collaborators.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}</select>

      </>}
      {any&&<Btn onClick={()=>setF({})} v="ghost" sz="sm">× Limpar</Btn>}

  );
}

  const company=data.companies.find(c=>c.id===task.company);
  const ckDone=task.checklist.filter(c=>c.done).length;
  const ckTot=task.checklist.length;
  const prog=ckTot>0?Math.round((ckDone/ckTot)*100):null;
  const over=isLate(task);

  return(

      {labels.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:8,paddingRight:36}}>{labels.map(l=><Chip key={l.id} label={l.name} color={l.color}/>)}</div>}

        {sector&&<span style={{fontSize:11,padding:"2px 7px",borderRadius:20,background:sector.color+"18",color:sector.color,fontWeight:600}}>{sector.name}</span>}
        {task.dueDate&&<span style={{fontSize:11,color:over?"#ef4444":"#94a3b8",fontWeight:over?800:400}}>📅 {fmtDate(task.dueDate)}</span>}

/* ═══════════════════════════════════════════
   CALENDAR VIEW
═══════════════════════════════════════════ */
function CalView({data,onEdit}){
  const now=new Date();
  const [m,sm]=useState(now.getMonth());
  const [y,sy]=useState(now.getFullYear());
  const wD=["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
  const dim=new Date(y,m+1,0).getDate(),fd=new Date(y,m,1).getDay();
  const tbd=useMemo(()=>{const mp={};data.tasks.forEach(t=>{if(!t.dueDate)return;const d=new Date(t.dueDate+"T12:00:00");if(d.getMonth()===m&&d.getFullYear()===y){const day=d.getDate();mp[day]=[...(mp[day]||[]),t];}});return mp;},[data.tasks,m,y]);
  const cells=[];for(let i=0;i<fd;i++)cells.push(null);for(let i=1;i<=dim;i++)cells.push(i);
  const prev=()=>{if(m===0){sm(11);sy(y-1);}else sm(m-1);};
  const next=()=>{if(m===11){sm(0);sy(y+1);}else sm(m+1);};
  return(
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18}}>
        <button onClick={prev} style={{background:"#f1f5f9",border:"none",borderRadius:9,width:38,height:38,cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
        <h3 style={{fontSize:17,fontWeight:800,color:"#0f172a"}}>{MN[m]} {y}</h3>
        <button onClick={next} style={{background:"#f1f5f9",border:"none",borderRadius:9,width:38,height:38,cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:4}}>
        {wD.map(d=><div key={d} style={{textAlign:"center",fontSize:10,fontWeight:800,color:"#94a3b8",padding:"4px 0"}}>{d}</div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
        {cells.map((day,i)=>{
          if(!day)return<div key={`e${i}`}/>;
          const isT=day===now.getDate()&&m===now.getMonth()&&y===now.getFullYear();
          const tasks=tbd[day]||[];
          return(
            <div key={day} style={{minHeight:78,padding:5,borderRadius:9,background:isT?"#eef2ff":"#fafafa",border:`1.5px solid ${isT?"#6366f1":"#f1f5f9"}`}}>
              <div style={{fontSize:11,fontWeight:800,width:22,height:22,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:"50%",background:isT?"#6366f1":"transparent",color:isT?"#fff":"#374151",marginBottom:3}}>{day}</div>
              {tasks.slice(0,2).map(t=>{const st=STS.find(s=>s.id===t.status);return<div key={t.id} onClick={()=>onEdit(t)} title={t.title} style={{fontSize:9,fontWeight:700,padding:"2px 4px",borderRadius:4,marginBottom:2,background:st.c+"20",color:st.c,cursor:"pointer",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{t.title}</div>;})}
              {tasks.length>2&&<div style={{fontSize:9,color:"#94a3b8"}}>+{tasks.length-2}</div>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════

function GridView({data,onEdit,onDelete,onComplete}){

  const SH=({f:fk,l})=><button onClick={()=>ts(fk)} style={{background:"none",border:"none",cursor:"pointer",fontSize:10,fontWeight:800,color:sort.k===fk?"#6366f1":"#94a3b8",textTransform:"uppercase",letterSpacing:".05em",fontFamily:"inherit",display:"flex",alignItems:"center",gap:2}}>{l} {sort.k===fk?(sort.dir==="asc"?"↑":"↓"):"↕"}</button>;
  return(
    <div>
      <FBar data={data} filters={fl} setF={sfl}/>
      <div className="scroll-x">
        <div style={{borderRadius:14,border:"1px solid #f1f5f9",overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,.05)",background:"#fff"}}>

            <div style={{fontSize:10,fontWeight:800,color:"#94a3b8",textTransform:"uppercase"}}>Empresa</div>
            <div style={{fontSize:10,fontWeight:800,color:"#94a3b8",textTransform:"uppercase"}}>Setor</div>
            <div style={{fontSize:10,fontWeight:800,color:"#94a3b8",textTransform:"uppercase"}}>Resp.</div>

      <div style={{marginTop:7,fontSize:12,color:"#94a3b8"}}>{sorted.length} tarefa{sorted.length!==1?"s":""}</div>

}

function RecurrencesPage({ data, setData }) {
  const [open,setOpen]=useState(false);
  const [editing,setEditing]=useState(null);
  const [form,setForm]=useState({name:"",interval:"custom_days",days:[]});
  const openNew=()=>{setEditing(null);setForm({name:"",interval:"custom_days",days:[]});setOpen(true);};
  const openEdit=(r)=>{setEditing(r);setForm({name:r.name,interval:r.interval,days:r.days||[]});setOpen(true);};
  const save=()=>{
    if(!form.name.trim())return;
    if(editing) setData(d=>({...d,recurrences:d.recurrences.map(r=>r.id===editing.id?{...r,...form}:r)}));
    else setData(d=>({...d,recurrences:[...d.recurrences,{id:uid(),...form}]}));
    setOpen(false);
  };
  const del=(id)=>setData(d=>({...d,recurrences:d.recurrences.filter(r=>r.id!==id)}));

  const describeRec=(r)=>{
    if(r.interval==="custom_days" && r.days?.length>0)
      return "Toda "+r.days.map(d=>WDAYS[d].s).join(", ");
    return RINTS.find(x=>x.value===r.interval)?.label||r.interval;
  };

  return (
    <div>
      <PH title="Recorrências" icon="↻" badge={data.recurrences.length} action={<Btn onClick={openNew}>+ Nova Recorrência</Btn>}/>
      <div className="g-recs" style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:12}}>
        {data.recurrences.map(r=>{
          const used=data.tasks.filter(t=>t.recurrence===r.id).length;
          const desc=describeRec(r);
          return (
            <div key={r.id} style={{background:"#fff",border:"1px solid #f1f5f9",borderRadius:14,padding:18,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
              <div style={{fontSize:26,marginBottom:8}}>↻</div>
              <div style={{fontWeight:800,fontSize:14,color:"#0f172a",marginBottom:4}}>{r.name}</div>
              <div style={{fontSize:12,color:"#64748b",marginBottom:4}}>{desc}</div>
              {r.interval==="custom_days" && r.days?.length>0 && (

      <Modal open={open} onClose={()=>setOpen(false)} title={editing?"Editar Recorrência":"Nova Recorrência"} width={440}>

          <Inp label="Nome *" value={form.name} onChange={v=>setForm(f=>({...f,name:v}))} placeholder="Ex: Toda Ter e Qui"/>
          <Sel label="Tipo de Intervalo" value={form.interval} onChange={v=>setForm(f=>({...f,interval:v,days:[]}))} options={RINTS}/>
          {form.interval==="custom_days" && (
            <Fld label="Dias da semana *">
              <WDSel value={form.days} onChange={v=>setForm(f=>({...f,days:v}))}/>
              {form.days.length>0 && <div style={{fontSize:12,color:"#64748b",marginTop:4}}>Selecionado: {form.days.map(d=>WDAYS[d].l).join(", ")}</div>}

            <Btn onClick={()=>setOpen(false)} v="ghost">Cancelar</Btn>

      </Modal>
    </div>
  );
}

// ─── MODELOS ─────────────────────────────────────────────────────
function TemplatesPage({ data, setData, onUseTemplate }) {
  const [open,setOpen]=useState(false);
  const [editing,setEditing]=useState(null);
  const [form,setForm]=useState({name:"",description:"",labels:[],checklist:[],recurrence:""});
  const [ckInput,setCkInput]=useState("");
  const openNew=()=>{setEditing(null);setForm({name:"",description:"",labels:[],checklist:[],recurrence:""});setCkInput("");setOpen(true);};
  const openEdit=(t)=>{setEditing(t);setForm({name:t.name,description:t.description,labels:[...t.labels],checklist:[...t.checklist],recurrence:t.recurrence||""});setCkInput("");setOpen(true);};
  const save=()=>{
    if(!form.name.trim())return;
    if(editing) setData(d=>({...d,taskTemplates:d.taskTemplates.map(t=>t.id===editing.id?{...t,...form}:t)}));
    else setData(d=>({...d,taskTemplates:[...d.taskTemplates,{id:uid(),...form}]}));
    setOpen(false);
  };
  const del=(id)=>setData(d=>({...d,taskTemplates:d.taskTemplates.filter(t=>t.id!==id)}));
  const addCk=()=>{if(!ckInput.trim())return;setForm(f=>({...f,checklist:[...f.checklist,ckInput.trim()]}));setCkInput("");};
  const toggleL=(id)=>setForm(f=>({...f,labels:f.labels.includes(id)?f.labels.filter(x=>x!==id):[...f.labels,id]}));

  return (
    <div>
      <PH title="Modelos de Tarefa" icon="◧" badge={data.taskTemplates.length} action={<Btn onClick={openNew}>+ Novo Modelo</Btn>}/>
      <div className="g-templates" style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))",gap:14}}>
        {data.taskTemplates.map(t=>{
          const labels=data.labels.filter(l=>t.labels.includes(l.id));
          const rec=t.recurrence?data.recurrences.find(r=>r.id===t.recurrence):null;
          return (
            <div key={t.id} style={{background:"#fff",borderRadius:16,padding:20,border:"1px solid #f1f5f9",boxShadow:"0 2px 8px rgba(0,0,0,.06)"}}>
              <div style={{display:"flex",gap:5,marginBottom:10,flexWrap:"wrap"}}>
                {labels.map(l=><Chip key={l.id} label={l.name} color={l.color}/>)}
                {rec&&<span style={{fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:20,background:"#f0fdf4",color:"#14b8a6"}}>↻ {rec.name}</span>}
              </div>
              <div style={{fontWeight:900,fontSize:15,color:"#0f172a",marginBottom:6}}>{t.name}</div>
              <p style={{fontSize:12,color:"#94a3b8",marginBottom:14,lineHeight:1.5}}>{t.description}</p>
              <div style={{marginBottom:14}}>
                <div style={{fontSize:11,fontWeight:700,color:"#64748b",marginBottom:6}}>CHECKLIST ({t.checklist.length} itens)</div>
                {t.checklist.slice(0,4).map((c,i)=>(
                  <div key={i} style={{display:"flex",alignItems:"center",gap:7,fontSize:12,color:"#6b7280",marginBottom:3}}>
                    <span style={{width:5,height:5,borderRadius:"50%",background:"#cbd5e1",flexShrink:0}}/> {c}
                  </div>
                ))}
                {t.checklist.length>4&&<div style={{fontSize:11,color:"#94a3b8"}}>+{t.checklist.length-4} itens</div>}
              </div>
              <div style={{display:"flex",gap:7}}>
                <Btn onClick={()=>onUseTemplate(t)} sz="sm" xs={{flex:1,justifyContent:"center"}}>▶ Usar Modelo</Btn>
                <Btn onClick={()=>openEdit(t)} v="ghost" sz="sm">✎</Btn>
                <Btn onClick={()=>del(t.id)} v="danger" sz="sm">×</Btn>
              </div>
            </div>
          );
        })}
      </div>
      <Modal open={open} onClose={()=>setOpen(false)} title={editing?"Editar Modelo":"Novo Modelo"} width={560}>
        <div style={{display:"flex",flexDirection:"column",gap:16}}>
          <Inp label="Nome *" value={form.name} onChange={v=>setForm(f=>({...f,name:v}))} placeholder="Nome do modelo"/>
          <Txt label="Descrição" value={form.description} onChange={v=>setForm(f=>({...f,description:v}))} placeholder="Descreva o modelo..."/>
          <Sel label="Recorrência padrão" value={form.recurrence||""} onChange={v=>setForm(f=>({...f,recurrence:v}))} placeholder="Sem recorrência" options={data.recurrences.map(r=>({value:r.id,label:r.name}))}/>
          <Fld label="Marcadores padrão">
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {data.labels.map(l=>{
                const sel=form.labels.includes(l.id);
                return <button key={l.id} onClick={()=>toggleL(l.id)} style={{padding:"3px 11px",borderRadius:20,cursor:"pointer",fontSize:12,fontWeight:700,border:`2px solid ${sel?l.color:"#e5e7eb"}`,background:sel?l.color+"18":"#f9fafb",color:sel?l.color:"#6b7280",fontFamily:"inherit",transition:"all .12s"}}>{l.name}</button>;
              })}
            </div>
          </Fld>
          <Fld label="Checklist padrão">
            <div style={{display:"flex",gap:8,marginBottom:8}}>
              <input value={ckInput} onChange={e=>setCkInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addCk()} placeholder="Adicionar item (Enter)..." style={{flex:1,padding:"7px 12px",borderRadius:9,fontSize:13,border:"2px solid #e5e7eb",outline:"none",fontFamily:"inherit"}}/>
              <Btn onClick={addCk} sz="sm">+</Btn>
            </div>
            {form.checklist.map((c,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",borderRadius:8,background:"#f9fafb",marginBottom:4}}>
                <span style={{flex:1,fontSize:13}}>{c}</span>
                <button onClick={()=>setForm(f=>({...f,checklist:f.checklist.filter((_,j)=>j!==i)}))} style={{background:"none",border:"none",cursor:"pointer",color:"#cbd5e1",fontSize:16}}>×</button>
              </div>
            ))}
          </Fld>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
            <Btn onClick={()=>setOpen(false)} v="ghost">Cancelar</Btn>
            <Btn onClick={save}>Salvar Modelo</Btn>
          </div>
        </div>
      </Modal>
    </div>
  );
}

//  PART 6: Dashboard com filtros mensais + gráficos por empresa/colaborador
// ═══════════════════════════════════════════════════════════════════

function Dashboard({ data }) {
  const thisMonth = new Date().getMonth();
  const thisYear  = new Date().getFullYear();
  const [fMonth, setFMonth] = useState(thisMonth);
  const [fYear,  setFYear]  = useState(thisYear);
  const [coFilter, setCoFilter] = useState("");
  // mNames alias removed — using MS constant

  const filteredTasks = useMemo(()=>data.tasks.filter(t=>{
    if(!t.dueDate) return false;
    const d = new Date(t.dueDate+"T12:00:00");
    return d.getMonth()===fMonth && d.getFullYear()===fYear && (!coFilter||t.company===coFilter);
  }),[data.tasks,fMonth,fYear,coFilter]);

  const allTasks = coFilter ? data.tasks.filter(t=>t.company===coFilter) : data.tasks;

  const stats = useMemo(()=>{
    const t=filteredTasks;
    const total=t.length;
    const byStatus={};
    STS.forEach(s=>{byStatus[s.id]=t.filter(x=>x.status===s.id).length;});
    const overdue=t.filter(x=>isLate(x)).length;
    const totalCk=t.reduce((a,x)=>a+x.checklist.length,0);
    const doneCk=t.reduce((a,x)=>a+x.checklist.filter(c=>c.done).length,0);
    return {total,byStatus,overdue,totalCk,doneCk};
  },[filteredTasks]);

  // Por empresa
  const byCompany = useMemo(()=>data.companies.map(c=>{
    const tasks=filteredTasks.filter(t=>t.company===c.id);
    const done=tasks.filter(t=>t.status==="done").length;
    const doing=tasks.filter(t=>t.status==="doing").length;
    const overdue=tasks.filter(t=>isLate(t)).length;
    return {...c,total:tasks.length,done,doing,overdue};
  }),[filteredTasks,data.companies]);

  // Por colaborador
  const byCollaborator = useMemo(()=>data.collaborators.map(u=>{
    const tasks=filteredTasks.filter(t=>t.assignees.includes(u.id));
    const done=tasks.filter(t=>t.status==="done").length;
    const doing=tasks.filter(t=>t.status==="doing").length;
    const overdue=tasks.filter(t=>isLate(t)).length;
    return {...u,total:tasks.length,done,doing,overdue};
  }).filter(u=>u.total>0),[filteredTasks,data.collaborators]);

  // Por setor
  const bySector = useMemo(()=>data.sectors.map(s=>{
    const tasks=filteredTasks.filter(t=>t.sector===s.id);
    return {...s,total:tasks.length,done:tasks.filter(t=>t.status==="done").length};
  }).filter(s=>s.total>0),[filteredTasks,data.sectors]);

  const maxTasks = Math.max(1,...byCompany.map(c=>c.total),...byCollaborator.map(u=>u.total));

  return (
    <div>
      {/* Filtros de período */}
      <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:24,padding:"14px 18px",background:"#fff",borderRadius:14,border:"1px solid #f1f5f9",boxShadow:"0 1px 4px rgba(0,0,0,.05)"}}>
        <span style={{fontSize:13,fontWeight:700,color:"#64748b"}}>📊 Período:</span>
        <select value={fMonth} onChange={e=>setFMonth(Number(e.target.value))} style={{padding:"6px 10px",borderRadius:8,fontSize:13,border:"2px solid #e5e7eb",outline:"none",fontFamily:"inherit",background:"#fff"}}>
          {MS.map((m,i)=><option key={i} value={i}>{m}</option>)}
        </select>
        <select value={fYear} onChange={e=>setFYear(Number(e.target.value))} style={{padding:"6px 10px",borderRadius:8,fontSize:13,border:"2px solid #e5e7eb",outline:"none",fontFamily:"inherit",background:"#fff"}}>
          {[2025,2026,2027].map(y=><option key={y} value={y}>{y}</option>)}
        </select>
        <select value={coFilter} onChange={e=>setCoFilter(e.target.value)} style={{padding:"6px 10px",borderRadius:8,fontSize:13,border:"2px solid #e5e7eb",outline:"none",fontFamily:"inherit",background:"#fff"}}>
          <option value="">Todas as empresas</option>
          {data.companies.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
        </select>
        <span style={{fontSize:12,color:"#94a3b8",marginLeft:"auto"}}>
          Exibindo {MS[fMonth]} / {fYear} — {filteredTasks.length} tarefa{filteredTasks.length!==1?"s":""}
        </span>
      </div>

      {/* KPIs */}
      <div className="dash-kpis" style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:12,marginBottom:24}}>
        {[
          {l:"Total",        v:stats.total,            c:"#6366f1"},
          {l:"A Fazer",      v:stats.byStatus.todo,    c:"#6366f1"},
          {l:"Em Andamento", v:stats.byStatus.doing,   c:"#f59e0b"},
          {l:"Em Revisão",   v:stats.byStatus.review,  c:"#8b5cf6"},
          {l:"Concluídas",   v:stats.byStatus.done,    c:"#22c55e"},
          {l:"Atrasadas",    v:stats.overdue,           c:"#ef4444"},
        ].map(({l,v,c})=>(
          <div key={l} style={{background:"#fff",borderRadius:14,padding:"16px 18px",border:"1px solid #f1f5f9",boxShadow:"0 1px 4px rgba(0,0,0,.05)"}}>
            <div style={{fontSize:30,fontWeight:900,color:c,lineHeight:1}}>{v}</div>
            <div style={{fontSize:12,fontWeight:700,color:"#64748b",marginTop:4}}>{l}</div>
          </div>
        ))}
      </div>

      {/* Status bar */}
      <div style={{background:"#fff",borderRadius:14,padding:20,border:"1px solid #f1f5f9",boxShadow:"0 1px 4px rgba(0,0,0,.05)",marginBottom:24}}>
        <h3 style={{fontSize:14,fontWeight:800,color:"#0f172a",marginBottom:16}}>Status das Tarefas — {MS[fMonth]}/{fYear}</h3>
        {STS.map(s=>{
          const cnt=stats.byStatus[s.id]||0;
          const pct=stats.total?Math.round((cnt/stats.total)*100):0;
          return (
            <div key={s.id} style={{marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                <span style={{fontSize:12,fontWeight:700,color:s.color}}>{s.l}</span>
                <span style={{fontSize:12,color:"#94a3b8"}}>{cnt} ({pct}%)</span>
              </div>
              <div style={{height:8,borderRadius:4,background:"#f1f5f9",overflow:"hidden"}}>
                <div style={{width:`${pct}%`,height:"100%",background:s.color,borderRadius:4,transition:"width .6s ease"}}/>
              </div>
            </div>
          );
        })}
      </div>

      {/* Por empresa */}
      <div style={{background:"#fff",borderRadius:14,padding:20,border:"1px solid #f1f5f9",boxShadow:"0 1px 4px rgba(0,0,0,.05)",marginBottom:24}}>
        <h3 style={{fontSize:14,fontWeight:800,color:"#0f172a",marginBottom:18}}>📊 Tarefas por Empresa — {MS[fMonth]}/{fYear}</h3>
        {byCompany.length===0&&<p style={{color:"#94a3b8",fontSize:13}}>Nenhuma tarefa no período.</p>}
        {byCompany.map(c=>(
          <div key={c.id} style={{marginBottom:16,paddingBottom:16,borderBottom:"1px solid #f8fafc"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:32,height:32,borderRadius:9,background:c.color+"18",border:`2px solid ${c.color}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:900,color:c.color}}>{c.logo}</div>
                <span style={{fontSize:13,fontWeight:700,color:"#0f172a"}}>{c.name}</span>
              </div>
              <div style={{display:"flex",gap:10,fontSize:12}}>
                <span style={{color:"#22c55e",fontWeight:700}}>✓ {c.done}</span>
                <span style={{color:"#f59e0b",fontWeight:700}}>⟳ {c.doing}</span>
                {c.overdue>0&&<span style={{color:"#ef4444",fontWeight:700}}>⚠ {c.overdue}</span>}
                <span style={{color:"#64748b",fontWeight:700}}>Total: {c.total}</span>
              </div>
            </div>
            <div style={{display:"flex",height:14,borderRadius:7,overflow:"hidden",background:"#f1f5f9"}}>
              {c.done>0&&<div style={{width:`${(c.done/Math.max(c.total,1))*100}%`,background:"#22c55e",transition:"width .6s"}}/>}
              {c.doing>0&&<div style={{width:`${(c.doing/Math.max(c.total,1))*100}%`,background:"#f59e0b",transition:"width .6s"}}/>}
              {(c.total-c.done-c.doing)>0&&<div style={{flex:1,background:"#e2e8f0"}}/>}
            </div>
          </div>
        ))}
      </div>

      {/* Por colaborador */}
      {byCollaborator.length>0&&(
        <div style={{background:"#fff",borderRadius:14,padding:20,border:"1px solid #f1f5f9",boxShadow:"0 1px 4px rgba(0,0,0,.05)",marginBottom:24}}>
          <h3 style={{fontSize:14,fontWeight:800,color:"#0f172a",marginBottom:18}}>👥 Tarefas por Colaborador — {MS[fMonth]}/{fYear}</h3>
          <div className="dash-collabs" style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:12}}>
            {byCollaborator.map(u=>(
              <div key={u.id} style={{background:"#f8fafc",borderRadius:12,padding:"14px 16px",border:"1px solid #f1f5f9"}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                  <Av initials={u.initials} color={u.color} size={36}/>
                  <div>
                    <div style={{fontWeight:700,fontSize:13,color:"#0f172a"}}>{u.name}</div>
                    <div style={{fontSize:11,color:"#94a3b8"}}>{u.role}</div>
                  </div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:4,marginBottom:8}}>
                  <div style={{textAlign:"center",background:"#fff",borderRadius:7,padding:"5px 3px"}}>
                    <div style={{fontSize:16,fontWeight:800,color:"#6366f1"}}>{u.total}</div>
                    <div style={{fontSize:9,color:"#94a3b8"}}>Total</div>
                  </div>
                  <div style={{textAlign:"center",background:"#fff",borderRadius:7,padding:"5px 3px"}}>
                    <div style={{fontSize:16,fontWeight:800,color:"#22c55e"}}>{u.done}</div>
                    <div style={{fontSize:9,color:"#94a3b8"}}>Feitas</div>
                  </div>
                  <div style={{textAlign:"center",background:"#fff",borderRadius:7,padding:"5px 3px"}}>
                    <div style={{fontSize:16,fontWeight:800,color:u.overdue>0?"#ef4444":"#94a3b8"}}>{u.overdue}</div>
                    <div style={{fontSize:9,color:"#94a3b8"}}>Atraso</div>
                  </div>
                </div>
                <div style={{height:6,borderRadius:3,background:"#e2e8f0",overflow:"hidden"}}>
                  <div style={{width:`${u.total?Math.round((u.done/u.total)*100):0}%`,height:"100%",background:"#22c55e",transition:"width .6s"}}/>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Por setor */}
      {bySector.length>0&&(
        <div style={{background:"#fff",borderRadius:14,padding:20,border:"1px solid #f1f5f9",boxShadow:"0 1px 4444rgba(0,0,0,.05)"}}>
          <h3 style={{fontSize:14,fontWeight:800,color:"#0f172a",marginBottom:16}}>◫ Tarefas por Setor — {MS[fMonth]}/{fYear}</h3>
          <div style={{display:"flex",flexWrap:"wrap",gap:10}}>
            {bySector.map(s=>(
              <div key={s.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderRadius:10,background:s.color+"0d",border:`1.5px solid ${s.c}33`}}>
                <span style={{width:10,height:10,borderRadius:"50%",background:s.color}}/>
                <span style={{fontSize:13,fontWeight:700,color:"#0f172a"}}>{s.name}</span>
                <span style={{fontSize:13,fontWeight:800,color:s.color}}>{s.total}</span>
                <span style={{fontSize:11,color:"#94a3b8"}}>({s.done} feitas)</span>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}




/* ═══════════════════════════════════════════
   APP ROOT
═══════════════════════════════════════════ */

function App(){
  const {user,loading:authLoading,signIn,signUp,signOut} = useAuth();
  const [data,setData,synced] = useSharedData();
  const {acquire,forceAcquire,release,getLock} = useLocks();
  const {list:toasts,add:toast} = useToast();
  const [page,setPage]      = useState("dashboard");
  const [taskModal,setTM]   = useState({open:false,task:null,defStatus:"todo",lockInfo:null});
  const [sideCol,setSideCol]= useState(false);

  // Enquanto verifica sessão
  if(authLoading) return(
    <div style={{minHeight:"100dvh",display:"flex",alignItems:"center",justifyContent:"center",background:"#0f172a"}}>
      <div style={{textAlign:"center"}}>
        <div style={{width:48,height:48,borderRadius:14,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,color:"#fff",fontWeight:900,margin:"0 auto 16px"}}>M</div>
        <div style={{color:"#475569",fontSize:13}}>Carregando...</div>
      </div>
    </div>
  );

  // Não logado → tela de login
  if(!user) return <LoginScreen onLogin={signIn} onSignUp={signUp}/>;

  // Dados ainda sincronizando
  if(!synced) return(
    <div style={{minHeight:"100dvh",display:"flex",alignItems:"center",justifyContent:"center",background:"#f1f5f9"}}>
      <div style={{textAlign:"center"}}>
        <div style={{width:48,height:48,borderRadius:14,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,color:"#fff",fontWeight:900,margin:"0 auto 16px"}}>M</div>
        <div style={{color:"#64748b",fontSize:13,fontWeight:600}}>Sincronizando dados...</div>
      </div>
    </div>
  );

  const userName = user.user_metadata?.name || user.email?.split("@")[0] || "Usuário";

  const openNew=(status="todo")=>setTM({open:true,task:null,defStatus:status,lockInfo:null});

  const openEdit=(task)=>{
    const r=acquire(task.id);
    if(!r.ok){
      setTM({open:true,task,defStatus:task.status,lockInfo:{user:r.holder}});
      toast(`🔒 ${r.holder} está editando esta tarefa.`,"lock",5000);
    } else {
      setTM({open:true,task,defStatus:task.status,lockInfo:null});
    }
  };

  const closeTask=()=>{
    if(taskModal.task) release(taskModal.task.id);
    setTM(m=>({...m,open:false,lockInfo:null}));
  };

  const forceLock=()=>{
    if(taskModal.task){ forceAcquire(taskModal.task.id); setTM(m=>({...m,lockInfo:null})); toast("✅ Você assumiu a edição.","ok"); }
  };

  const saveTask=(updated)=>{
    const isNew=!data.tasks.find(t=>t.id===updated.id);
    setData(d=>{const ex=d.tasks.find(t=>t.id===updated.id);return{...d,tasks:ex?d.tasks.map(t=>t.id===updated.id?updated:t):[...d.tasks,updated]};});
    if(taskModal.task) release(taskModal.task.id);
    setTM(m=>({...m,open:false}));
    toast(isNew?"✦ Tarefa criada!":"💾 Tarefa atualizada!","ok");
  };

  const deleteTask=(id)=>{
    const lk=getLock(id);
    if(lk){toast(`🔒 Não pode excluir: ${lk.user} está editando.`,"err");return;}
    if(!confirm("Excluir esta tarefa?"))return;
    setData(d=>({...d,tasks:d.tasks.filter(t=>t.id!==id)}));
    toast("Tarefa excluída.","warn");
  };

  const quickComplete=(task)=>{
    const lk=getLock(task.id);
    if(lk){toast(`🔒 ${lk.user} está editando. Aguarde.`,"lock",4000);return;}
    const newStatus=task.status==="done"?"todo":"done";
    setData(d=>({...d,tasks:d.tasks.map(t=>t.id===task.id?{
      ...t,status:newStatus,
      checklist:newStatus==="done"?t.checklist.map(c=>({...c,done:true})):t.checklist,
    }:t)}));
    toast(newStatus==="done"?"✅ Tarefa concluída!":"↩ Tarefa reaberta.","ok");
  };

  const useTemplate=(tpl)=>{
    const nt={id:uid(),title:tpl.name,description:tpl.description,status:"todo",priority:"media",
      company:"",sector:"",assignees:[],labels:tpl.labels,dueDate:"",
      checklist:tpl.checklist.map(text=>({id:uid(),text,done:false})),
      dependencies:[],recurrence:tpl.recurrence||"",createdAt:todayStr()};
    setTM({open:true,task:nt,defStatus:"todo",lockInfo:null});
    setPage("kanban");
  };

  const exportData=()=>{const b=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=`mdtec-backup-${todayStr()}.json`;a.click();URL.revokeObjectURL(u);toast("Backup exportado!","ok");};
  const importData=()=>{const i=document.createElement("input");i.type="file";i.accept=".json";i.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const p=JSON.parse(ev.target.result);if(p.tasks&&p.companies){setData(p);toast("Dados importados!","ok");}else toast("Arquivo inválido.","err");}catch{toast("Erro ao importar.","err");}};r.readAsText(f);};i.click();};
  const resetData=()=>{if(confirm("Restaurar dados iniciais? Tudo será perdido.")){setData(SEED);toast("Dados restaurados.","warn");}};

  const overdueCount=data.tasks.filter(t=>isLate(t)).length;
  const doingCount  =data.tasks.filter(t=>t.status==="doing").length;
  const curPage     =NAV_GROUPS.flatMap(g=>g.items).find(i=>i.id===page);

  return(
    <div className="shell">
      {/* ── SIDEBAR ── */}
      <aside className={`sidebar${sideCol?" slim":""}`}>
        <div className="sb-logo" style={{padding:sideCol?"14px 12px":"20px 16px",borderBottom:"1px solid rgba(255,255,255,.06)"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:36,height:36,borderRadius:10,flexShrink:0,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,color:"#fff",fontWeight:900,boxShadow:"0 4px 14px rgba(99,102,241,.5)"}}>M</div>
            {!sideCol&&<div><div style={{fontSize:14,fontWeight:900,color:"#f8fafc",lineHeight:1.2}}>MdTec Gestão</div><div style={{fontSize:10,color:"#475569",fontWeight:600}}>Sistema de Tarefas</div></div>}
          </div>
        </div>
        {!sideCol&&(
          <div className="sb-stats" style={{margin:"10px 12px",padding:"10px 12px",background:"rgba(255,255,255,.04)",borderRadius:10,border:"1px solid rgba(255,255,255,.06)"}}>
            <div style={{display:"flex",justifyContent:"space-between"}}>
              {[{v:data.tasks.length,l:"Total",c:"#818cf8"},{v:doingCount,l:"Andamento",c:"#fbbf24"},{v:overdueCount,l:"Atraso",c:overdueCount>0?"#f87171":"#475569"}].map(({v,l,c})=>(
                <div key={l} style={{textAlign:"center"}}>
                  <div style={{fontSize:16,fontWeight:900,color:c}}>{v}</div>
                  <div style={{fontSize:9,color:"#475569",fontWeight:600,textTransform:"uppercase",letterSpacing:".05em"}}>{l}</div>
                </div>
              ))}
            </div>
          </div>
        )}
        <nav className="sb-nav" style={{flex:1,padding:"8px 10px",overflowY:"auto",display:"flex",flexDirection:"column"}}>
          {NAV_GROUPS.map(group=>(
            <div key={group.label} style={{marginBottom:8}}>
              {!sideCol&&<div className="sb-section-lbl" style={{fontSize:9,fontWeight:800,color:"#334155",textTransform:"uppercase",letterSpacing:".1em",padding:"8px 10px 4px"}}>{group.label}</div>}
              {group.items.map(item=>{
                const active=page===item.id;
                return(
                  <button key={item.id} className="nav-btn" onClick={()=>setPage(item.id)} title={sideCol?item.label:""} style={{width:"100%",display:"flex",alignItems:"center",gap:sideCol?0:10,padding:sideCol?"10px":"9px 10px",borderRadius:9,border:"none",cursor:"pointer",background:active?"rgba(99,102,241,.2)":"transparent",color:active?"#818cf8":"#64748b",fontSize:13,fontWeight:active?800:600,textAlign:"left",fontFamily:"inherit",transition:"all .12s",marginBottom:2,justifyContent:sideCol?"center":"flex-start"}}
                    onMouseEnter={e=>!active&&(e.currentTarget.style.background="rgba(255,255,255,.04)")}
                    onMouseLeave={e=>!active&&(e.currentTarget.style.background="transparent")}
                  >
                    <span className="nb-icon" style={{fontSize:15,width:sideCol?20:18,textAlign:"center",flexShrink:0}}>{item.icon}</span>
                    {!sideCol&&item.label}
                    {!sideCol&&active&&<span className="nb-dot" style={{marginLeft:"auto",width:6,height:6,borderRadius:"50%",background:"#818cf8"}}/>}
                  </button>
                );
              })}
            </div>
          ))}
        </nav>
        <div className="sb-bottom" style={{padding:"10px 10px 14px",borderTop:"1px solid rgba(255,255,255,.06)"}}>
          {/* Usuário logado */}
          {!sideCol&&(
            <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",borderRadius:9,background:"rgba(255,255,255,.04)",marginBottom:8}}>
              <div style={{width:28,height:28,borderRadius:"50%",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#fff",fontWeight:800,flexShrink:0}}>{userName.slice(0,2).toUpperCase()}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:11,fontWeight:700,color:"#f8fafc",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{userName}</div>
                <div style={{fontSize:9,color:"#475569",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{user.email}</div>
              </div>
              <button onClick={signOut} title="Sair" style={{background:"none",border:"none",cursor:"pointer",color:"#475569",fontSize:14,padding:2,flexShrink:0}} onMouseEnter={e=>e.currentTarget.style.color="#f87171"} onMouseLeave={e=>e.currentTarget.style.color="#475569"}>⎋</button>
            </div>
          )}
          {!sideCol&&<button onClick={openNew} style={{width:"100%",padding:"10px 0",borderRadius:10,border:"none",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",color:"#fff",fontSize:13,fontWeight:800,cursor:"pointer",fontFamily:"inherit",boxShadow:"0 4px 14px rgba(99,102,241,.4)",transition:"filter .15s",marginBottom:8}} onMouseEnter={e=>e.currentTarget.style.filter="brightness(.9)"} onMouseLeave={e=>e.currentTarget.style.filter="brightness(1)"}>+ Nova Tarefa</button>}
          {!sideCol&&(
            <div style={{display:"flex",gap:4,marginBottom:8}}>
              <button onClick={exportData} title="Exportar JSON" style={{flex:1,padding:"5px",borderRadius:6,border:"1px solid rgba(255,255,255,.07)",background:"transparent",color:"#475569",cursor:"pointer",fontSize:10,fontFamily:"inherit"}} onMouseEnter={e=>e.currentTarget.style.color="#94a3b8"} onMouseLeave={e=>e.currentTarget.style.color="#475569"}>⬇ Export</button>
              <button onClick={importData} title="Importar JSON" style={{flex:1,padding:"5px",borderRadius:6,border:"1px solid rgba(255,255,255,.07)",background:"transparent",color:"#475569",cursor:"pointer",fontSize:10,fontFamily:"inherit"}} onMouseEnter={e=>e.currentTarget.style.color="#94a3b8"} onMouseLeave={e=>e.currentTarget.style.color="#475569"}>⬆ Import</button>
              <button onClick={resetData} title="Restaurar dados" style={{padding:"5px 8px",borderRadius:6,border:"1px solid rgba(239,68,68,.18)",background:"transparent",color:"#475569",cursor:"pointer",fontSize:10,fontFamily:"inherit"}} onMouseEnter={e=>e.currentTarget.style.color="#f87171"} onMouseLeave={e=>e.currentTarget.style.color="#475569"}>⟳</button>
            </div>
          )}
          <button onClick={()=>setSideCol(s=>!s)} style={{width:"100%",padding:"7px",borderRadius:8,border:"1px solid rgba(255,255,255,.06)",background:"transparent",color:"#475569",cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"inherit",gap:4}} onMouseEnter={e=>e.currentTarget.style.color="#94a3b8"} onMouseLeave={e=>e.currentTarget.style.color="#475569"}>
            {sideCol?"›":"‹"}{!sideCol&&<span style={{fontSize:10}}>Recolher</span>}
          </button>
        </div>
      </aside>

      {/* ── MAIN ── */}
      <main className="main-content">
        <div className="topbar" style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:28,gap:12}}>
          <div>
            <h1 style={{fontSize:26,fontWeight:900,color:"#0f172a",lineHeight:1.1,letterSpacing:"-.02em"}}>{curPage?.icon} {curPage?.label}</h1>
            <p style={{fontSize:13,color:"#94a3b8",marginTop:4,fontWeight:500}}>{new Date().toLocaleDateString("pt-BR",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}</p>
          </div>
          <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
            {overdueCount>0&&(
              <div style={{display:"flex",alignItems:"center",gap:6,padding:"6px 12px",borderRadius:10,background:"#fef2f2",border:"1px solid #fecaca"}}>
                <span style={{width:8,height:8,borderRadius:"50%",background:"#ef4444",animation:"pulse 2s infinite"}}/>
                <span style={{fontSize:12,fontWeight:700,color:"#ef4444"}}>{overdueCount} atrasada{overdueCount>1?"s":""}</span>
              </div>
            )}
            {["kanban","lista","tabela","calendario"].includes(page)&&<Btn onClick={openNew}>+ Nova Tarefa</Btn>}
          </div>
        </div>

        {page==="dashboard"     && <Dashboard data={data}/>}
        {page==="kanban"        && <KanbanView data={data} onEdit={openEdit} onDelete={deleteTask} onAdd={openNew} onComplete={quickComplete}/>}
        {page==="lista"         && <ListView data={data} onEdit={openEdit} onDelete={deleteTask} onComplete={quickComplete}/>}
        {page==="calendario"    && <CalView data={data} onEdit={openEdit}/>}
        {page==="tabela"        && <GridView data={data} onEdit={openEdit} onDelete={deleteTask} onComplete={quickComplete}/>}
        {page==="modelos"       && <TemplatesPage data={data} setData={setData} onUseTemplate={useTemplate}/>}
        {page==="empresas"      && <CompaniesPage data={data} setData={setData}/>}
        {page==="setores"       && <SectorsPage data={data} setData={setData}/>}
        {page==="colaboradores" && <CollaboratorsPage data={data} setData={setData}/>}
        {page==="marcadores"    && <LabelsPage data={data} setData={setData}/>}
        {page==="recorrencias"  && <RecurrencesPage data={data} setData={setData}/>}
      </main>

      {/* ── TASK MODAL ── */}
      <Modal open={taskModal.open} onClose={closeTask}
        title={taskModal.task&&data.tasks.find(t=>t.id===taskModal.task?.id)?"✎ Editar Tarefa":"✦ Nova Tarefa"}
        width={650}
      >
        {taskModal.open&&(
          <TaskForm
            key={taskModal.task?.id||"new"}
            data={data}
            task={taskModal.task}
            defStatus={taskModal.defStatus}
            onSave={saveTask}
            onClose={closeTask}
            lockInfo={taskModal.lockInfo}
            onForce={forceLock}
          />
        )}
      </Modal>

      <Toasts list={toasts}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
