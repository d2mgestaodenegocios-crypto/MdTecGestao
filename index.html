/* ===========================================
   AUTH HOOK */
function useAuth() {
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    // Sessão atual
    sb.auth.getSession().then(({ data: { session } }) => {
      setUser(session?.user ?? null);
      setLoading(false);
    });
    // Escuta mudanças de sessão
    const { data: { subscription } } = sb.auth.onAuthStateChange((_event, session) => {
      setUser(session?.user ?? null);
    });
    return () => subscription.unsubscribe();
  }, []);

  const signIn = async (email, password) => {
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) throw error;
  };

  const signUp = async (email, password, name) => {
    const { error } = await sb.auth.signUp({
      email, password,
      options: { data: { name } }
    });
    if (error) throw error;
  };

  const signOut = () => sb.auth.signOut();

  return { user, loading, signIn, signUp, signOut };
}

/* ===========================================
   SUPABASE DATA HOOK
   Substitui useSharedData - agora tudo vai
   para o banco de dados online em tempo real */
function useSharedData() {
  const [data, setRaw] = useState(SEED);
  const [synced, setSynced] = useState(false);

  // Carrega dados do Supabase
  const load = useCallback(async () => {
    try {
      const { data: row, error } = await sb
        .from("app_data")
        .select("payload")
        .eq("id", 1)
        .maybeSingle();

      if (error) {
        console.error("Supabase load error:", error);
        setRaw(SEED);
        setSynced(true);
        return;
      }

      if (row?.payload) {
        const p = row.payload;
        if (!p.sectors || !Array.isArray(p.sectors)) p.sectors = SEED.sectors;
        if (!p.collaborators || !Array.isArray(p.collaborators)) p.collaborators = SEED.collaborators;
        if (!p.companies || !Array.isArray(p.companies)) p.companies = SEED.companies;
        if (!p.labels || !Array.isArray(p.labels)) p.labels = SEED.labels;
        if (!p.recurrences || !Array.isArray(p.recurrences)) p.recurrences = SEED.recurrences;
        if (!p.taskTemplates || !Array.isArray(p.taskTemplates)) p.taskTemplates = [];
        if (!p.services || !Array.isArray(p.services)) p.services = [];
        if (!p.archiveDays) p.archiveDays = 30;
        if (!p.recStatus) p.recStatus={};
        p.tasks = (p.tasks || []).map(t => ({
          id: t.id||uid(),
          title: t.title||"",
          description: t.description||"",
          status: t.status||"todo",
          priority: t.priority||"media",
          company: t.company||"",
          sector: t.sector||"",
          assignees: toArr(t.assignees),
          labels: toArr(t.labels),
          checklist: toArr(t.checklist),
          dependencies: toArr(t.dependencies),
          recurrence: t.recurrence||"",
          mesRef: t.mesRef||"",
          dueDate: t.dueDate||"",
          createdAt: t.createdAt||"",
          completedAt: t.completedAt||null,
          _copies: Array.isArray(t._copies)?[...t._copies]:[],
          archivedAt: t.archivedAt||null,
        }));
        setRaw(p);
      } else {
        // First time - save seed data
        const { error: upsertErr } = await sb.from("app_data").upsert({ id: 1, payload: SEED });
        if (upsertErr) console.error("Seed upsert error:", upsertErr);
        setRaw(SEED);
      }
      setSynced(true);
    } catch (e) {
      console.error("Erro ao carregar dados:", e);
      setSynced(true);
    }
  }, []);

  useEffect(() => {
    load();

    // Escuta mudanças em tempo real (Realtime)
    const channel = sb
      .channel("app_data_changes")
      .on("postgres_changes", {
        event: "UPDATE",
        schema: "public",
        table: "app_data",
        filter: "id=eq.1"
      }, (payload) => {
        if (payload.new?.payload) {
          const p = payload.new.payload;
          if (!p.sectors || !Array.isArray(p.sectors)) p.sectors = SEED.sectors;
          if (!p.collaborators || !Array.isArray(p.collaborators)) p.collaborators = SEED.collaborators;
          if (!p.companies || !Array.isArray(p.companies)) p.companies = SEED.companies;
          if (!p.labels || !Array.isArray(p.labels)) p.labels = SEED.labels;
          if (!p.recurrences || !Array.isArray(p.recurrences)) p.recurrences = SEED.recurrences;
          if (!p.taskTemplates || !Array.isArray(p.taskTemplates)) p.taskTemplates = [];
          if (!p.services || !Array.isArray(p.services)) p.services = [];
        if (!p.services || !Array.isArray(p.services)) p.services = [];
          if (!p.archiveDays) p.archiveDays = 30;
          p.tasks = (p.tasks || []).map(t => ({
            id: t.id||"",
            title: t.title||"",
            description: t.description||"",
            status: t.status||"todo",
            priority: t.priority||"media",
            company: t.company||"",
            sector: t.sector||"",
            assignees: toArr(t.assignees),
            labels: toArr(t.labels),
            checklist: toArr(t.checklist),
            dependencies: toArr(t.dependencies),
            recurrence: t.recurrence||"",
            mesRef: t.mesRef||"",
            dueDate: t.dueDate||"",
            createdAt: t.createdAt||"",
            completedAt: t.completedAt||null,
            _copies: Array.isArray(t._copies)?[...t._copies]:[],
            archivedAt: t.archivedAt||null,
            }));
          setRaw(p);
        }
      })
      .subscribe();

    return () => sb.removeChannel(channel);
  }, [load]);

  const pendingSave = useRef(null);
  const setData = useCallback((updater) => {
    setRaw(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      // Debounced save to Supabase
      if(pendingSave.current) clearTimeout(pendingSave.current);
      pendingSave.current = setTimeout(() => {
        sb.from("app_data").upsert({ id: 1, payload: next })
          .then(({ error }) => {
            if(error) console.error("Supabase save error:", error);
            else console.log("Saved to Supabase");
          });
      }, 300);
      return next;
    });
  }, []);

  return [data, setData, synced];
}

function useLocks(){
  const [locks,setLocksState]=useState(()=>{
    try{return JSON.parse(localStorage.getItem(LOCK_KEY)||"{}");}catch{return {};}
  });
  const bcRef=useRef(null);

  const pruneExpired=useCallback(raw=>{
    const now=Date.now(),out={};
    Object.entries(raw).forEach(([k,v])=>{if(now-v.ts<LOCK_TTL)out[k]=v;});
    return out;
  },[]);

  const persist=useCallback(l=>{
    localStorage.setItem(LOCK_KEY,JSON.stringify(l));
    setLocksState(l);
    bcRef.current?.postMessage({t:"locks",l});
  },[]);

  useEffect(()=>{
    try{
      bcRef.current=new BroadcastChannel("mdtec_locks_v6");
      bcRef.current.onmessage=e=>{if(e.data?.t==="locks")setLocksState(e.data.l);};
    }catch(e){}

    // Heartbeat: keep own locks alive, prune stale ones
    const iv=setInterval(()=>{
      try{
        const raw=pruneExpired(JSON.parse(localStorage.getItem(LOCK_KEY)||"{}"));
        Object.entries(raw).forEach(([k,v])=>{if(v.sid===SESSION_ID)raw[k]={...v,ts:Date.now()};});
        persist(raw);
      }catch(e){}
    },8000);

    // Release own locks on tab close
    const onUnload=()=>{
      try{
        const raw=pruneExpired(JSON.parse(localStorage.getItem(LOCK_KEY)||"{}"));
        const cleaned={};
        Object.entries(raw).forEach(([k,v])=>{if(v.sid!==SESSION_ID)cleaned[k]=v;});
        localStorage.setItem(LOCK_KEY,JSON.stringify(cleaned));
        bcRef.current?.postMessage({t:"locks",l:cleaned});
      }catch(e){}
    };
    window.addEventListener("beforeunload",onUnload);
    return()=>{clearInterval(iv);bcRef.current?.close();window.removeEventListener("beforeunload",onUnload);};
  },[persist,pruneExpired]);

  // Try to acquire a lock. Returns {ok:true} or {ok:false, holder:"Name"}
  const acquire=useCallback(taskId=>{
    try{
      const raw=pruneExpired(JSON.parse(localStorage.getItem(LOCK_KEY)||"{}"));
      const ex=raw[taskId];
      if(ex&&ex.sid!==SESSION_ID&&Date.now()-ex.ts<LOCK_TTL)return{ok:false,holder:ex.user};
      persist({...raw,[taskId]:{sid:SESSION_ID,user:MY_NAME,ts:Date.now()}});
      return{ok:true};
    }catch{return{ok:true};}
  },[persist,pruneExpired]);

  // Force-acquire (override another user's lock)
  const forceAcquire=useCallback(taskId=>{
    try{
      const raw=pruneExpired(JSON.parse(localStorage.getItem(LOCK_KEY)||"{}"));
      persist({...raw,[taskId]:{sid:SESSION_ID,user:MY_NAME,ts:Date.now()}});
    }catch(e){}
  },[persist,pruneExpired]);

  // Release own lock on a task
  const release=useCallback(taskId=>{
    try{
      const raw=pruneExpired(JSON.parse(localStorage.getItem(LOCK_KEY)||"{}"));
      if(raw[taskId]?.sid===SESSION_ID){delete raw[taskId];persist(raw);}
    }catch(e){}
  },[persist,pruneExpired]);

  // Get lock info if ANOTHER user holds it, else null
  const getLock=useCallback(taskId=>{
    const l=locks[taskId];
    if(!l||l.sid===SESSION_ID||Date.now()-l.ts>=LOCK_TTL)return null;
    return l;
  },[locks]);

  return{acquire,forceAcquire,release,getLock};
}

function useToast(){
  const [list,setList]=useState([]);
  const add=useCallback((msg,type="ok",ms=3800)=>{
    const id=uid();
    setList(p=>[...p.slice(-4),{id,msg,type}]);
    setTimeout(()=>setList(p=>p.filter(t=>t.id!==id)),ms);
  },[]);
  return{list,add};
}

/* ===========================================
   QUICK COMPLETE BUTTON
   Circular check button shown on cards/rows
   to mark done/undone with 1 click outside modal */
function QCBtn({status,onClick,size=26,absolute=true}){
  const [hov,sh]=useState(false);
  // Ciclo: todo -> doing -> review -> done -> todo
  const CYCLE={todo:"doing",doing:"review",review:"done",done:"todo"};
  const COLORS={
    todo:  {border:"#d1d5db",bg:"#fff",    hover:"#eef2ff", icon:"",    title:"Avançar para Em Análise"},
    doing: {border:"#f59e0b",bg:"#fffbeb", hover:"#fef3c7", icon:"⏳",  title:"Avançar para Revisão"},
    review:{border:"#8b5cf6",bg:"#f5f3ff", hover:"#ede9fe", icon:"🔍",  title:"Avançar para Concluído"},
    done:  {border:"#22c55e",bg:"#22c55e", hover:"#16a34a", icon:"✓",   title:"Reabrir tarefa"},
  };
  const s=COLORS[status]||COLORS.todo;
  const isDone=status==="done";
  return(
    <button
      title={s.title}
      onClick={e=>{e.stopPropagation();onClick();}}
      onMouseEnter={()=>sh(true)}
      onMouseLeave={()=>sh(false)}
      style={{
        width:size,height:size,borderRadius:"50%",flexShrink:0,
        border:`2px solid ${hov?s.hover:s.border}`,
        background:hov?s.hover:s.bg,
        display:"flex",alignItems:"center",justifyContent:"center",
        cursor:"pointer",
        transition:"all .15s",
        position:absolute?"absolute":"relative",
        top:absolute?10:undefined,right:absolute?10:undefined,
        zIndex:absolute?2:undefined,
        color:isDone?"#fff":s.border,
        fontSize:size*0.55,fontWeight:900,
        boxShadow:isDone?"0 2px 8px rgba(34,197,94,.4)":"none",
      }}
    >{isDone?"✓":hov&&!isDone?"→":s.icon}</button>
  );
}

function toArr(v){
  if(Array.isArray(v)) return v;
  if(typeof v==="string"){try{const p=JSON.parse(v);return Array.isArray(p)?p:[];}catch(e){return[];}}
  return [];
}
function sanitizeTask(t){
  return {
    ...t,
    title: t.title||"",
    description: t.description||"",
    status: t.status||"todo",
    priority: t.priority||"media",
    company: t.company||"",
    sector: t.sector||"",
    assignees: toArr(t.assignees),
    labels: toArr(t.labels),
    checklist: toArr(t.checklist),
    dependencies: toArr(t.dependencies),
    recurrence: t.recurrence||"",
    dueDate: t.dueDate||"",
    createdAt: t.createdAt||todayStr(),
  };
}

/* ===========================================
   FILTERS */
function applyFilters(tasks,f){
  return tasks.filter(t=>{
    if(f.search&&!t.title.toLowerCase().includes(f.search.toLowerCase()))return false;
    if(f.status&&t.status!==f.status)return false;
    if(f.priority&&t.priority!==f.priority)return false;
    if(f.company&&t.company!==f.company)return false;
    if(f.sector&&t.sector!==f.sector)return false;
    if(f.label&&!t.labels.includes(f.label))return false;
    if(f.assignee&&!t.assignees.includes(f.assignee))return false;
    if(f.month!=null&&f.month!==""&&t.dueDate){const d=new Date(t.dueDate+"T12:00:00");if(d.getMonth()!==+f.month)return false;}
    if(f.year&&t.dueDate){const d=new Date(t.dueDate+"T12:00:00");if(d.getFullYear()!==+f.year)return false;}
    return true;
  });
}

/* ===========================================
   CALENDAR VIEW */
function CalView({data,onEdit}){
  const now=new Date();
  const [m,sm]=useState(now.getMonth());
  const [y,sy]=useState(now.getFullYear());
  const wD=["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
  const dim=new Date(y,m+1,0).getDate(),fd=new Date(y,m,1).getDay();
  const tbd=useMemo(()=>{
    const mp={};
    const dim2=new Date(y,m+1,0).getDate();
    data.tasks.filter(t=>t.status!=="archived").forEach(t=>{
      if(!t.recurrence){
        if(!t.dueDate)return;
        const d=new Date(t.dueDate+"T12:00:00");
        if(d.getMonth()===m&&d.getFullYear()===y){const day=d.getDate();mp[day]=[...(mp[day]||[]),t];}
        return;
      }
      const rec=data.recurrences.find(r=>r.id===t.recurrence);
      if(!rec)return;
      for(let day=1;day<=dim2;day++){
        const dt=new Date(y,m,day);
        const dow=dt.getDay();
        let show=false;
        if(rec.interval==="daily") show=true;
        else if(rec.interval==="custom_days"&&Array.isArray(rec.days)) show=rec.days.includes(dow);
        else if(rec.interval==="weekly"&&t.dueDate){const sd=new Date(t.dueDate+"T12:00:00");show=dow===sd.getDay();}
        else if(rec.interval==="biweekly"&&t.dueDate){const sd=new Date(t.dueDate+"T12:00:00");const diff=Math.round((dt-sd)/86400000);show=dow===sd.getDay()&&diff>=0&&diff%14===0;}
        else if(rec.interval==="monthly"&&t.dueDate){const sd=new Date(t.dueDate+"T12:00:00");show=day===sd.getDate();}
        else if(rec.interval==="yearly"&&t.dueDate){const sd=new Date(t.dueDate+"T12:00:00");show=day===sd.getDate()&&m===sd.getMonth();}
        if(show) mp[day]=[...(mp[day]||[]),{...t,_recurring:true}];
      }
    });
    return mp;
  },[data.tasks,data.recurrences,m,y]);
  const cells=[];for(let i=0;i<fd;i++)cells.push(null);for(let i=1;i<=dim;i++)cells.push(i);
  const prev=()=>{if(m===0){sm(11);sy(y-1);}else sm(m-1);};
  const next=()=>{if(m===11){sm(0);sy(y+1);}else sm(m+1);};
  return(
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18}}>
        <button onClick={prev} style={{background:"#f1f5f9",border:"none",borderRadius:9,width:38,height:38,cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
        <h3 style={{fontSize:17,fontWeight:800,color:"#0f172a"}}>{MN[m]} {y}</h3>
        <button onClick={next} style={{background:"#f1f5f9",border:"none",borderRadius:9,width:38,height:38,cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:4}}>
        {wD.map(d=><div key={d} style={{textAlign:"center",fontSize:10,fontWeight:800,color:"#94a3b8",padding:"4px 0"}}>{d}</div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
        {cells.map((day,i)=>{
          if(!day)return<div key={`e${i}`}/>;
          const isT=day===now.getDate()&&m===now.getMonth()&&y===now.getFullYear();
          const tasks=tbd[day]||[];
          return(
            <div key={day} style={{minHeight:78,padding:5,borderRadius:9,background:isT?"#eef2ff":"#fafafa",border:`1.5px solid ${isT?"#6366f1":"#f1f5f9"}`}}>
              <div style={{fontSize:11,fontWeight:800,width:22,height:22,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:"50%",background:isT?"#6366f1":"transparent",color:isT?"#fff":"#374151",marginBottom:3}}>{day}</div>
              {tasks.slice(0,3).map(t=>{
                const st=STS.find(s=>s.id===t.status)||STS[0];
                const co=data.companies.find(x=>x.id===t.company);
                const asg=data.collaborators.filter(x=>t.assignees.includes(x.id)).slice(0,2);
                const lbs=data.labels.filter(x=>t.labels.includes(x.id)).slice(0,2);
                return(
                  <div key={t.id} onClick={()=>onEdit(t)} style={{marginBottom:3,borderRadius:6,border:"1.5px solid "+st.c+"33",background:"#fff",cursor:"pointer",overflow:"hidden"}}>
                    <div style={{background:st.c,height:2}}/>
                    <div style={{padding:"2px 4px"}}>
                      <div style={{fontSize:9,fontWeight:800,color:"#0f172a",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.title}</div>
                      {co&&<div style={{fontSize:8,color:co.color,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{co.logo||co.name.slice(0,2)} {co.name}</div>}
                      {asg.length>0&&<div style={{display:"flex",gap:2,marginTop:1}}>{asg.map(u=><span key={u.id} style={{fontSize:7,fontWeight:700,padding:"1px 4px",borderRadius:4,background:u.color+"22",color:u.color}}>{u.initials||u.name.slice(0,2)}</span>)}</div>}
                      {lbs.length>0&&<div style={{display:"flex",gap:2,marginTop:1,flexWrap:"wrap"}}>{lbs.map(l=><span key={l.id} style={{fontSize:7,fontWeight:700,padding:"1px 4px",borderRadius:4,background:l.color+"22",color:l.color}}>{l.name}</span>)}</div>}
                    </div>
                  </div>
                );
              })}
              {tasks.length>2&&<div style={{fontSize:9,color:"#94a3b8"}}>+{tasks.length-2}</div>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function CompaniesPage({ data, setData }) {
  const blank={name:"",color:"#6366f1",logo:"",tributacao:"Simples Nacional",cnpj:"",email:"",telefone:"",socio:"",observacoes:"",services:[]};
  const [open,setOpen]=useState(false);
  const [editing,setEditing]=useState(null);
  const [form,setForm]=useState(blank);
  const [tab,setTab]=useState("info");
  const openNew=()=>{setEditing(null);setForm(blank);setTab("info");setOpen(true);};
  const openEdit=(c)=>{setEditing(c);setForm({...blank,...c,services:toArr(c.services)});setTab("info");setOpen(true);};
  const save=()=>{
    if(!form.name.trim())return;
    const logo=form.logo||form.name.slice(0,2).toUpperCase();
    const co={...form,logo};
    let newId=null;
    if(editing){
      setData(d=>({...d,companies:d.companies.map(c=>c.id===editing.id?{...c,...co}:c)}));
    } else {
      newId=uid();
      setData(d=>({...d,companies:[...d.companies,{id:newId,...co}]}));
    }
    const coId=editing?editing.id:newId;
    const svcs=data.services.filter(s=>toArr(form.services).includes(s.id));
    if(svcs.length>0&&coId){
      setData(d=>{
        let tasks=[...d.tasks];
        svcs.forEach(svc=>{
          const exists=tasks.some(t=>t.company===coId&&t._serviceId===svc.id);
          if(!exists){
            tasks.push({
              id:uid(),title:svc.name,description:svc.description||"",
              status:svc.status||"todo",priority:svc.priority||"media",
              company:coId,sector:svc.sector||"",
              assignees:toArr(svc.assignees),labels:toArr(svc.labels),
              checklist:toArr(svc.checklist).map(ck=>({...ck,done:false})),
              dependencies:[],recurrence:svc.recurrence||"",
              dueDate:svc.defaultDue||"",
              createdAt:todayStr(),completedAt:null,archivedAt:null,
              _serviceId:svc.id,
            });
          }
        });
        return {...d,tasks};
      });
    }
    setOpen(false);
  };
  const {ask:askDel,modal:delModal}=useConfirmDelete();
  const del=(id)=>{const item=data.companies.find(x=>x.id===id);askDel(`Empresa: "${item?.name||""}"`,()=>setData(d=>({...d,companies:d.companies.filter(c=>c.id!==id)})));};
  const tabSt=(t)=>({padding:"6px 14px",border:"none",borderRadius:8,cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:"inherit",background:tab===t?"#6366f1":"#f1f5f9",color:tab===t?"#fff":"#64748b"});
  return (

function RecurrencesPage({ data, setData }) {
  const [open,setOpen]=useState(false);
  const [editing,setEditing]=useState(null);
  const [form,setForm]=useState({name:"",interval:"custom_days",days:[]});
  const openNew=()=>{setEditing(null);setForm({name:"",interval:"custom_days",days:[]});setOpen(true);};
  const openEdit=(r)=>{setEditing(r);setForm({name:r.name,interval:r.interval,days:r.days||[]});setOpen(true);};
  const save=()=>{
    if(!form.name.trim())return;
    if(editing) setData(d=>({...d,recurrences:d.recurrences.map(r=>r.id===editing.id?{...r,...form}:r)}));
    else setData(d=>({...d,recurrences:[...d.recurrences,{id:uid(),...form}]}));
    setOpen(false);
  };
  const {ask:askDel,modal:delModal}=useConfirmDelete();
  const del=(id)=>{const item=data.recurrences.find(x=>x.id===id);askDel(`Recorrência: "${item?.name||""}"`,()=>setData(d=>({...d,recurrences:d.recurrences.filter(r=>r.id!==id)})));};

  const describeRec=(r)=>{
    if(r.interval==="custom_days" && r.days?.length>0)
      return "Toda "+r.days.map(d=>WDAYS[d].s).join(", ");
    return RINTS.find(x=>x.value===r.interval)?.label||r.interval;
  };

  return (
    <div>
      <PH title="Recorrências" icon="↻" badge={data.recurrences.length} action={<Btn onClick={openNew}>+ Nova Recorrência</Btn>}/>
      <div className="g-recs" style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:12}}>
        {data.recurrences.map(r=>{
          const used=data.tasks.filter(t=>t.recurrence===r.id).length;
          const desc=describeRec(r);
          return (
            <div key={r.id} style={{background:"#fff",border:"1px solid #f1f5f9",borderRadius:14,padding:18,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
              <div style={{fontSize:26,marginBottom:8}}>↻</div>
              <div style={{fontWeight:800,fontSize:14,color:"#0f172a",marginBottom:4}}>{r.name}</div>
              <div style={{fontSize:12,color:"#64748b",marginBottom:4}}>{desc}</div>
              {r.interval==="custom_days" && r.days?.length>0 && (
                <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:10}}>
                  {r.days.map(d=><span key={d} style={{fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:6,background:"#eef2ff",color:"#6366f1"}}>{WDAYS[d].s}</span>)}
                </div>
              )}
              <div style={{fontSize:11,color:"#94a3b8",marginBottom:14}}>{used} tarefa{used!==1?"s":""}</div>
              <div style={{display:"flex",gap:8}}>
                <Btn onClick={()=>openEdit(r)} v="ghost" sz="sm" xs={{flex:1,justifyContent:"center"}}>✎ Editar</Btn>
                <Btn onClick={()=>del(r.id)} v="danger" sz="sm">×</Btn>
              </div>
            </div>
          );
        })}
      </div>
      <Modal open={open} onClose={()=>setOpen(false)} title={editing?"Editar Recorrência":"Nova Recorrência"} width={440}>
        <div style={{display:"flex",flexDirection:"column",gap:16}}>
          <Inp label="Nome *" value={form.name} onChange={v=>setForm(f=>({...f,name:v}))} placeholder="Ex: Toda Ter e Qui"/>
          <Sel label="Tipo de Intervalo" value={form.interval} onChange={v=>setForm(f=>({...f,interval:v,days:[]}))} options={RINTS}/>
          {form.interval==="custom_days" && (
            <Fld label="Dias da semana *">
              <WDSel value={form.days} onChange={v=>setForm(f=>({...f,days:v}))}/>
              {form.days.length>0 && <div style={{fontSize:12,color:"#64748b",marginTop:4}}>Selecionado: {form.days.map(d=>WDAYS[d].l).join(", ")}</div>}
            </Fld>
          )}
          <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
            <Btn onClick={()=>setOpen(false)} v="ghost">Cancelar</Btn>
            <Btn onClick={save}>Salvar</Btn>
          </div>
        </div>
      </Modal>
      {delModal}
    </div>
  );
}

// --- SERVIÇOS ---------------------------------------------------
function ServicosPage({ data, setData }) {
  const blankSvc={name:"",description:"",color:"#6366f1",status:"todo",priority:"media",recurrence:"",defaultDue:"",sector:"",assignees:[],labels:[],checklist:[]};
  const [open,setOpen]=useState(false);
  const [editing,setEditing]=useState(null);
  const [form,setForm]=useState(blankSvc);
  const [tab,setTab]=useState("geral");
  const [ckTxt,setCkTxt]=useState("");
  const openNew=()=>{setEditing(null);setForm(blankSvc);setTab("geral");setCkTxt("");setOpen(true);};
  const openEdit=(s)=>{setEditing(s);setForm({...blankSvc,...s,assignees:toArr(s.assignees),labels:toArr(s.labels),checklist:toArr(s.checklist)});setTab("geral");setCkTxt("");setOpen(true);};
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const tog=(k,id)=>setForm(f=>({...f,[k]:toArr(f[k]).includes(id)?toArr(f[k]).filter(x=>x!==id):[...toArr(f[k]),id]}));
  const addCk=()=>{if(!ckTxt.trim())return;set("checklist",[...toArr(form.checklist),{id:uid(),text:ckTxt.trim(),done:false}]);setCkTxt("");};
  const save=()=>{
    if(!form.name.trim())return;
    const svc={...form,checklist:toArr(form.checklist),assignees:toArr(form.assignees),labels:toArr(form.labels)};
    if(editing) setData(d=>({...d,services:d.services.map(s=>s.id===editing.id?{...s,...svc}:s)}));
    else setData(d=>({...d,services:[...(d.services||[]),{id:uid(),...svc}]}));
    setOpen(false);
  };
  const {ask:askDel,modal:delModal}=useConfirmDelete();
  const del=(id)=>{const item=(data.services||[]).find(x=>x.id===id);askDel(`Servico: "${item?.name||""}"`,()=>setData(d=>({...d,services:d.services.filter(s=>s.id!==id)})));};
  const tabSt=(t)=>({padding:"7px 16px",border:"none",borderRadius:9,cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:"inherit",transition:"all .12s",background:tab===t?"#6366f1":"#f1f5f9",color:tab===t?"#fff":"#64748b"});
  return (
    <div>
      <PH title="Servicos" icon="S" badge={(data.services||[]).length} action={<Btn onClick={openNew}>+ Novo Servico</Btn>}/>
      <p style={{fontSize:13,color:"#64748b",marginBottom:16}}>Cada servico e um modelo completo de tarefa com checklist, responsaveis e recorrencia. Vincule a uma empresa para gerar tarefas automaticamente.</p>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:14}}>
        {(data.services||[]).map(s=>{
          const rec=data.recurrences.find(r=>r.id===s.recurrence);
          const usedBy=data.companies.filter(c=>toArr(c.services).includes(s.id));
          const ck=toArr(s.checklist);
          const asg=data.collaborators.filter(c=>toArr(s.assignees).includes(c.id));
          const lbs=data.labels.filter(l=>toArr(s.labels).includes(l.id));
          const pri=PRI[s.priority]||PRI.media;
          return (
            <div key={s.id} style={{background:"#fff",borderRadius:14,padding:18,border:"1px solid #f1f5f9",boxShadow:"0 2px 8px rgba(0,0,0,.06)"}}>
              <div style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:12}}>
                <div style={{width:42,height:42,borderRadius:10,background:(s.color||"#6366f1")+"18",border:"2px solid "+(s.color||"#6366f1")+"44",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:900,color:s.color||"#6366f1",flexShrink:0}}>S</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:900,fontSize:14,color:"#0f172a",marginBottom:2}}>{s.name}</div>
                  {s.description&&<div style={{fontSize:11,color:"#94a3b8",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.description}</div>}
                </div>
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:10}}>
                <span style={{fontSize:10,padding:"2px 7px",borderRadius:20,background:pri.bg,color:pri.t,fontWeight:700}}>{pri.l}</span>
                {rec&&<span style={{fontSize:10,padding:"2px 7px",borderRadius:20,background:"#6366f118",color:"#6366f1",fontWeight:700}}>{rec.name}</span>}
                {s.defaultDue&&<span style={{fontSize:10,padding:"2px 7px",borderRadius:20,background:"#f59e0b18",color:"#f59e0b",fontWeight:700}}>{fmtDate(s.defaultDue)}</span>}
                {lbs.map(l=><span key={l.id} style={{fontSize:10,padding:"2px 7px",borderRadius:20,background:l.color+"18",color:l.color,fontWeight:700}}>{l.name}</span>)}
              </div>
              {ck.length>0&&<div style={{marginBottom:10}}>
                <div style={{height:4,borderRadius:2,background:"#f1f5f9",overflow:"hidden",marginBottom:4}}><div style={{width:"30%",height:"100%",background:"#6366f1",borderRadius:2}}/></div>
                <div style={{fontSize:11,color:"#94a3b8",fontWeight:600}}>{ck.length} item{ck.length!==1?"s":""} no checklist</div>
              </div>}
              {asg.length>0&&<div style={{display:"flex",marginBottom:10}}>
                {asg.slice(0,5).map((u,i)=><div key={u.id} style={{marginLeft:i>0?-7:0}}><Av initials={u.initials} color={u.color} size={26} title={u.name}/></div>)}
                {asg.length>5&&<div style={{width:26,height:26,borderRadius:"50%",background:"#f1f5f9",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:"#94a3b8",marginLeft:-7}}>+{asg.length-5}</div>}
              </div>}
              {usedBy.length>0&&<div style={{fontSize:11,color:"#94a3b8",marginBottom:10}}>Empresas: {usedBy.map(c=>c.name).join(", ")}</div>}
              <div style={{display:"flex",gap:8}}>
                <Btn onClick={()=>openEdit(s)} v="ghost" sz="sm" xs={{flex:1,justifyContent:"center"}}>Editar</Btn>
                <Btn onClick={()=>del(s.id)} v="danger" sz="sm">x</Btn>
              </div>
            </div>
          );
        })}
      </div>
      <Modal open={open} onClose={()=>setOpen(false)} title={editing?"Editar Servico":"Novo Servico"} width={640}>
        <div style={{display:"flex",gap:6,marginBottom:18,flexWrap:"wrap"}}>
          {[["geral","Geral"],["responsaveis","Responsaveis"],["checklist","Checklist"],["config","Recorrencia"]].map(([t,l])=>(
            <button key={t} style={tabSt(t)} onClick={()=>setTab(t)}>{l}</button>
          ))}
        </div>
        {tab==="geral"&&<div style={{display:"flex",flexDirection:"column",gap:13}}>
          <Inp label="Nome do Servico *" value={form.name} onChange={v=>set("name",v)} placeholder="Ex: Folha de Pagamento"/>
          <Txt label="Descricao / Instrucoes" value={form.description} onChange={v=>set("description",v)} placeholder="Descreva o servico e instrucoes para execucao..." rows={3}/>
          <div className="g2">
            <Sel label="Prioridade padrao" value={form.priority} onChange={v=>set("priority",v)} options={Object.entries(PRI).map(([k,v])=>({value:k,label:v.l}))}/>
            <Sel label="Status inicial" value={form.status} onChange={v=>set("status",v)} options={STS.filter(s=>s.id!=="archived").map(s=>({value:s.id,label:s.l}))}/>
          </div>
          <Sel label="Setor padrao" value={form.sector||""} onChange={v=>set("sector",v)} placeholder="Nenhum" options={data.sectors.map(s=>({value:s.id,label:s.name}))}/>
          <Fld label="Marcadores padrao">
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
              {data.labels.map(l=>{const sel=toArr(form.labels).includes(l.id);return(
                <button key={l.id} onClick={()=>tog("labels",l.id)} style={{padding:"3px 10px",borderRadius:20,cursor:"pointer",fontSize:12,fontWeight:700,border:"2px solid "+(sel?l.color:"#e5e7eb"),background:sel?l.color+"18":"#f9fafb",color:sel?l.color:"#6b7280",fontFamily:"inherit"}}>{l.name}</button>
              );})}
            </div>
          </Fld>
          <CPick value={form.color} onChange={v=>set("color",v)}/>
        </div>}
        {tab==="responsaveis"&&<div style={{display:"flex",flexDirection:"column",gap:14}}>
          <p style={{fontSize:12,color:"#64748b"}}>Responsaveis padrao que serao atribuidos ao gerar a tarefa.</p>
          {data.collaborators.length===0
            ?<p style={{fontSize:13,color:"#94a3b8"}}>Nenhum colaborador cadastrado.</p>
            :<div style={{display:"flex",flexWrap:"wrap",gap:8}}>
              {data.collaborators.map(u=>{const sel=toArr(form.assignees).includes(u.id);return(
                <button key={u.id} onClick={()=>tog("assignees",u.id)} style={{display:"flex",alignItems:"center",gap:7,padding:"6px 12px 6px 6px",borderRadius:22,border:"2px solid "+(sel?u.color:"#e5e7eb"),background:sel?u.color+"18":"#f9fafb",color:sel?u.color:"#6b7280",cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:"inherit",transition:"all .12s"}}>
                  <Av initials={u.initials} color={u.color} size={26}/>{u.name}
                </button>
              );})}
            </div>
          }
        </div>}
        {tab==="checklist"&&<div style={{display:"flex",flexDirection:"column",gap:12}}>
          <p style={{fontSize:12,color:"#64748b"}}>Itens de checklist que toda tarefa gerada por este servico tera automaticamente.</p>
          <div style={{display:"flex",gap:8}}>
            <input value={ckTxt} onChange={e=>setCkTxt(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addCk()} placeholder="Novo item... (Enter para adicionar)" style={{flex:1,padding:"8px 13px",borderRadius:9,fontSize:13,border:"2px solid #e5e7eb",outline:"none",fontFamily:"inherit"}}/>
            <Btn onClick={addCk} sz="sm">+ Add</Btn>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:5,maxHeight:320,overflowY:"auto"}}>
            {toArr(form.checklist).length===0&&<div style={{padding:"24px",textAlign:"center",color:"#cbd5e1",fontSize:13,border:"2px dashed #f1f5f9",borderRadius:10}}>Nenhum item ainda. Adicione acima.</div>}
            {toArr(form.checklist).map((ck,idx)=>(
              <div key={ck.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",borderRadius:9,background:"#f9fafb",border:"1px solid #f3f4f6"}}>
                <span style={{width:22,height:22,borderRadius:6,border:"2px solid #e5e7eb",background:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:"#94a3b8",flexShrink:0}}>{idx+1}</span>
                <span style={{flex:1,fontSize:13,color:"#374151"}}>{ck.text}</span>
                <button onClick={()=>set("checklist",toArr(form.checklist).filter(x=>x.id!==ck.id))} style={{background:"none",border:"none",cursor:"pointer",color:"#cbd5e1",fontSize:18,lineHeight:1,padding:"0 3px",fontFamily:"inherit"}}>x</button>
              </div>
            ))}
          </div>
          {toArr(form.checklist).length>0&&<div style={{fontSize:12,color:"#6366f1",fontWeight:700}}>{toArr(form.checklist).length} item{toArr(form.checklist).length!==1?"s":""} no checklist</div>}
        </div>}
        {tab==="config"&&<div style={{display:"flex",flexDirection:"column",gap:14}}>
          <Sel label="Recorrencia padrao" value={form.recurrence||""} onChange={v=>set("recurrence",v)} placeholder="Sem recorrencia" options={data.recurrences.map(r=>({value:r.id,label:r.name}))}/>
          <Inp label="Vencimento padrao" value={form.defaultDue||""} onChange={v=>set("defaultDue",v)} type="date" hint="A tarefa gerada usara esta data como vencimento inicial"/>
          <div style={{padding:"14px",background:"#f8fafc",borderRadius:10,fontSize:12,color:"#64748b",lineHeight:1.7}}>
            <strong style={{color:"#0f172a",display:"block",marginBottom:6}}>Como funciona:</strong>
            1. Cadastre o servico preenchendo todas as abas (Geral, Responsaveis, Checklist, Recorrencia).<br/>
            2. Va em Empresas, abra a aba Servicos e marque este servico.<br/>
            3. Ao salvar a empresa, a tarefa e criada automaticamente com todos os dados do modelo.<br/>
            4. As proximas ocorrencias aparecem no Calendario e Kanban conforme a recorrencia.
          </div>
        </div>}
        <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:20,paddingTop:14,borderTop:"1px solid #f1f5f9"}}>
          <Btn onClick={()=>setOpen(false)} v="ghost">Cancelar</Btn>
          <Btn onClick={save}>Salvar Servico</Btn>
        </div>
      </Modal>
      {delModal}
    </div>
  );
}

function TemplatesPage({ data, setData, onUseTemplate }) {
  const [open,setOpen]=useState(false);
  const [editing,setEditing]=useState(null);
  const [form,setForm]=useState({name:"",description:"",labels:[],checklist:[],recurrence:""});
  const [ckInput,setCkInput]=useState("");
  const openNew=()=>{setEditing(null);setForm({name:"",description:"",labels:[],checklist:[],recurrence:""});setCkInput("");setOpen(true);};
  const openEdit=(t)=>{setEditing(t);setForm({name:t.name,description:t.description,labels:[...t.labels],checklist:[...t.checklist],recurrence:t.recurrence||""});setCkInput("");setOpen(true);};
  const save=()=>{
    if(!form.name.trim())return;
    if(editing) setData(d=>({...d,taskTemplates:d.taskTemplates.map(t=>t.id===editing.id?{...t,...form}:t)}));
    else setData(d=>({...d,taskTemplates:[...d.taskTemplates,{id:uid(),...form}]}));
    setOpen(false);
  };
  const {ask:askDel,modal:delModal}=useConfirmDelete();
  const del=(id)=>{const item=data.taskTemplates.find(x=>x.id===id);askDel(`Modelo: "${item?.name||""}"`,()=>setData(d=>({...d,taskTemplates:d.taskTemplates.filter(t=>t.id!==id)})));};
  const addCk=()=>{if(!ckInput.trim())return;setForm(f=>({...f,checklist:[...f.checklist,ckInput.trim()]}));setCkInput("");};
  const toggleL=(id)=>setForm(f=>({...f,labels:f.labels.includes(id)?f.labels.filter(x=>x!==id):[...f.labels,id]}));

  return (
    <div>
      <PH title="Modelos de Tarefa" icon="◧" badge={data.taskTemplates.length} action={<Btn onClick={openNew}>+ Novo Modelo</Btn>}/>
      <div className="g-templates" style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))",gap:14}}>
        {data.taskTemplates.map(t=>{
          const labels=data.labels.filter(l=>t.labels.includes(l.id));
          const rec=t.recurrence?data.recurrences.find(r=>r.id===t.recurrence):null;
          return (
            <div key={t.id} style={{background:"#fff",borderRadius:16,padding:20,border:"1px solid #f1f5f9",boxShadow:"0 2px 8px rgba(0,0,0,.06)"}}>
              <div style={{display:"flex",gap:5,marginBottom:10,flexWrap:"wrap"}}>
                {labels.map(l=><Chip key={l.id} label={l.name} color={l.color}/>)}
                {rec&&<span style={{fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:20,background:"#f0fdf4",color:"#14b8a6"}}>↻ {rec.name}</span>}
              </div>
              <div style={{fontWeight:900,fontSize:15,color:"#0f172a",marginBottom:6}}>{t.name}</div>
              <p style={{fontSize:12,color:"#94a3b8",marginBottom:14,lineHeight:1.5}}>{t.description}</p>
              <div style={{marginBottom:14}}>
                <div style={{fontSize:11,fontWeight:700,color:"#64748b",marginBottom:6}}>CHECKLIST ({t.checklist.length} itens)</div>
                {t.checklist.slice(0,4).map((c,i)=>(
                  <div key={i} style={{display:"flex",alignItems:"center",gap:7,fontSize:12,color:"#6b7280",marginBottom:3}}>
                    <span style={{width:5,height:5,borderRadius:"50%",background:"#cbd5e1",flexShrink:0}}/> {c}
                  </div>
                ))}
                {t.checklist.length>4&&<div style={{fontSize:11,color:"#94a3b8"}}>+{t.checklist.length-4} itens</div>}
              </div>
              <div style={{display:"flex",gap:7}}>
                <Btn onClick={()=>onUseTemplate(t)} sz="sm" xs={{flex:1,justifyContent:"center"}}>▶ Usar Modelo</Btn>
                <Btn onClick={()=>openEdit(t)} v="ghost" sz="sm">✎</Btn>
                <Btn onClick={()=>del(t.id)} v="danger" sz="sm">×</Btn>
              </div>
            </div>
          );
        })}
      </div>
      <Modal open={open} onClose={()=>setOpen(false)} title={editing?"Editar Modelo":"Novo Modelo"} width={560}>
        <div style={{display:"flex",flexDirection:"column",gap:16}}>
          <Inp label="Nome *" value={form.name} onChange={v=>setForm(f=>({...f,name:v}))} placeholder="Nome do modelo"/>
          <Txt label="Descrição" value={form.description} onChange={v=>setForm(f=>({...f,description:v}))} placeholder="Descreva o modelo..."/>
          <Sel label="Recorrência padrão" value={form.recurrence||""} onChange={v=>setForm(f=>({...f,recurrence:v}))} placeholder="Sem recorrência" options={data.recurrences.map(r=>({value:r.id,label:r.name}))}/>
          <Fld label="Marcadores padrão">
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {data.labels.map(l=>{
                const sel=form.labels.includes(l.id);
                return <button key={l.id} onClick={()=>toggleL(l.id)} style={{padding:"3px 11px",borderRadius:20,cursor:"pointer",fontSize:12,fontWeight:700,border:`2px solid ${sel?l.color:"#e5e7eb"}`,background:sel?l.color+"18":"#f9fafb",color:sel?l.color:"#6b7280",fontFamily:"inherit",transition:"all .12s"}}>{l.name}</button>;
              })}
            </div>
          </Fld>
          <Fld label="Checklist padrão">
            <div style={{display:"flex",gap:8,marginBottom:8}}>
              <input value={ckInput} onChange={e=>setCkInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addCk()} placeholder="Adicionar item (Enter)..." style={{flex:1,padding:"7px 12px",borderRadius:9,fontSize:13,border:"2px solid #e5e7eb",outline:"none",fontFamily:"inherit"}}/>
              <Btn onClick={addCk} sz="sm">+</Btn>
            </div>
            {form.checklist.map((c,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",borderRadius:8,background:"#f9fafb",marginBottom:4}}>
                <span style={{flex:1,fontSize:13}}>{c}</span>
                <button onClick={()=>setForm(f=>({...f,checklist:f.checklist.filter((_,j)=>j!==i)}))} style={{background:"none",border:"none",cursor:"pointer",color:"#cbd5e1",fontSize:16}}>×</button>
              </div>
            ))}
          </Fld>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
            <Btn onClick={()=>setOpen(false)} v="ghost">Cancelar</Btn>
            <Btn onClick={save}>Salvar Modelo</Btn>
          </div>
        </div>
      </Modal>
      {delModal}
    </div>
  );
}

function Dashboard({ data }) {
  const thisMonth = new Date().getMonth();
  const thisYear  = new Date().getFullYear();
  const [fMonth, setFMonth] = useState(thisMonth);
  const [fYear,  setFYear]  = useState(thisYear);
  const [coFilter, setCoFilter] = useState("");
  // mNames alias removed - using MS constant

  const [viewMode, setViewMode] = useState("month"); // month | year

  const filteredTasks = useMemo(()=>{
    return data.tasks.filter(t=>{
      if(t.status==="archived") return false;
      if(coFilter && t.company!==coFilter) return false;
      const dateStr = t.createdAt || t.dueDate || "";
      if(!dateStr) return true; // show tasks without date
      const d = new Date(dateStr+"T12:00:00");
      if(viewMode==="year") return d.getFullYear()===fYear;
      return d.getMonth()===fMonth && d.getFullYear()===fYear;
    });
  },[data.tasks,fMonth,fYear,coFilter,viewMode]);

  const allTasks = coFilter ? data.tasks.filter(t=>t.company===coFilter) : data.tasks;

  const stats = useMemo(()=>{
    const t=filteredTasks;
    const total=t.length;
    const byStatus={};
    STS.forEach(s=>{byStatus[s.id]=t.filter(x=>x.status===s.id).length;});
    const overdue=t.filter(x=>isLate(x)).length;
    const totalCk=t.reduce((a,x)=>a+x.checklist.length,0);
    const doneCk=t.reduce((a,x)=>a+x.checklist.filter(c=>c.done).length,0);
    return {total,byStatus,overdue,totalCk,doneCk};
  },[filteredTasks]);

  // Por empresa
  const byCompany = useMemo(()=>data.companies.map(c=>{
    const tasks=filteredTasks.filter(t=>t.company===c.id);
    const done=tasks.filter(t=>t.status==="done").length;
    const doing=tasks.filter(t=>t.status==="doing").length;
    const overdue=tasks.filter(t=>isLate(t)).length;
    return {...c,total:tasks.length,done,doing,overdue};
  }),[filteredTasks,data.companies]);

  // Por colaborador
  const byCollaborator = useMemo(()=>data.collaborators.map(u=>{
    const tasks=filteredTasks.filter(t=>t.assignees.includes(u.id));
    const done=tasks.filter(t=>t.status==="done").length;
    const doing=tasks.filter(t=>t.status==="doing").length;
    const overdue=tasks.filter(t=>isLate(t)).length;
    return {...u,total:tasks.length,done,doing,overdue};
  }).filter(u=>u.total>0),[filteredTasks,data.collaborators]);

  // Por setor
  const bySector = useMemo(()=>data.sectors.map(s=>{
    const tasks=filteredTasks.filter(t=>t.sector===s.id);
    return {...s,total:tasks.length,done:tasks.filter(t=>t.status==="done").length};
  }).filter(s=>s.total>0),[filteredTasks,data.sectors]);

  const maxTasks = Math.max(1,...byCompany.map(c=>c.total),...byCollaborator.map(u=>u.total));

  return (
    <div>
      {/* Filtros de período */}
      <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:24,padding:"14px 18px",background:"#fff",borderRadius:14,border:"1px solid #f1f5f9",boxShadow:"0 1px 4px rgba(0,0,0,.05)"}}>
        <span style={{fontSize:13,fontWeight:700,color:"#64748b"}}>📊 Período:</span>
        <div style={{display:"flex",gap:4,background:"#f1f5f9",borderRadius:8,padding:3}}>
          {[["month","Mensal"],["year","Anual"]].map(([v,l])=>(
            <button key={v} onClick={()=>setViewMode(v)} style={{padding:"5px 12px",borderRadius:6,border:"none",cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:700,background:viewMode===v?"#fff":"transparent",color:viewMode===v?"#6366f1":"#64748b",transition:"all .15s"}}>{l}</button>
          ))}
        </div>
        {viewMode==="month" && (
          <select value={fMonth} onChange={e=>setFMonth(Number(e.target.value))} style={{padding:"6px 10px",borderRadius:8,fontSize:13,border:"2px solid #e5e7eb",outline:"none",fontFamily:"inherit",background:"#fff"}}>
            {MS.map((m,i)=><option key={i} value={i}>{m}</option>)}
          </select>
        )}
        <select value={fYear} onChange={e=>setFYear(Number(e.target.value))} style={{padding:"6px 10px",borderRadius:8,fontSize:13,border:"2px solid #e5e7eb",outline:"none",fontFamily:"inherit",background:"#fff"}}>
          {[2024,2025,2026,2027,2028].map(y=><option key={y} value={y}>{y}</option>)}
        </select>
        <select value={coFilter} onChange={e=>setCoFilter(e.target.value)} style={{padding:"6px 10px",borderRadius:8,fontSize:13,border:"2px solid #e5e7eb",outline:"none",fontFamily:"inherit",background:"#fff"}}>
          <option value="">Todas as empresas</option>
          {data.companies.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
        </select>
        <span style={{fontSize:12,color:"#94a3b8",marginLeft:"auto"}}>

        {byCompany.map(c=>(

function App(){
  const {user,loading:authLoading,signIn,signUp,signOut} = useAuth();
  const [data,setData,synced] = useSharedData();
  const {acquire,forceAcquire,release,getLock} = useLocks();
  const {list:toasts,add:toast} = useToast();
  const {ask:askDelete, modal:deleteModal} = useConfirmDelete();
  const [page,setPage]      = useState("dashboard");
  const [taskModal,setTM]   = useState({open:false,task:null,defStatus:"todo",lockInfo:null});
  const [sideCol,setSideCol]= useState(false);

  // Enquanto verifica sessão
  if(authLoading) return(
    <div style={{minHeight:"100dvh",display:"flex",alignItems:"center",justifyContent:"center",background:"#0f172a"}}>
      <div style={{textAlign:"center"}}>
        <div style={{width:48,height:48,borderRadius:14,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,color:"#fff",fontWeight:900,margin:"0 auto 16px"}}>M</div>
        <div style={{color:"#475569",fontSize:13}}>Carregando...</div>
      </div>
    </div>
  );

  // Não logado -> tela de login
  if(!user) return <LoginScreen onLogin={signIn} onSignUp={signUp}/>;

  // Dados ainda sincronizando
  if(!synced) return(
    <div style={{minHeight:"100dvh",display:"flex",alignItems:"center",justifyContent:"center",background:"#f1f5f9"}}>
      <div style={{textAlign:"center"}}>
        <div style={{width:48,height:48,borderRadius:14,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,color:"#fff",fontWeight:900,margin:"0 auto 16px"}}>M</div>
        <div style={{color:"#64748b",fontSize:13,fontWeight:600}}>Sincronizando dados...</div>
      </div>
    </div>
  );

  const userName = user.user_metadata?.name || user.email?.split("@")[0] || "Usuário";

  const openNew=(status="todo")=>setTM({open:true,task:null,defStatus:status,lockInfo:null});

  const openEdit=(task)=>{
    const safeTask=sanitizeTask(task);
    const r=acquire(safeTask.id);
    if(!r.ok){
      setTM({open:true,task:safeTask,defStatus:safeTask.status,lockInfo:{user:r.holder}});
      toast(`🔒 ${r.holder} está editando esta tarefa.`,"lock",5000);
    } else {
      setTM({open:true,task:safeTask,defStatus:safeTask.status,lockInfo:null});
    }
  };

  const closeTask=()=>{
    if(taskModal.task) release(taskModal.task.id);
    setTM(m=>({...m,open:false,lockInfo:null}));
  };

  const forceLock=()=>{
    if(taskModal.task){ forceAcquire(taskModal.task.id); setTM(m=>({...m,lockInfo:null})); toast("✅ Você assumiu a edição.","ok"); }
  };


  // Gera tarefas reais independentes para recorrência (4 semanas à frente)
  const generateRecurringTasks=(base,rec)=>{
    const tasks=[];
    const today=new Date();
    today.setHours(0,0,0,0);
    const end=new Date(today);
    end.setDate(today.getDate()+28); // 4 semanas

    if(rec.interval==="daily"){
      for(let d=new Date(today);d<=end;d.setDate(d.getDate()+1)){
        const ds=d.toISOString().slice(0,10);
        tasks.push({...base,id:uid(),dueDate:ds,recurrence:"",_recGroup:base.id,createdAt:todayStr()});
      }
    } else if(rec.interval==="custom_days"&&Array.isArray(rec.days)&&rec.days.length>0){
      for(let d=new Date(today);d<=end;d.setDate(d.getDate()+1)){
        if(rec.days.includes(d.getDay())){
          const ds=d.toISOString().slice(0,10);
          tasks.push({...base,id:uid(),dueDate:ds,recurrence:"",_recGroup:base.id,createdAt:todayStr()});
        }
      }
    } else if(rec.interval==="weekly"){
      const targetDow=base.dueDate?new Date(base.dueDate+"T12:00:00").getDay():today.getDay();
      for(let d=new Date(today);d<=end;d.setDate(d.getDate()+1)){
        if(d.getDay()===targetDow){
          const ds=d.toISOString().slice(0,10);
          tasks.push({...base,id:uid(),dueDate:ds,recurrence:"",_recGroup:base.id,createdAt:todayStr()});
        }
      }
    } else if(rec.interval==="biweekly"){
      const targetDow=base.dueDate?new Date(base.dueDate+"T12:00:00").getDay():today.getDay();
      let count=0;
      for(let d=new Date(today);d<=end;d.setDate(d.getDate()+1)){
        if(d.getDay()===targetDow){
          if(count%2===0){
            const ds=d.toISOString().slice(0,10);
            tasks.push({...base,id:uid(),dueDate:ds,recurrence:"",_recGroup:base.id,createdAt:todayStr()});
          }
          count++;
        }
      }
    } else if(rec.interval==="monthly"){
      const targetDay=base.dueDate?new Date(base.dueDate+"T12:00:00").getDate():today.getDate();
      for(let m=0;m<3;m++){
        const d=new Date(today.getFullYear(),today.getMonth()+m,targetDay);
        if(d>=today){
          const ds=d.toISOString().slice(0,10);
          tasks.push({...base,id:uid(),dueDate:ds,recurrence:"",_recGroup:base.id,createdAt:todayStr()});
        }
      }
    } else if(rec.interval==="yearly"){
      const d=base.dueDate?new Date(base.dueDate+"T12:00:00"):today;
      const next=new Date(today.getFullYear(),d.getMonth(),d.getDate());
      if(next>=today){
        tasks.push({...base,id:uid(),dueDate:next.toISOString().slice(0,10),recurrence:"",_recGroup:base.id,createdAt:todayStr()});
      }
    }
    return tasks;
  };

  const saveTask=(updated)=>{
    const isNew=!data.tasks.find(t=>t.id===updated.id);
    const base={
      ...updated,
      assignees: Array.isArray(updated.assignees)?updated.assignees:[],
      labels: Array.isArray(updated.labels)?updated.labels:[],
      checklist: Array.isArray(updated.checklist)?updated.checklist:[],
      dependencies: Array.isArray(updated.dependencies)?updated.dependencies:[],
      completedAt:updated.status==="done"&&!updated.completedAt?todayStr():updated.completedAt
    };

    // Se nova tarefa com recorrência: gerar cópias reais independentes
    if(isNew && base.recurrence){
      const rec=data.recurrences.find(r=>r.id===base.recurrence);
      if(rec){
        const copies=generateRecurringTasks(base,rec);
        if(copies.length>0){
          setData(d=>({...d,tasks:[...d.tasks,...copies]}));
          if(taskModal.task) release(taskModal.task.id);
          setTM(m=>({...m,open:false}));
          toast(`✦ ${copies.length} tarefas recorrentes criadas!`,"ok");
          return;
        }
      }
    }

    setData(d=>{
      const ex=d.tasks.find(t=>t.id===base.id);
      return {...d,tasks:ex?d.tasks.map(t=>t.id===base.id?base:t):[...d.tasks,base]};
    });
    if(taskModal.task) release(taskModal.task.id);
    setTM(m=>({...m,open:false}));
    toast(isNew?"✦ Tarefa criada!":"💾 Tarefa atualizada!","ok");
  };

  const deleteTask=(id)=>{
    const lk=getLock(id);
    if(lk){toast(`🔒 Não pode excluir: ${lk.user} está editando.`,"err");return;}
    const t=data.tasks.find(x=>x.id===id);
    askDelete(`Tarefa: "${t?.title||""}"`, ()=>{
      setData(d=>({...d,tasks:d.tasks.filter(t=>t.id!==id)}));
      toast("Tarefa excluída.","warn");
    });
  };

  // Auto-archive completed tasks older than archiveDays
  // Auto-archive handled manually via Config page

  
  const deduplicateTasks=()=>{
    const seen=new Set();
    const deduped=data.tasks.filter(t=>{
      const key=`${t.title}|${t.company||""}|${t.dueDate||""}|${t.recurrence||""}`;
      if(seen.has(key)) return false;
      seen.add(key); return true;
    });
    const removed=data.tasks.length-deduped.length;
    if(removed===0){toast("Nenhuma duplicata encontrada.","ok");return;}
    setData(d=>({...d,tasks:deduped}));
    toast(`${removed} tarefa${removed>1?"s duplicadas removidas":"duplicada removida"}!`,"ok");
  };

  const quickComplete=(task)=>{
    const lk=getLock(task.id);
    if(lk){toast(`🔒 ${lk.user} está editando. Aguarde.`,"lock",4000);return;}
    const CYCLE={todo:"doing",doing:"review",review:"done",done:"todo"};
    const LABELS={todo:"Em Análise",doing:"Revisão",review:"Concluído",done:"A Fazer"};
    const cur=task.status||"todo";
    const next=CYCLE[cur]||"doing";
    setData(d=>({...d,tasks:d.tasks.map(t=>t.id===task.id?{
      ...t,status:next,
      completedAt:next==="done"?todayStr():null,
      checklist:next==="done"?t.checklist.map(c=>({...c,done:true})):t.checklist,
    }:t)}));
    toast(`→ ${LABELS[cur]}!`,"ok");
  };

  const useTemplate=(tpl)=>{
    const nt={id:uid(),title:tpl.name,description:tpl.description,status:"todo",priority:"media",
      company:"",sector:"",assignees:[],labels:tpl.labels,dueDate:"",
      checklist:tpl.checklist.map(text=>({id:uid(),text,done:false})),
      dependencies:[],recurrence:tpl.recurrence||"",createdAt:todayStr()};
    setTM({open:true,task:nt,defStatus:"todo",lockInfo:null});
    setPage("kanban");
  };

  const exportData=()=>{const b=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=`mdtec-backup-${todayStr()}.json`;a.click();URL.revokeObjectURL(u);toast("Backup exportado!","ok");};
  const importData=()=>{const i=document.createElement("input");i.type="file";i.accept=".json";i.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const p=JSON.parse(ev.target.result);if(p.tasks&&p.companies){setData(p);toast("Dados importados!","ok");}else toast("Arquivo inválido.","err");}catch{toast("Erro ao importar.","err");}};r.readAsText(f);};i.click();};
  const resetData=()=>{ askDelete("Todos os dados serão apagados e substituídos pelos dados iniciais!", ()=>{setData(SEED);toast("Dados restaurados.","warn");}); };

  const overdueCount=data.tasks.filter(t=>isLate(t)).length;
  const doingCount  =data.tasks.filter(t=>t.status==="doing").length;
  const curPage     =NAV_GROUPS.flatMap(g=>g.items).find(i=>i.id===page);

  return(
    <div className="shell" style={{minHeight:"100dvh",width:"100%"}}>
      {}
      <aside className={`sidebar${sideCol?" slim":""}`}>
        <div className="sb-logo" style={{padding:sideCol?"14px 12px":"20px 16px",borderBottom:"1px solid rgba(255,255,255,.06)"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:36,height:36,borderRadius:10,flexShrink:0,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,color:"#fff",fontWeight:900,boxShadow:"0 4px 14px rgba(99,102,241,.5)"}}>M</div>
            {!sideCol&&<div><div style={{fontSize:14,fontWeight:900,color:"#f8fafc",lineHeight:1.2}}>MdTec Gestão</div><div style={{fontSize:10,color:"#475569",fontWeight:600}}>Sistema de Tarefas</div></div>}
          </div>
        </div>
        {!sideCol&&(
          <div className="sb-stats" style={{margin:"10px 12px",padding:"10px 12px",background:"rgba(255,255,255,.04)",borderRadius:10,border:"1px solid rgba(255,255,255,.06)"}}>
            <div style={{display:"flex",justifyContent:"space-between"}}>
              {[{v:data.tasks.length,l:"Total",c:"#818cf8"},{v:doingCount,l:"Andamento",c:"#fbbf24"},{v:overdueCount,l:"Atraso",c:overdueCount>0?"#f87171":"#475569"}].map(({v,l,c})=>(
                <div key={l} style={{textAlign:"center"}}>
                  <div style={{fontSize:16,fontWeight:900,color:c}}>{v}</div>
                  <div style={{fontSize:9,color:"#475569",fontWeight:600,textTransform:"uppercase",letterSpacing:".05em"}}>{l}</div>
                </div>
              ))}
            </div>
          </div>
        )}
        <nav className="sb-nav" style={{flex:1,padding:"8px 10px",overflowY:"auto",display:"flex",flexDirection:"column"}}>
          {NAV_GROUPS.map(group=>(
            <div key={group.label} style={{marginBottom:8}}>
              {!sideCol&&<div className="sb-section-lbl" style={{fontSize:9,fontWeight:800,color:"#334155",textTransform:"uppercase",letterSpacing:".1em",padding:"8px 10px 4px"}}>{group.label}</div>}
              {group.items.map(item=>{
                const active=page===item.id;
                return(
                  <button key={item.id} className="nav-btn" onClick={()=>setPage(item.id)} title={sideCol?item.label:""} style={{width:"100%",display:"flex",alignItems:"center",gap:sideCol?0:10,padding:sideCol?"10px":"9px 10px",borderRadius:9,border:"none",cursor:"pointer",background:active?"rgba(99,102,241,.2)":"transparent",color:active?"#818cf8":"#64748b",fontSize:13,fontWeight:active?800:600,textAlign:"left",fontFamily:"inherit",transition:"all .12s",marginBottom:2,justifyContent:sideCol?"center":"flex-start"}}
                    onMouseEnter={e=>!active&&(e.currentTarget.style.background="rgba(255,255,255,.04)")}
                    onMouseLeave={e=>!active&&(e.currentTarget.style.background="transparent")}
                  >
                    <span className="nb-icon" style={{fontSize:15,width:sideCol?20:18,textAlign:"center",flexShrink:0}}>{item.icon}</span>
                    {!sideCol&&item.label}
                    {!sideCol&&active&&<span className="nb-dot" style={{marginLeft:"auto",width:6,height:6,borderRadius:"50%",background:"#818cf8"}}/>}
                  </button>
                );
              })}
            </div>
          ))}
        </nav>
        <div className="sb-bottom" style={{padding:"10px 10px 14px",borderTop:"1px solid rgba(255,255,255,.06)"}}>
          {/* Usuário logado */}
          {!sideCol&&(
            <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",borderRadius:9,background:"rgba(255,255,255,.04)",marginBottom:8}}>
              <div style={{width:28,height:28,borderRadius:"50%",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#fff",fontWeight:800,flexShrink:0}}>{userName.slice(0,2).toUpperCase()}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:11,fontWeight:700,color:"#f8fafc",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{userName}</div>
                <div style={{fontSize:9,color:"#475569",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{user.email}</div>
              </div>
              <button onClick={signOut} title="Sair" style={{background:"none",border:"none",cursor:"pointer",color:"#475569",fontSize:14,padding:2,flexShrink:0}} onMouseEnter={e=>e.currentTarget.style.color="#f87171"} onMouseLeave={e=>e.currentTarget.style.color="#475569"}>⎋</button>
            </div>
          )}
          {!sideCol&&<button onClick={openNew} style={{width:"100%",padding:"10px 0",borderRadius:10,border:"none",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",color:"#fff",fontSize:13,fontWeight:800,cursor:"pointer",fontFamily:"inherit",boxShadow:"0 4px 14px rgba(99,102,241,.4)",transition:"filter .15s",marginBottom:8}} onMouseEnter={e=>e.currentTarget.style.filter="brightness(.9)"} onMouseLeave={e=>e.currentTarget.style.filter="brightness(1)"}>+ Nova Tarefa</button>}
          {!sideCol&&(
            <div style={{display:"flex",gap:4,marginBottom:8}}>
              <button onClick={exportData} title="Exportar JSON" style={{flex:1,padding:"5px",borderRadius:6,border:"1px solid rgba(255,255,255,.07)",background:"transparent",color:"#475569",cursor:"pointer",fontSize:10,fontFamily:"inherit"}} onMouseEnter={e=>e.currentTarget.style.color="#94a3b8"} onMouseLeave={e=>e.currentTarget.style.color="#475569"}>⬇ Export</button>
              <button onClick={importData} title="Importar JSON" style={{flex:1,padding:"5px",borderRadius:6,border:"1px solid rgba(255,255,255,.07)",background:"transparent",color:"#475569",cursor:"pointer",fontSize:10,fontFamily:"inherit"}} onMouseEnter={e=>e.currentTarget.style.color="#94a3b8"} onMouseLeave={e=>e.currentTarget.style.color="#475569"}>⬆ Import</button>
              <button onClick={resetData} title="Restaurar dados" style={{padding:"5px 8px",borderRadius:6,border:"1px solid rgba(239,68,68,.18)",background:"transparent",color:"#475569",cursor:"pointer",fontSize:10,fontFamily:"inherit"}} onMouseEnter={e=>e.currentTarget.style.color="#f87171"} onMouseLeave={e=>e.currentTarget.style.color="#475569"}>⟳</button>
            </div>
          )}
          <button onClick={()=>setSideCol(s=>!s)} style={{width:"100%",padding:"7px",borderRadius:8,border:"1px solid rgba(255,255,255,.06)",background:"transparent",color:"#475569",cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"inherit",gap:4}} onMouseEnter={e=>e.currentTarget.style.color="#94a3b8"} onMouseLeave={e=>e.currentTarget.style.color="#475569"}>
            {sideCol?"›":"‹"}{!sideCol&&<span style={{fontSize:10}}>Recolher</span>}
          </button>
        </div>
      </aside>

      {}
      <main className="main-content">
        <div className="topbar" style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:28,gap:12}}>
          <div>
            <h1 style={{fontSize:26,fontWeight:900,color:"#0f172a",lineHeight:1.1,letterSpacing:"-.02em"}}>{curPage?.icon} {curPage?.label}</h1>
            <p style={{fontSize:13,color:"#94a3b8",marginTop:4,fontWeight:500}}>{new Date().toLocaleDateString("pt-BR",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}</p>
          </div>
          <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
            {overdueCount>0&&(
              <div style={{display:"flex",alignItems:"center",gap:6,padding:"6px 12px",borderRadius:10,background:"#fef2f2",border:"1px solid #fecaca"}}>
                <span style={{width:8,height:8,borderRadius:"50%",background:"#ef4444",animation:"pulse 2s infinite"}}/>
                <span style={{fontSize:12,fontWeight:700,color:"#ef4444"}}>{overdueCount} atrasada{overdueCount>1?"s":""}</span>
              </div>
            )}
            {["kanban","lista","tabela","calendario"].includes(page)&&<Btn onClick={openNew}>+ Nova Tarefa</Btn>}
          </div>
        </div>

        {page==="dashboard"     && <Dashboard data={data}/>}
        {page==="kanban"        && <KanbanView data={data} onEdit={openEdit} onDelete={deleteTask} onAdd={openNew} onComplete={quickComplete}/>}
        {page==="lista"         && <ListView data={data} onEdit={openEdit} onDelete={deleteTask} onComplete={quickComplete}/>}
        {page==="calendario"    && <CalView data={data} onEdit={openEdit}/>}
        {page==="tabela"        && <GridView data={data} onEdit={openEdit} onDelete={deleteTask} onComplete={quickComplete}/>}
        {page==="servicos"      && <ServicosPage data={data} setData={setData}/>}
        {page==="modelos"       && <TemplatesPage data={data} setData={setData} onUseTemplate={useTemplate}/>}
        {page==="empresas"      && <CompaniesPage data={data} setData={setData}/>}
        {page==="setores"       && <SectorsPage data={data} setData={setData}/>}
        {page==="colaboradores" && <CollaboratorsPage data={data} setData={setData}/>}
        {page==="marcadores"    && <LabelsPage data={data} setData={setData}/>}
        {page==="recorrencias"  && <RecurrencesPage data={data} setData={setData}/>}
        {page==="arquivadas"    && <ArchivedPage data={data} setData={setData} toast={toast}/>}
        {page==="configuracoes" && <ConfigPage data={data} setData={setData} toast={toast}/>}
      </main>

      {}
      <Modal open={taskModal.open} onClose={closeTask}
        title={taskModal.task&&data.tasks.find(t=>t.id===taskModal.task?.id)?"✎ Editar Tarefa":"✦ Nova Tarefa"}
        width={650}
      >
        {taskModal.open&&(
          <TaskForm
            key={taskModal.task?.id||"new"}
            data={data}
            task={taskModal.task}
            defStatus={taskModal.defStatus}
            onSave={saveTask}
            onClose={closeTask}
            onDelete={deleteTask}
            lockInfo={taskModal.lockInfo}
            onForce={forceLock}
          />
        )}
      </Modal>

      {deleteModal}
      <Toasts list={toasts}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
