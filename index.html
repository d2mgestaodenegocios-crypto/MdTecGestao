function GridView({data,onEdit,onDelete,onComplete}){
  const [sort,ss]=useState({k:"createdAt",dir:"desc"});
  const [fl,sfl]=useState({});
  const ts=k=>ss(s=>s.k===k?{k,dir:s.dir==="asc"?"desc":"asc"}:{k,dir:"asc"});
  const filtered=applyFilters(data.tasks.filter(t=>t.status!=="archived"),fl);
  const sorted=[...filtered].sort((a,b)=>{let va=a[sort.k]??"",vb=b[sort.k]??"";return sort.dir==="asc"?va<vb?-1:va>vb?1:0:va>vb?-1:va<vb?1:0;});
  const SH=({f:fk,l})=><button onClick={()=>ts(fk)} style={{background:"none",border:"none",cursor:"pointer",fontSize:10,fontWeight:800,color:sort.k===fk?"#6366f1":"#94a3b8",textTransform:"uppercase",letterSpacing:".05em",fontFamily:"inherit",display:"flex",alignItems:"center",gap:2}}>{l} {sort.k===fk?(sort.dir==="asc"?"↑":"↓"):"↕"}</button>;
  return(
    <div>
      <FBar data={data} filters={fl} setF={sfl}/>
      <div className="scroll-x">
        <div style={{borderRadius:14,border:"1px solid var(--border)",overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,.05)",background:"var(--bg2)"}}>
          <div className="tbl-head" style={{display:"grid",gridTemplateColumns:"12px minmax(160px,2fr) 110px 82px minmax(120px,1.3fr) minmax(90px,1fr) minmax(140px,1.4fr) 86px minmax(80px,110px) 52px",padding:"10px 16px",background:"var(--bg3)",borderBottom:"2px solid var(--border)",gap:8,alignItems:"center"}}>
            <div/>
            <SH f="title" l="Tarefa"/>
            <SH f="status" l="Status"/>
            <SH f="priority" l="Prior."/>
            <div style={{fontSize:10,fontWeight:800,color:"#94a3b8",textTransform:"uppercase",letterSpacing:".04em"}}>Empresa</div>
            <div style={{fontSize:10,fontWeight:800,color:"#94a3b8",textTransform:"uppercase",letterSpacing:".04em"}}>Setor</div>
            <div style={{fontSize:10,fontWeight:800,color:"#94a3b8",textTransform:"uppercase",letterSpacing:".04em"}}>Responsavel</div>
            <SH f="dueDate" l="Venc."/>
            <div style={{fontSize:10,fontWeight:800,color:"#94a3b8",textTransform:"uppercase",letterSpacing:".04em"}}>Check</div>
            <div/>
          </div>
          {sorted.length===0&&<div style={{padding:"38px 20px",textAlign:"center",color:"#94a3b8"}}>Nenhum resultado.</div>}
          {sorted.map((t,i)=>{
            const st=STS.find(s=>s.id===t.status)||STS[0];
            const co=(taskCompanies(t).map(id=>data.companies.find(c=>c.id===id)).filter(Boolean))[0]||null;
            const sec=data.sectors.find(s=>s.id===t.sector);
            const asg=data.collaborators.filter(c=>toArr(t.assignees).includes(c.id));
            const ckd=toArr(t.checklist).filter(c=>c.done).length,ckt=toArr(t.checklist).length;
            const over=isLate(t),done=t.status==="done";
            return(
              <div key={t.id} className="tbl-row" style={{display:"grid",gridTemplateColumns:"12px minmax(160px,2fr) 110px 82px minmax(120px,1.3fr) minmax(90px,1fr) minmax(140px,1.4fr) 86px minmax(80px,110px) 52px",padding:"10px 16px",borderBottom:i<sorted.length-1?"1px solid #f8fafc":"none",alignItems:"center",gap:8,cursor:"pointer",transition:"background .1s",background:done?"#f8fffe":"transparent"}}
                onMouseEnter={e=>e.currentTarget.style.background=done?"#f0fdf4":"#fafafa"}
                onMouseLeave={e=>e.currentTarget.style.background=done?"#f8fffe":"transparent"}
                onClick={()=>onEdit(t)}
              >
                <div style={{width:8,height:8,borderRadius:"50%",background:st.c,flexShrink:0}}/>
                <div style={{minWidth:0}}><div style={{fontSize:13,fontWeight:700,color:done?"#94a3b8":"#0f172a",textDecoration:done?"line-through":"none",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.title}</div></div>
                <SBadge status={t.status}/>
                <PBadge priority={t.priority}/>
                <div style={{minWidth:0}}>{co?<div style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:8,height:8,borderRadius:"50%",background:co.color,flexShrink:0}}/><span style={{fontSize:12,fontWeight:700,color:co.color,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{co.name}</span></div>:<span style={{color:"#cbd5e1",fontSize:12}}>—</span>}</div>
                <div style={{minWidth:0}}>{sec?<span style={{fontSize:11,padding:"2px 8px",borderRadius:20,background:sec.color+"18",color:sec.color,fontWeight:700,whiteSpace:"nowrap",display:"inline-block",maxWidth:"100%",overflow:"hidden",textOverflow:"ellipsis"}}>{sec.name}</span>:<span style={{color:"#cbd5e1",fontSize:12}}>—</span>}</div>
                <div style={{minWidth:0,display:"flex",alignItems:"center",gap:5,overflow:"hidden"}}>{asg.length===0?<span style={{color:"#cbd5e1",fontSize:12}}>—</span>:<><Av initials={asg[0].initials} color={asg[0].color} size={22} title={asg[0].name}/><span style={{fontSize:12,fontWeight:600,color:"#374151",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{asg[0].name||asg[0].initials}</span>{asg.length>1&&<span style={{fontSize:11,color:"#94a3b8",fontWeight:700,flexShrink:0}}>+{asg.length-1}</span>}</>}</div>
                <span style={{fontSize:12,color:over?"#ef4444":"#64748b",fontWeight:over?700:400,whiteSpace:"nowrap"}}>{t.dueDate?fmtDate(t.dueDate):"—"}</span>
                <div>{ckt>0?<div><div style={{height:4,borderRadius:2,background:"#f1f5f9",overflow:"hidden",marginBottom:3}}><div style={{width:`${(ckd/ckt)*100}%`,height:"100%",background:ckd===ckt?"#22c55e":"#6366f1",borderRadius:2}}/></div><span style={{fontSize:10,color:"#94a3b8",fontWeight:600}}>{ckd}/{ckt}</span></div>:<span style={{color:"#cbd5e1",fontSize:12}}>—</span>}</div>
                <div style={{display:"flex",gap:3,alignItems:"center"}} onClick={e=>e.stopPropagation()}>
                  <QCBtn status={t.status} onClick={()=>onComplete(t)} size={22} absolute={false}/>
                  <Btn onClick={()=>onDelete(t.id)} v="danger" sz="sm">×</Btn>
                </div>
              </div>
            );
          })}
        </div>
      </div>
      <div style={{marginTop:7,fontSize:12,color:"#94a3b8"}}>{sorted.length} tarefa{sorted.length!==1?"s":""}</div>
    </div>
  );
}


// --- EMPRESAS ---------------------------------------------------
function CompaniesPage({ data, setData }) {
  const blank={name:"",color:"#6366f1",logo:"",tributacao:"Simples Nacional",cnpj:"",cpfSocio:"",email:"",telefone:"",socio:"",observacoes:"",services:[],socios:[]};
  const [open,setOpen]=useState(false);
  const [editing,setEditing]=useState(null);
  const [form,setForm]=useState(blank);
  const [tab,setTab]=useState("info");
  const [svcConfig,setSvcConfig]=useState({}); // {svcId:{dataInicio,dataFim,competencia}}
  const [localToast,setLocalToast]=useState(null);
  const ltoast=(msg,type="ok")=>{setLocalToast({msg,type});setTimeout(()=>setLocalToast(null),3000);};
  const openNew=()=>{setEditing(null);setForm(blank);setSvcConfig({});setTab("info");setOpen(true);};
  const openEdit=(c)=>{setEditing(c);setForm({...blank,...c,services:toArr(c.services),socios:toArr(c.socios)});setSvcConfig(c.svcConfig||{});setTab("info");setOpen(true);};
  const save=()=>{
    if(!form.name.trim())return;
    const logo=form.logo||form.name.slice(0,2).toUpperCase();
    const co={...form,logo,svcConfig};
    let newId=null;
    if(editing){
      setData(d=>({...d,companies:d.companies.map(c=>c.id===editing.id?{...c,...co}:c)}));
    } else {
      newId=uid();
      setData(d=>({...d,companies:[...d.companies,{id:newId,...co}]}));
    }
    const coId=editing?editing.id:newId;
    const svcs=data.services.filter(s=>toArr(form.services).includes(s.id));
    if(svcs.length>0&&coId){
      setData(d=>{
        let tasks=[...d.tasks];
        svcs.forEach(svc=>{
          // Busca todas as tarefas ativas (não arquivadas) já vinculadas a este serviço+empresa
          const existingDates=new Set(
            tasks
              .filter(t=>t.company===coId&&t._serviceId===svc.id&&t.status!=="archived")
              .map(t=>t.dueDate||"_noduedate")
          );
          // Só gera se não houver NENHUMA tarefa ativa já vinculada
          const existsAny=existingDates.size>0;
          if(!existsAny){
            const rec=data.recurrences.find(r=>r.id===svc.recurrence);
            const base={
              id:uid(),title:svc.name,description:svc.description||"",
              status:svc.status||"todo",priority:svc.priority||"media",
              company:coId,sector:svc.sector||"",
              assignees:toArr(svc.assignees),labels:toArr(svc.labels),
              checklist:toArr(svc.checklist).map(ck=>({...ck,done:false})),
              dependencies:[],recurrence:"",
              dueDate:svc.defaultDue||"",
              createdAt:todayStr(),completedAt:null,archivedAt:null,
              _serviceId:svc.id,
            };
            if(rec){
              const startDate=svc.mesInicio?new Date(svc.mesInicio+"-01T00:00:00"):new Date();
              startDate.setHours(0,0,0,0);
              const endDate=new Date(startDate);endDate.setMonth(startDate.getMonth()+3);
              const cleanCk=toArr(svc.checklist).map(ck=>({...ck,done:false}));
              const gId=base.id;
              if(rec.interval==="monthly"||rec.interval==="yearly"){
                const targetDay=svc.defaultDue?new Date(svc.defaultDue+"T12:00:00").getDate():1;
                for(let m=0;m<3;m++){
                  const d=new Date(startDate.getFullYear(),startDate.getMonth()+m,targetDay);
                  if(d>=startDate) tasks.push({...base,id:uid(),dueDate:d.toISOString().slice(0,10),checklist:cleanCk,_recGroup:gId});
                }
              } else if(rec.interval==="custom_days"&&Array.isArray(rec.days)&&rec.days.length>0){
                for(let d=new Date(startDate);d<=endDate;d.setDate(d.getDate()+1)){
                  if(rec.days.includes(d.getDay())) tasks.push({...base,id:uid(),dueDate:d.toISOString().slice(0,10),checklist:cleanCk,_recGroup:gId});
                }
              } else if(rec.interval==="weekly"){
                const tdow=svc.defaultDue?new Date(svc.defaultDue+"T12:00:00").getDay():1;
                for(let d=new Date(startDate);d<=endDate;d.setDate(d.getDate()+1)){
                  if(d.getDay()===tdow) tasks.push({...base,id:uid(),dueDate:d.toISOString().slice(0,10),checklist:cleanCk,_recGroup:gId});
                }
              } else if(rec.interval==="daily"){
                const endD28=new Date(startDate);endD28.setDate(startDate.getDate()+28);
                for(let d=new Date(startDate);d<=endD28;d.setDate(d.getDate()+1)){
                  tasks.push({...base,id:uid(),dueDate:d.toISOString().slice(0,10),checklist:cleanCk,_recGroup:gId});
                }
              } else {
                tasks.push(base);
              }
            } else {
              tasks.push(base);
            }
          }
        });
        return {...d,tasks};
      });
    }
    setOpen(false);
  };
  const {ask:askDel,modal:delModal}=useConfirmDelete();
  const del=(id)=>{const item=data.companies.find(x=>x.id===id);askDel(`Empresa: "${item?.name||""}"`,()=>setData(d=>({...d,companies:d.companies.filter(c=>c.id!==id)})));};
  const tabSt=(t)=>({padding:"6px 14px",border:"none",borderRadius:8,cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:"inherit",background:tab===t?"#6366f1":"#f1f5f9",color:tab===t?"#fff":"#64748b"});
  return (
    <div>
      <PH title="Empresas" icon="E" badge={data.companies.length} action={<Btn onClick={openNew}>+ Nova Empresa</Btn>}/>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:14}}>
        {data.companies.map(c=>{
          const collabs=data.collaborators.filter(u=>toArr(u.companies).includes(c.id)||u.company===c.id);
          const tasks=data.tasks.filter(t=>t.company===c.id);
          const sectors=data.sectors.filter(s=>toArr(s.companies).includes(c.id)||s.company===c.id);
          const svcs=data.services.filter(s=>toArr(c.services).includes(s.id));
          return (
            <div key={c.id} style={{background:"var(--bg2)",borderRadius:16,padding:20,border:"1px solid var(--border)",boxShadow:"0 2px 8px rgba(0,0,0,.06)"}}>
              <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:14}}>
                <div style={{width:52,height:52,borderRadius:14,background:c.color+"18",border:"2px solid "+c.color+"44",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,fontWeight:900,color:c.color}}>{c.logo}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:900,fontSize:15,color:"#0f172a"}}>{c.name}</div>
                  <div style={{fontSize:11,color:"#94a3b8"}}>CNPJ: {c.cnpj||"-"}</div>
                  {c.email&&<div style={{fontSize:11,color:"#64748b"}}>{c.email}</div>}
                  {c.telefone&&<div style={{fontSize:11,color:"#64748b"}}>{c.telefone}</div>}
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
                {[{v:collabs.length,l:"Colab."},{v:tasks.length,l:"Tarefas"},{v:sectors.length,l:"Setores"}].map(({v,l})=>(
                  <div key={l} style={{textAlign:"center",background:"var(--bg3)",borderRadius:9,padding:"8px 4px"}}>
                    <div style={{fontSize:18,fontWeight:900,color:c.color}}>{v}</div>
                    <div style={{fontSize:10,color:"#94a3b8",fontWeight:600}}>{l}</div>
                  </div>
                ))}
              </div>
              {c.socio&&<div style={{fontSize:11,color:"#64748b",marginBottom:4}}>👤 {c.socio}{c.cpfSocio&&<span style={{color:"#94a3b8"}}> · CPF: {c.cpfSocio}</span>}</div>}
              {toArr(c.socios).filter(s=>s.nome).map((s,i)=><div key={i} style={{fontSize:11,color:"#64748b",marginBottom:2}}>👤 {s.nome}{s.cpf&&<span style={{color:"#94a3b8"}}> · {s.cpf}</span>}{s.participacao&&<span style={{color:"#6366f1"}}> ({s.participacao}%)</span>}</div>)}
              {c.tributacao&&<div style={{fontSize:11,marginBottom:8}}><span style={{padding:"2px 8px",borderRadius:20,background:c.color+"18",color:c.color,fontWeight:700,fontSize:10}}>{c.tributacao}</span></div>}
              {svcs.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:10}}>{svcs.map(s=><span key={s.id} style={{fontSize:10,padding:"2px 8px",borderRadius:20,background:"#6366f118",color:"#6366f1",fontWeight:700}}>{s.name}</span>)}</div>}
              <div style={{display:"flex",marginBottom:12}}>
                {collabs.slice(0,6).map((u,i)=><div key={u.id} style={{marginLeft:i>0?-8:0}}><Av initials={u.initials} color={u.color} size={28} title={u.name}/></div>)}
              </div>
              <div style={{display:"flex",gap:8}}>
                <Btn onClick={()=>openEdit(c)} v="ghost" sz="sm" xs={{flex:1,justifyContent:"center"}}>Editar</Btn>
                <Btn onClick={()=>del(c.id)} v="danger" sz="sm">x</Btn>
              </div>
            </div>
          );
        })}
      </div>
      <Modal open={open} onClose={()=>setOpen(false)} title={editing?"Editar Empresa":"Nova Empresa"} width={520}>
        {localToast&&(
          <div style={{marginBottom:10,padding:"9px 14px",borderRadius:9,background:localToast.type==="ok"?"#f0fdf4":localToast.type==="warn"?"#fffbeb":"#fef2f2",border:`1.5px solid ${localToast.type==="ok"?"#86efac":localToast.type==="warn"?"#fcd34d":"#fca5a5"}`,fontSize:12,fontWeight:700,color:localToast.type==="ok"?"#15803d":localToast.type==="warn"?"#92400e":"#b91c1c",display:"flex",alignItems:"center",gap:7}}>
            {localToast.msg}
          </div>
        )}
        <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
          {[["info","Dados"],["socios","👥 Sócios"],["contato","Contato"],["servicos","Serviços"]].map(([t,l])=>(
            <button key={t} style={tabSt(t)} onClick={()=>setTab(t)}>{l}</button>
          ))}
        </div>
        {tab==="info"&&<div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div className="g2"><Inp label="Nome *" value={form.name} onChange={v=>setForm(f=>({...f,name:v}))} placeholder="Nome da empresa"/><Inp label="Sigla" value={form.logo} onChange={v=>setForm(f=>({...f,logo:v}))} placeholder="Ex: MT"/></div>
          <Inp label="CNPJ" value={form.cnpj} onChange={v=>setForm(f=>({...f,cnpj:v}))} placeholder="00.000.000/0001-00"/>
          <Sel label="Tributação" value={form.tributacao} onChange={v=>setForm(f=>({...f,tributacao:v}))} options={TRIBS.map(t=>({value:t,label:t}))}/>
          <Txt label="Observações" value={form.observacoes} onChange={v=>setForm(f=>({...f,observacoes:v}))} placeholder="Anotações sobre a empresa..."/>
          <CPick value={form.color} onChange={v=>setForm(f=>({...f,color:v}))}/>
        </div>}
        {tab==="socios"&&<div style={{display:"flex",flexDirection:"column",gap:14}}>
          {/* Sócio Principal */}
          <div style={{padding:"14px 16px",borderRadius:12,border:"2px solid #e5e7eb",background:"#fafafa"}}>
            <div style={{fontSize:12,fontWeight:800,color:"#374151",marginBottom:10,display:"flex",alignItems:"center",gap:6}}>
              <span style={{background:"#6366f1",color:"#fff",borderRadius:"50%",width:20,height:20,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:900}}>1</span>
              Sócio Principal
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <Inp label="Nome completo" value={form.socio} onChange={v=>setForm(f=>({...f,socio:v}))} placeholder="Nome do sócio principal"/>
              <Inp label="CPF" value={form.cpfSocio||""} onChange={v=>setForm(f=>({...f,cpfSocio:v}))} placeholder="000.000.000-00"/>
            </div>
          </div>
          {/* Sócios adicionais */}
          <div>
            <div style={{fontSize:12,fontWeight:800,color:"#374151",marginBottom:10}}>Sócios Adicionais</div>
            {(form.socios||[]).map((s,i)=>(
              <div key={i} style={{display:"flex",flexDirection:"column",gap:8,marginBottom:12,padding:"12px 14px",borderRadius:10,border:"1.5px solid #e5e7eb",background:"#fff",position:"relative"}}>
                <div style={{fontSize:11,fontWeight:800,color:"#6366f1",marginBottom:2}}>Sócio {i+2}</div>
                <Inp label="Nome completo" value={s.nome||""} onChange={v=>{const arr=[...(form.socios||[])];arr[i]={...arr[i],nome:v};setForm(f=>({...f,socios:arr}));}} placeholder="Nome do sócio"/>
                <div className="g2">
                  <Inp label="CPF" value={s.cpf||""} onChange={v=>{const arr=[...(form.socios||[])];arr[i]={...arr[i],cpf:v};setForm(f=>({...f,socios:arr}));}} placeholder="000.000.000-00"/>
                  <Inp label="Participação (%)" value={s.participacao||""} onChange={v=>{const arr=[...(form.socios||[])];arr[i]={...arr[i],participacao:v};setForm(f=>({...f,socios:arr}));}} placeholder="Ex: 25" type="number"/>
                </div>
                <button onClick={()=>setForm(f=>({...f,socios:(f.socios||[]).filter((_,j)=>j!==i)}))}
                  style={{position:"absolute",top:10,right:10,background:"#fef2f2",border:"none",borderRadius:6,width:26,height:26,cursor:"pointer",color:"#ef4444",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
              </div>
            ))}
            <Btn onClick={()=>setForm(f=>({...f,socios:[...(f.socios||[]),{nome:"",cpf:"",participacao:""}]}))} v="ghost" sz="sm">+ Adicionar Sócio</Btn>
          </div>
        </div>}
        {tab==="contato"&&<div style={{display:"flex",flexDirection:"column",gap:12}}>
          <Inp label="E-mail (login)" value={form.email} onChange={v=>setForm(f=>({...f,email:v}))} placeholder="email@empresa.com"/>
              <Sel label="Nível de Acesso" value={form.accessLevel||"user"} onChange={v=>setForm(f=>({...f,accessLevel:v}))} options={[{value:"admin",label:"🔑 Administrador"},{value:"user",label:"👤 Usuário"}]}/>
          <Inp label="Telefone" value={form.telefone} onChange={v=>setForm(f=>({...f,telefone:v}))} placeholder="(00) 00000-0000"/>
        </div>}
        {tab==="servicos"&&(()=>{
          const coId=editing?editing.id:null;
          const getCfg=(svcId)=>svcConfig[svcId]||{dataInicio:"",dataFim:"",competencia:""};
          const setCfg=(svcId,key,val)=>setSvcConfig(prev=>({...prev,[svcId]:{...getCfg(svcId),[key]:val}}));
          // Formata "YYYY-MM" → "Jan/2026"
          const fmtComp=(ym)=>{
            if(!ym)return"";
            const [y,m]=ym.split("-");
            const meses=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
            return`${meses[parseInt(m)-1]}/${y}`;
          };
          const gerarInline=(svc)=>{
            if(!coId){ltoast("Salve a empresa primeiro para gerar tarefas.","warn");return;}
            const cfg=getCfg(svc.id);
            setData(d=>{
              let tasks=[...d.tasks];
              const existsAny=tasks.some(t=>t.company===coId&&t._serviceId===svc.id&&t.status!=="archived");
              if(existsAny){ltoast(`Serviço "${svc.name}" já tem tarefas geradas!`,"warn");return d;}
              const rec=d.recurrences.find(r=>r.id===svc.recurrence);
              const competenciaTag=cfg.competencia?fmtComp(cfg.competencia):"";
              const base={
                id:uid(),title:svc.name,description:svc.description||"",
                status:svc.status||"todo",priority:svc.priority||"media",
                company:coId,sector:svc.sector||"",
                assignees:toArr(svc.assignees),labels:toArr(svc.labels),
                checklist:toArr(svc.checklist).map(ck=>({...ck,done:false})),
                dependencies:[],recurrence:"",
                dueDate:cfg.dataInicio||svc.defaultDue||"",
                createdAt:todayStr(),completedAt:null,archivedAt:null,
                _serviceId:svc.id,
                _dataInicio:cfg.dataInicio||"",
                _dataFim:cfg.dataFim||"",
                _competencia:competenciaTag,
              };
              const startDate=cfg.dataInicio?new Date(cfg.dataInicio+"T00:00:00"):(svc.mesInicio?new Date(svc.mesInicio+"-01T00:00:00"):new Date());
              startDate.setHours(0,0,0,0);
              const endDate=cfg.dataFim?new Date(cfg.dataFim+"T00:00:00"):new Date(startDate);
              if(!cfg.dataFim) endDate.setMonth(startDate.getMonth()+3);
              const cleanCk=toArr(svc.checklist).map(ck=>({...ck,done:false}));
              const gId=base.id;
              let count=0;
              // Gera competencia incremental por tarefa (mês a mês)
              let compMonth=cfg.competencia?new Date(cfg.competencia+"-01T00:00:00"):null;
              const makeTask=(extra)=>{
                const compTag=compMonth?fmtComp(`${compMonth.getFullYear()}-${String(compMonth.getMonth()+1).padStart(2,"0")}`):"";
                const t={...base,id:uid(),checklist:cleanCk,_recGroup:gId,_competencia:compTag,...extra};
                if(compMonth) compMonth.setMonth(compMonth.getMonth()+1);
                return t;
              };
              if(rec){
                if(rec.interval==="monthly"||rec.interval==="yearly"){
                  const targetDay=cfg.dataInicio?new Date(cfg.dataInicio+"T12:00:00").getDate():(svc.defaultDue?new Date(svc.defaultDue+"T12:00:00").getDate():1);
                  for(let dd=new Date(startDate.getFullYear(),startDate.getMonth(),targetDay);dd<=endDate;dd.setMonth(dd.getMonth()+1)){
                    tasks.push(makeTask({dueDate:dd.toISOString().slice(0,10)}));count++;
                  }
                } else if(rec.interval==="custom_days"&&Array.isArray(rec.days)&&rec.days.length>0){
                  for(let dd=new Date(startDate);dd<=endDate;dd.setDate(dd.getDate()+1)){
                    if(rec.days.includes(dd.getDay())){tasks.push(makeTask({dueDate:dd.toISOString().slice(0,10)}));count++;}
                  }
                } else if(rec.interval==="weekly"){
                  const tdow=cfg.dataInicio?new Date(cfg.dataInicio+"T12:00:00").getDay():(svc.defaultDue?new Date(svc.defaultDue+"T12:00:00").getDay():1);
                  for(let dd=new Date(startDate);dd<=endDate;dd.setDate(dd.getDate()+1)){
                    if(dd.getDay()===tdow){tasks.push(makeTask({dueDate:dd.toISOString().slice(0,10)}));count++;}
                  }
                } else if(rec.interval==="daily"){
                  for(let dd=new Date(startDate);dd<=endDate;dd.setDate(dd.getDate()+1)){
                    tasks.push(makeTask({dueDate:dd.toISOString().slice(0,10)}));count++;
                  }
                } else {tasks.push(makeTask({dueDate:base.dueDate}));count++;}
              } else {tasks.push(makeTask({dueDate:base.dueDate}));count++;}
              // Salva config no state para persistir junto com empresa
              setSvcConfig(prev=>({...prev,[svc.id]:getCfg(svc.id)}));
              ltoast(`✅ ${count} tarefa${count!==1?"s":""} gerada${count!==1?"s":""} para "${svc.name}"!`,"ok");
              return {...d,tasks};
            });
          };
          return(
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <p style={{fontSize:12,color:"#64748b",marginBottom:4}}>Configure as datas de cada serviço e clique em <strong>⚡ Gerar</strong> para criar as tarefas.</p>
              {data.services.length===0&&<p style={{fontSize:13,color:"#94a3b8"}}>Nenhum serviço cadastrado ainda.</p>}
              {data.services.map(s=>{
                const sel=toArr(form.services).includes(s.id);
                const rec=data.recurrences.find(r=>r.id===s.recurrence);
                const jaGerado=coId&&data.tasks.some(t=>t.company===coId&&t._serviceId===s.id&&t.status!=="archived");
                const qtd=coId?data.tasks.filter(t=>t.company===coId&&t._serviceId===s.id&&t.status!=="archived").length:0;
                const cfg=getCfg(s.id);
                return(
                  <div key={s.id} style={{borderRadius:11,border:"2px solid "+(sel?"#6366f1":"#e5e7eb"),background:sel?"#eef2ff":"#fafafa",overflow:"hidden",transition:"all .1s"}}>
                    {/* Linha principal */}
                    <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",cursor:"pointer"}} onClick={()=>setForm(f=>({...f,services:sel?toArr(f.services).filter(x=>x!==s.id):[...toArr(f.services),s.id]}))}>
                      <div style={{width:18,height:18,borderRadius:5,border:"2px solid "+(sel?"#6366f1":"#cbd5e1"),background:sel?"#6366f1":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                        {sel&&<span style={{color:"#fff",fontSize:11,fontWeight:900}}>✓</span>}
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontWeight:700,fontSize:13,color:"#0f172a"}}>{s.name}</div>
                        {s.description&&<div style={{fontSize:11,color:"#94a3b8",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.description}</div>}
                        <div style={{display:"flex",gap:8,marginTop:2,flexWrap:"wrap"}}>
                          {rec&&<span style={{fontSize:10,color:"#6366f1",fontWeight:700}}>↻ {rec.name}</span>}
                          {jaGerado&&<span style={{fontSize:10,color:"#22c55e",fontWeight:700}}>✅ {qtd} tarefa{qtd!==1?"s":""} gerada{qtd!==1?"s":""}</span>}
                        </div>
                      </div>
                      {sel&&(
                        <button
                          onClick={e=>{e.stopPropagation();gerarInline(s);}}
                          style={{flexShrink:0,padding:"5px 12px",borderRadius:8,border:"none",background:jaGerado?"#f1f5f9":"#6366f1",color:jaGerado?"#94a3b8":"#fff",fontWeight:800,fontSize:12,cursor:jaGerado?"not-allowed":"pointer",fontFamily:"inherit",transition:"all .15s"}}
                          title={jaGerado?"Tarefas já geradas":"Gerar tarefas recorrentes agora"}
                          onMouseEnter={e=>{if(!jaGerado)e.currentTarget.style.background="#4f46e5";}}
                          onMouseLeave={e=>{if(!jaGerado)e.currentTarget.style.background="#6366f1";}}
                        >{jaGerado?"✅ Gerado":"⚡ Gerar"}</button>
                      )}
                    </div>
                    {/* Campos de configuração (só quando selecionado e não gerado) */}
                    {sel&&!jaGerado&&(
                      <div style={{padding:"0 14px 12px",display:"flex",flexDirection:"column",gap:8,borderTop:"1px solid #e0e7ff",background:"#f5f3ff"}}>
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,paddingTop:10}}>
                          <div>
                            <label style={{fontSize:11,fontWeight:700,color:"#6366f1",display:"block",marginBottom:4}}>📅 Data Início</label>
                            <input type="date" value={cfg.dataInicio} onChange={e=>setCfg(s.id,"dataInicio",e.target.value)}
                              style={{width:"100%",padding:"6px 10px",borderRadius:7,border:"1.5px solid #c7d2fe",fontSize:12,fontFamily:"inherit",background:"#fff",outline:"none",color:"#0f172a",boxSizing:"border-box"}}
                              onFocus={e=>e.target.style.borderColor="#6366f1"} onBlur={e=>e.target.style.borderColor="#c7d2fe"}/>
                          </div>
                          <div>
                            <label style={{fontSize:11,fontWeight:700,color:"#6366f1",display:"block",marginBottom:4}}>📅 Data Fim</label>
                            <input type="date" value={cfg.dataFim} onChange={e=>setCfg(s.id,"dataFim",e.target.value)}
                              style={{width:"100%",padding:"6px 10px",borderRadius:7,border:"1.5px solid #c7d2fe",fontSize:12,fontFamily:"inherit",background:"#fff",outline:"none",color:"#0f172a",boxSizing:"border-box"}}
                              onFocus={e=>e.target.style.borderColor="#6366f1"} onBlur={e=>e.target.style.borderColor="#c7d2fe"}/>
                          </div>
                        </div>
                        <div>
                          <label style={{fontSize:11,fontWeight:700,color:"#8b5cf6",display:"block",marginBottom:4}}>🏷 Competência inicial (mês/ano)</label>
                          <input type="month" value={cfg.competencia} onChange={e=>setCfg(s.id,"competencia",e.target.value)}
                            style={{width:"100%",padding:"6px 10px",borderRadius:7,border:"1.5px solid #ddd6fe",fontSize:12,fontFamily:"inherit",background:"#fff",outline:"none",color:"#0f172a",boxSizing:"border-box"}}
                            onFocus={e=>e.target.style.borderColor="#8b5cf6"} onBlur={e=>e.target.style.borderColor="#ddd6fe"}/>
                          {cfg.competencia&&<div style={{fontSize:10,color:"#8b5cf6",marginTop:3,fontWeight:700}}>Cada tarefa gerada terá a competência incrementada: {fmtComp(cfg.competencia)}, {fmtComp(`${cfg.competencia.split("-")[0]}-${String(parseInt(cfg.competencia.split("-")[1])+1).padStart(2,"0")}`)}, ...</div>}
                        </div>
                      </div>
                    )}
                    {/* Mostra config salva quando já gerado */}
                    {sel&&jaGerado&&(cfg.dataInicio||cfg.competencia)&&(
                      <div style={{padding:"6px 14px 10px",display:"flex",gap:12,flexWrap:"wrap",borderTop:"1px solid #dcfce7"}}>
                        {cfg.dataInicio&&<span style={{fontSize:10,color:"#64748b"}}>📅 Início: <strong>{cfg.dataInicio}</strong></span>}
                        {cfg.dataFim&&<span style={{fontSize:10,color:"#64748b"}}>📅 Fim: <strong>{cfg.dataFim}</strong></span>}
                        {cfg.competencia&&<span style={{fontSize:10,color:"#8b5cf6",fontWeight:700}}>🏷 {fmtComp(cfg.competencia)}</span>}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          );
        })()}
        <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:16,paddingTop:14,borderTop:"1px solid #f1f5f9"}}>
          <Btn onClick={()=>setOpen(false)} v="ghost">Cancelar</Btn>
          <Btn onClick={save}>Salvar</Btn>
        </div>
      </Modal>
      {delModal}
    </div>
  );
}

function SectorsPage({ data, setData }) {
  const [open,setOpen]=useState(false);
  const [editing,setEditing]=useState(null);
  const [form,setForm]=useState({name:"",color:"#14b8a6",companies:[]});
  const openNew=()=>{setEditing(null);setForm({name:"",color:"#14b8a6",companies:[]});setOpen(true);};
  const openEdit=(s)=>{setEditing(s);setForm({name:s.name,color:s.color,companies:toArr(s.companies).length>0?toArr(s.companies):(s.company?[s.company]:[])});setOpen(true);};
  const togCo=(id)=>setForm(f=>({...f,companies:toArr(f.companies).includes(id)?toArr(f.companies).filter(x=>x!==id):[...toArr(f.companies),id]}));
  const save=()=>{
    if(!form.name.trim())return;
    if(editing) setData(d=>({...d,sectors:d.sectors.map(s=>s.id===editing.id?{...s,...form}:s)}));
    else setData(d=>({...d,sectors:[...d.sectors,{id:uid(),...form}]}));
    setOpen(false);
  };
  const {ask:askDel,modal:delModal}=useConfirmDelete();
  const del=(id)=>{const item=data.sectors.find(x=>x.id===id);askDel(`Setor: "${item?.name||""}"`,()=>setData(d=>({...d,sectors:d.sectors.filter(s=>s.id!==id)})));};

  return (
    <div>
      <PH title="Setores" icon="◫" badge={data.sectors.length} action={<Btn onClick={openNew}>+ Novo Setor</Btn>}/>
      <div className="g-sectors" style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:12}}>
        {data.sectors.map(s=>{
          const coIds=toArr(s.companies).length>0?toArr(s.companies):(s.company?[s.company]:[]);
          const cos=data.companies.filter(c=>coIds.includes(c.id));
          const collabs=data.collaborators.filter(u=>{const us=toArr(u.sectors).length>0?toArr(u.sectors):(u.sector?[u.sector]:[]);return us.includes(s.id);});

            <div key={s.id} style={{background:"var(--bg2)",borderRadius:14,padding:18,border:"1px solid var(--border)",boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                <div style={{width:38,height:38,borderRadius:10,background:s.color+"18",border:`2px solid ${s.c}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17}}>◫</div>
                <div>
                  <div style={{fontWeight:800,fontSize:14,color:"#0f172a"}}>{s.name}</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:3,marginTop:2}}>{cos.map(co=><span key={co.id} style={{fontSize:10,padding:"1px 6px",borderRadius:10,background:co.color+"18",color:co.color,fontWeight:700}}>{co.name}</span>)}{cos.length===0&&<span style={{fontSize:10,color:"#94a3b8"}}>Todas as empresas</span>}</div>
                </div>
              </div>
              <div style={{display:"flex",gap:8,marginBottom:14}}>
                <div style={{flex:1,textAlign:"center",background:"var(--bg3)",borderRadius:8,padding:"6px 4px"}}>
                  <div style={{fontSize:16,fontWeight:800,color:s.color}}>{collabs.length}</div>
                  <div style={{fontSize:10,color:"#94a3b8"}}>Colab.</div>
                </div>
                <div style={{flex:1,textAlign:"center",background:"var(--bg3)",borderRadius:8,padding:"6px 4px"}}>
                  <div style={{fontSize:16,fontWeight:800,color:s.color}}>{tasks.length}</div>
                  <div style={{fontSize:10,color:"#94a3b8"}}>Tarefas</div>
                </div>
              </div>
              <div style={{display:"flex",gap:8}}>
                <Btn onClick={()=>openEdit(s)} v="ghost" sz="sm" xs={{flex:1,justifyContent:"center"}}>✎ Editar</Btn>
                <Btn onClick={()=>del(s.id)} v="danger" sz="sm">×</Btn>
              </div>
            </div>
          );
        })}
      </div>
      <Modal open={open} onClose={()=>setOpen(false)} title={editing?"Editar Setor":"Novo Setor"} width={400}>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <Inp label="Nome *" value={form.name} onChange={v=>setForm(f=>({...f,name:v}))} placeholder="Ex: Desenvolvimento"/>
          <div>
            <label style={{fontSize:12,fontWeight:700,color:"#64748b",display:"block",marginBottom:8}}>Empresas (opcional — vazio = todas)</label>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {data.companies.map(c=>{const sel=toArr(form.companies).includes(c.id);return(
                <button key={c.id} onClick={()=>togCo(c.id)} style={{padding:"4px 12px",borderRadius:20,border:"2px solid "+(sel?c.color:"#e5e7eb"),background:sel?c.color+"18":"#fafafa",color:sel?c.color:"#6b7280",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit",transition:"all .1s"}}>{c.name}</button>
              );})}
            </div>
          </div>
          <CPick value={form.color} onChange={v=>setForm(f=>({...f,color:v}))}/>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
            <Btn onClick={()=>setOpen(false)} v="ghost">Cancelar</Btn>
            <Btn onClick={save}>Salvar</Btn>
          </div>
        </div>
      </Modal>
      {delModal}
    </div>
  );
}

function CollaboratorsPage({ data, setData }) {
  const [open,setOpen]=useState(false);
  const [editing,setEditing]=useState(null);
  const [form,setForm]=useState({name:"",role:"",companies:[],sectors:[],color:"#8b5cf6",initials:"",email:"",password:"",userId:"",accessLevel:"user"});
  const openNew=()=>{setEditing(null);setForm({name:"",role:"",companies:[],sectors:[],color:"#8b5cf6",initials:"",email:"",password:"",userId:"",accessLevel:"user"});setOpen(true);};
  const openEdit=(u)=>{
    setEditing(u);
    setForm({name:u.name,role:u.role,
      companies:toArr(u.companies).length>0?toArr(u.companies):(u.company?[u.company]:[]),
      sectors:toArr(u.sectors).length>0?toArr(u.sectors):(u.sector?[u.sector]:[]),
      color:u.color,initials:u.initials,email:u.email||"",
      password:"",userId:u.userId||"",accessLevel:u.accessLevel||"user"});
    setOpen(true);
  };
  const togUCo=(id)=>setForm(f=>({...f,companies:toArr(f.companies).includes(id)?toArr(f.companies).filter(x=>x!==id):[...toArr(f.companies),id]}));
  const togUSec=(id)=>setForm(f=>({...f,sectors:toArr(f.sectors).includes(id)?toArr(f.sectors).filter(x=>x!==id):[...toArr(f.sectors),id]}));
  const [savingUser,setSavingUser]=useState(false);
  const [saveErr,setSaveErr]=useState("");
  const [createdCreds,setCreatedCreds]=useState(null);
  const save=async()=>{
    if(!form.name.trim())return;
    setSaveErr("");
    const initials=form.initials||form.name.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2);
    if(editing){
      // Ao editar: atualizar dados + senha se preenchida
      let newHash = editing._pwdHash||"";
      if(form.password&&form.password.length>=6){
        newHash = await hashPwd(form.password);
      }
      setData(d=>({...d,collaborators:d.collaborators.map(u=>u.id===editing.id?{...u,...form,initials,password:"",accessLevel:form.accessLevel||"user",_pwdHash:newHash}:u)}));
      setOpen(false);
      toast("💾 Colaborador atualizado!","ok");
    } else {
      // Novo colaborador: criar usuário no Supabase Auth
      if(!form.email){setSaveErr("Email obrigatório para criar acesso.");return;}

                <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:10}}>
