function useAuth() {
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);
  const LOCAL_KEY = "mdtec_local_session";

  useEffect(() => {
    // 1. Verificar sessão local (colaborador)
    const local = localStorage.getItem(LOCAL_KEY);
    if(local){
      try{
        const sess = JSON.parse(local);
        if(sess && sess.email){
          setUser(sess);
          setLoading(false);
          return;
        }
      }catch(e){}
    }
    // 2. Verificar sessão Supabase Auth (admin)

      setLoading(false);
    });

      if(!localStorage.getItem(LOCAL_KEY)){

    });
    return () => subscription.unsubscribe();

    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/app_data?select=payload&id=eq.1`,
        { headers: {
          "apikey": SUPABASE_SERVICE_KEY,
          "Authorization": "Bearer " + SUPABASE_SERVICE_KEY,
          "Content-Type": "application/json"
        }}
      );
      if(res.ok){
        const rows = await res.json();
        const collabs = rows?.[0]?.payload?.collaborators || [];
        const collab = collabs.find(c => c.email && c.email.toLowerCase() === email.toLowerCase());
        if(collab && collab._pwdHash){
          const hash = await hashPwd(password);
          if(hash === collab._pwdHash){
            const sess = {
              id: collab.id, email: collab.email,
              user_metadata: {name: collab.name},
              _localAuth: true, _collabId: collab.id
            };
            localStorage.setItem(LOCAL_KEY, JSON.stringify(sess));
            setUser(sess);
            return;
          } else {
            throw new Error("Email ou senha incorretos.");
          }
        }
      }
    } catch(e){
      if(e.message === "Email ou senha incorretos.") throw e;
      // Erro de rede ou outro problema - propaga para o usuário
      console.warn("Erro ao buscar colaboradores:", e.message);
    }
    // 2. Fallback Supabase Auth (admin sem collab cadastrado)
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if(error) throw new Error("Email ou senha incorretos.");
  }

  const signOut = () => {
    localStorage.removeItem(LOCAL_KEY);
    sb.auth.signOut();
    setUser(null);
  };

  return { user, loading, signIn, signOut };
}

/* ===========================================
   SUPABASE DATA HOOK
   Substitui useSharedData - agora tudo vai
   para o banco de dados online em tempo real */
function useSharedData() {
  const [data, setRaw] = useState(SEED);
  const [synced, setSynced] = useState(false);

  // Carrega dados do Supabase
  const load = useCallback(async () => {
    try {
      const { data: row, error } = await sb
        .from("app_data")
        .select("payload")
        .eq("id", 1)
        .maybeSingle();

      if (error) {
        console.error("Supabase load error:", error);
        setRaw(SEED);
        setSynced(true);
        return;
      }

      if (row?.payload) {
        const p = row.payload;
        if (!p.sectors || !Array.isArray(p.sectors)) p.sectors = SEED.sectors;
        if (!p.collaborators || !Array.isArray(p.collaborators)) p.collaborators = SEED.collaborators;
        if (!p.companies || !Array.isArray(p.companies)) p.companies = SEED.companies;
        if (!p.labels || !Array.isArray(p.labels)) p.labels = SEED.labels;
        if (!p.recurrences || !Array.isArray(p.recurrences)) p.recurrences = SEED.recurrences;
        if (!p.taskTemplates || !Array.isArray(p.taskTemplates)) p.taskTemplates = [];
        if (!p.customStatuses) p.customStatuses = [];
        if (!p.services || !Array.isArray(p.services)) p.services = [];
        if (!p.chatMessages || !Array.isArray(p.chatMessages)) p.chatMessages = [];
        if (!p.notifications || !Array.isArray(p.notifications)) p.notifications = [];
        if (!p.archiveDays) p.archiveDays = 7;
        if (!p.recStatus) p.recStatus={};
        // MIGRAÇÃO: converter tarefas recorrentes antigas em tarefas reais
        if(!p._migrated_v3){
          const recTasks=p.tasks.filter(t=>t.recurrence);
          const normalTasks=p.tasks.filter(t=>!t.recurrence);
          const generated=[];
          recTasks.forEach(t=>{
            const rec=(p.recurrences||[]).find(r=>r.id===t.recurrence);
            if(!rec){generated.push({...t,recurrence:""});return;}
            const today=new Date();today.setHours(0,0,0,0);
            const end=new Date(today);end.setDate(today.getDate()+28);
            const cleanChecklist=(t.checklist||[]).map(c=>({...c,done:false}));
            if(rec.interval==="daily"){
              for(let d=new Date(today);d<=end;d.setDate(d.getDate()+1)){
                generated.push({...t,id:uid(),dueDate:d.toISOString().slice(0,10),recurrence:"",_recGroup:t.id,status:"todo",completedAt:null,checklist:cleanChecklist});
              }
            } else if(rec.interval==="custom_days"&&Array.isArray(rec.days)&&rec.days.length>0){
              for(let d=new Date(today);d<=end;d.setDate(d.getDate()+1)){
                if(rec.days.includes(d.getDay())){
                  generated.push({...t,id:uid(),dueDate:d.toISOString().slice(0,10),recurrence:"",_recGroup:t.id,status:"todo",completedAt:null,checklist:cleanChecklist});
                }
              }
            } else if(rec.interval==="weekly"){
              const targetDow=t.dueDate?new Date(t.dueDate+"T12:00:00").getDay():today.getDay();
              for(let d=new Date(today);d<=end;d.setDate(d.getDate()+1)){
                if(d.getDay()===targetDow) generated.push({...t,id:uid(),dueDate:d.toISOString().slice(0,10),recurrence:"",_recGroup:t.id,status:"todo",completedAt:null,checklist:cleanChecklist});
              }
            } else if(rec.interval==="monthly"){
              const td=t.dueDate?new Date(t.dueDate+"T12:00:00").getDate():today.getDate();
              for(let m=0;m<3;m++){
                const d=new Date(today.getFullYear(),today.getMonth()+m,td);
                if(d>=today) generated.push({...t,id:uid(),dueDate:d.toISOString().slice(0,10),recurrence:"",_recGroup:t.id,status:"todo",completedAt:null,checklist:cleanChecklist});
              }
            } else if(rec.interval==="biweekly"){
              const targetDow=t.dueDate?new Date(t.dueDate+"T12:00:00").getDay():today.getDay();
              let cnt=0;
              for(let d=new Date(today);d<=end;d.setDate(d.getDate()+1)){
                if(d.getDay()===targetDow){if(cnt%2===0) generated.push({...t,id:uid(),dueDate:d.toISOString().slice(0,10),recurrence:"",_recGroup:t.id,status:"todo",completedAt:null,checklist:cleanChecklist});cnt++;}
              }
            } else {
              generated.push({...t,recurrence:"",_recGroup:t.id});
            }
          });
          // Remover tarefas _parentId obsoletas
          // Também resetar checklist de tarefas _recGroup já existentes (geradas sem reset)
          const resetChecklist=p.tasks
            .filter(t=>!t.recurrence)
            .map(t=>t._recGroup?{...t,checklist:(t.checklist||[]).map(c=>({...c,done:false})),status:t.status==="archived"?t.status:"todo",completedAt:null}:t);
          p.tasks=[...resetChecklist.filter(t=>!t._parentId&&!t.recurrence),...generated];
          p._migrated_v3=true;
        }
        p.tasks = (p.tasks || []).map(normalizeTask);
        setRaw(p);
      } else {
        // First time - save seed data
        const { error: upsertErr } = await sb.from("app_data").upsert({ id: 1, payload: SEED });
        if (upsertErr) console.error("Seed upsert error:", upsertErr);
        setRaw(SEED);
      }
      setSynced(true);
    } catch (e) {
      console.error("Erro ao carregar dados:", e);
      setSynced(true);
    }
  }, []);

  useEffect(() => {
    load();

    // Escuta mudanças em tempo real (Realtime)
    const channel = sb
      .channel("app_data_changes")
      .on("postgres_changes", {
        event: "UPDATE",
        schema: "public",
        table: "app_data",
        filter: "id=eq.1"
      }, (payload) => {
        if (payload.new?.payload) {
          const p = payload.new.payload;
          if (!p.sectors || !Array.isArray(p.sectors)) p.sectors = SEED.sectors;
          if (!p.collaborators || !Array.isArray(p.collaborators)) p.collaborators = SEED.collaborators;
          if (!p.companies || !Array.isArray(p.companies)) p.companies = SEED.companies;
          if (!p.labels || !Array.isArray(p.labels)) p.labels = SEED.labels;
          if (!p.recurrences || !Array.isArray(p.recurrences)) p.recurrences = SEED.recurrences;
          if (!p.taskTemplates || !Array.isArray(p.taskTemplates)) p.taskTemplates = [];
        if (!p.customStatuses) p.customStatuses = [];
          if (!p.services || !Array.isArray(p.services)) p.services = [];
          if (!p.chatMessages || !Array.isArray(p.chatMessages)) p.chatMessages = [];
          if (!p.notifications || !Array.isArray(p.notifications)) p.notifications = [];
          if (!p.archiveDays) p.archiveDays = 7;
          p.tasks = (p.tasks || []).map(normalizeTask);
          setRaw(p);
        }
      })
      .subscribe();

    return () => sb.removeChannel(channel);
  }, [load]);

  const pendingSave = useRef(null);
  const setData = useCallback((updater) => {
    setRaw(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      // Debounced save to Supabase
      if(pendingSave.current) clearTimeout(pendingSave.current);
      pendingSave.current = setTimeout(() => {
        sb.from("app_data").upsert({ id: 1, payload: next })
          .then(({ error }) => {
            if(error) {
              console.error("Supabase save error:", error);
              // Dispara evento customizado para o App exibir toast de erro
              window.dispatchEvent(new CustomEvent("mdtec_save_error", { detail: error.message }));
            }
          });
      }, 300);
      return next;
    });
  }, []);

  return [data, setData, synced];
}

function useConfirmDelete(){
  const [st,setSt]=useState({open:false,title:"",onConfirm:null});
  const ask=useCallback((title,onConfirm)=>setSt({open:true,title,onConfirm}),[]);
  const close=useCallback(()=>setSt(s=>({...s,open:false})),[]);
  const confirm=useCallback(()=>{if(st.onConfirm)st.onConfirm();close();},[st,close]);
  return{ask,modal:<ConfirmDelete open={st.open} onClose={close} onConfirm={confirm} title={st.title}/>};
}

/* ===========================================
   RELATÓRIO IMPRIMÍVEL POR EMPRESA */
function RelatorioPage({data,isAdmin}){
  const [selCompany,setSelCompany]=useState(data.companies[0]?.id||"");
  const [period,setPeriod]=useState("all");
  const [showDone,setShowDone]=useState(true);
  const [showOpen,setShowOpen]=useState(true);
  const today=todayStr();
  const now=new Date();

  const company=data.companies.find(c=>c.id===selCompany);

  const tasks=useMemo(()=>{
    let ts=data.tasks.filter(t=>t.status!=="archived"&&taskHasCompany(t,selCompany));
    if(!showDone) ts=ts.filter(t=>t.status!=="done");
    if(!showOpen) ts=ts.filter(t=>t.status==="done");
    if(period==="month") ts=ts.filter(t=>{
      const d=new Date((t.dueDate||t.createdAt||"")+"T12:00:00");
      return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    });
    if(period==="year") ts=ts.filter(t=>{
      const d=new Date((t.dueDate||t.createdAt||"")+"T12:00:00");
      return d.getFullYear()===now.getFullYear();
    });
    return ts.sort((a,b)=>{const po={critica:0,alta:1,media:2,baixa:3};return (po[a.priority]||2)-(po[b.priority]||2);});

          {data.companies.map(c=><option key={c.id} value={c.id}>{c.logo} {c.name}</option>)}

          <option value="all">Todo período</option>
          <option value="month">Este mês</option>
          <option value="year">Este ano</option>
        </select>
        <label style={{display:"flex",alignItems:"center",gap:6,fontSize:13,fontWeight:700,color:"#64748b",cursor:"pointer"}}>
          <input type="checkbox" checked={showOpen} onChange={e=>setShowOpen(e.target.checked)} style={{accentColor:"#6366f1"}}/> Em aberto
        </label>
        <label style={{display:"flex",alignItems:"center",gap:6,fontSize:13,fontWeight:700,color:"#64748b",cursor:"pointer"}}>

function useLocks(){
  const [locks,setLocksState]=useState(()=>{
    try{return JSON.parse(localStorage.getItem(LOCK_KEY)||"{}");}catch{return {};}
  });
  const bcRef=useRef(null);

  const pruneExpired=useCallback(raw=>{
    const now=Date.now(),out={};
    Object.entries(raw).forEach(([k,v])=>{if(now-v.ts<LOCK_TTL)out[k]=v;});
    return out;
  },[]);

  const persist=useCallback(l=>{
    localStorage.setItem(LOCK_KEY,JSON.stringify(l));
    setLocksState(l);
    bcRef.current?.postMessage({t:"locks",l});
  },[]);

  useEffect(()=>{
    try{
      bcRef.current=new BroadcastChannel("mdtec_locks_v6");
      bcRef.current.onmessage=e=>{if(e.data?.t==="locks")setLocksState(e.data.l);};
    }catch(e){}

    // Heartbeat: keep own locks alive, prune stale ones
    const iv=setInterval(()=>{
      try{
        const raw=pruneExpired(JSON.parse(localStorage.getItem(LOCK_KEY)||"{}"));
        Object.entries(raw).forEach(([k,v])=>{if(v.sid===SESSION_ID)raw[k]={...v,ts:Date.now()};});
        persist(raw);
      }catch(e){}
    },8000);

    // Release own locks on tab close
    const onUnload=()=>{
      try{
        const raw=pruneExpired(JSON.parse(localStorage.getItem(LOCK_KEY)||"{}"));
        const cleaned={};
        Object.entries(raw).forEach(([k,v])=>{if(v.sid!==SESSION_ID)cleaned[k]=v;});
        localStorage.setItem(LOCK_KEY,JSON.stringify(cleaned));
        bcRef.current?.postMessage({t:"locks",l:cleaned});
      }catch(e){}
    };
    window.addEventListener("beforeunload",onUnload);
    return()=>{clearInterval(iv);bcRef.current?.close();window.removeEventListener("beforeunload",onUnload);};
  },[persist,pruneExpired]);

  // Try to acquire a lock. Returns {ok:true} or {ok:false, holder:"Name"}
  const acquire=useCallback(taskId=>{
    try{
      const raw=pruneExpired(JSON.parse(localStorage.getItem(LOCK_KEY)||"{}"));
      const ex=raw[taskId];
      if(ex&&ex.sid!==SESSION_ID&&Date.now()-ex.ts<LOCK_TTL)return{ok:false,holder:ex.user};
      persist({...raw,[taskId]:{sid:SESSION_ID,user:MY_NAME,ts:Date.now()}});
      return{ok:true};
    }catch{return{ok:true};}
  },[persist,pruneExpired]);

  // Force-acquire (override another user's lock)
  const forceAcquire=useCallback(taskId=>{
    try{
      const raw=pruneExpired(JSON.parse(localStorage.getItem(LOCK_KEY)||"{}"));
      persist({...raw,[taskId]:{sid:SESSION_ID,user:MY_NAME,ts:Date.now()}});
    }catch(e){}
  },[persist,pruneExpired]);

  // Release own lock on a task
  const release=useCallback(taskId=>{
    try{
      const raw=pruneExpired(JSON.parse(localStorage.getItem(LOCK_KEY)||"{}"));
      if(raw[taskId]?.sid===SESSION_ID){delete raw[taskId];persist(raw);}
    }catch(e){}
  },[persist,pruneExpired]);

  // Get lock info if ANOTHER user holds it, else null
  const getLock=useCallback(taskId=>{
    const l=locks[taskId];
    if(!l||l.sid===SESSION_ID||Date.now()-l.ts>=LOCK_TTL)return null;
    return l;
  },[locks]);

  return{acquire,forceAcquire,release,getLock};
}

function useToast(){
  const [list,setList]=useState([]);
  const add=useCallback((msg,type="ok",ms=3800)=>{
    const id=uid();
    setList(p=>[...p.slice(-4),{id,msg,type}]);
    setTimeout(()=>setList(p=>p.filter(t=>t.id!==id)),ms);
  },[]);
  return{list,add};
}

function Toasts({list}){
  const T={
    ok:{bg:"#f0fdf4",c:"#16a34a",bd:"#bbf7d0",ic:"✅"},
    warn:{bg:"#fffbeb",c:"#d97706",bd:"#fde68a",ic:"⚠️"},

    mention:{bg:"#eff6ff",c:"#1d4ed8",bd:"#bfdbfe",ic:"💬"},
  };
  return(
    <div style={{position:"fixed",bottom:80,right:16,zIndex:3000,display:"flex",flexDirection:"column",gap:8,pointerEvents:"none"}}>
      {list.map(t=>{const s=T[t.type]||T.ok;return(

function MentionAlertBanner({notifications,currentUserId,onRead,onNavigate}){
  const unreadMentions=(notifications||[]).filter(n=>
    n.toId===currentUserId && !n.read && (n.icon==="💬"||n.text?.includes("mencionou"))
  );
  if(unreadMentions.length===0) return null;
  return(
    <div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",zIndex:4000,display:"flex",flexDirection:"column",gap:6,maxWidth:420,width:"calc(100% - 32px)",pointerEvents:"auto"}}>
      {unreadMentions.slice(0,3).map(n=>(
        <div key={n.id} onClick={()=>{onRead(n.id);if(n.page)onNavigate(n.page);}}
          style={{padding:"11px 16px",borderRadius:12,background:"#1d4ed8",color:"#fff",boxShadow:"0 8px 32px rgba(29,78,216,.35)",display:"flex",alignItems:"center",gap:10,cursor:"pointer",animation:"toastIn .25s ease",border:"1px solid rgba(255,255,255,.2)"}}>
          <span style={{fontSize:20,flexShrink:0}}>💬</span>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:13,fontWeight:700,lineHeight:1.3}}>{n.text}</div>
            <div style={{fontSize:10,opacity:.75,marginTop:2}}>{new Date(n.createdAt).toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"})} · Clique para ver</div>
          </div>
          <button onClick={e=>{e.stopPropagation();onRead(n.id);}} style={{background:"rgba(255,255,255,.2)",border:"none",borderRadius:6,color:"#fff",cursor:"pointer",padding:"2px 8px",fontSize:12,fontWeight:700,flexShrink:0,fontFamily:"inherit"}}>×</button>
        </div>
      ))}

        <div style={{textAlign:"center",fontSize:11,color:"#1d4ed8",fontWeight:700,background:"#eff6ff",borderRadius:8,padding:"4px",border:"1px solid #bfdbfe"}}>

      )}
    </div>
  );
}

/* ===========================================
   QUICK COMPLETE BUTTON
   Circular check button shown on cards/rows
   to mark done/undone with 1 click outside modal */
function QCBtn({status,onClick,size=26,absolute=true}){
  const [hov,sh]=useState(false);
  // Ciclo: todo -> doing -> review -> done -> todo
  const CYCLE={todo:"doing",doing:"review",review:"done",done:"todo"};
  const COLORS={
    todo:  {border:"#d1d5db",bg:"#fff",    hover:"#eef2ff", icon:"",    title:"Avançar para Em Análise"},
    doing: {border:"#f59e0b",bg:"#fffbeb", hover:"#fef3c7", icon:"⏳",  title:"Avançar para Revisão"},
    review:{border:"#8b5cf6",bg:"#f5f3ff", hover:"#ede9fe", icon:"🔍",  title:"Avançar para Concluído"},
    done:  {border:"#22c55e",bg:"#22c55e", hover:"#16a34a", icon:"✓",   title:"Reabrir tarefa"},
  };
  const s=COLORS[status]||COLORS.todo;
  const isDone=status==="done";
  return(
    <button
      title={s.title}
      onClick={e=>{e.stopPropagation();onClick();}}
      onMouseEnter={()=>sh(true)}
      onMouseLeave={()=>sh(false)}
      style={{
        width:size,height:size,borderRadius:"50%",flexShrink:0,
        border:`2px solid ${hov?s.hover:s.border}`,
        background:hov?s.hover:s.bg,
        display:"flex",alignItems:"center",justifyContent:"center",
        cursor:"pointer",
        transition:"all .15s",
        position:absolute?"absolute":"relative",
        top:absolute?10:undefined,right:absolute?10:undefined,
        zIndex:absolute?2:undefined,
        color:isDone?"#fff":s.border,
        fontSize:size*0.55,fontWeight:900,
        boxShadow:isDone?"0 2px 8px rgba(34,197,94,.4)":"none",
      }}
    >{isDone?"✓":hov&&!isDone?"→":s.icon}</button>
  );
}

function toArr(v){
  if(Array.isArray(v)) return v;
  if(typeof v==="string"){try{const p=JSON.parse(v);return Array.isArray(p)?p:[];}catch(e){return[];}}
  return [];
}

function DepPicker({tasks,selfId,selected,onChange,blocked}){
  const [q,sq]=useState("");
  const [open,setOpen]=useState(false);
  const all=tasks.filter(t=>t.id!==selfId&&t.status!=="archived");
  const filtered=q.trim()?all.filter(t=>t.title.toLowerCase().includes(q.toLowerCase())):[];

  const toggle=(id)=>{
    if(blocked) return;
    onChange(selected.includes(id)?selected.filter(x=>x!==id):[...selected,id]);
  };
  return(
    <div>
      {selTasks.length>0&&(
        <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:8}}>

/* ===========================================
   FILTERS */
function applyFilters(tasks,f){
  return tasks.filter(t=>{
    if(f.search&&!t.title.toLowerCase().includes(f.search.toLowerCase()))return false;
    if(f.status&&t.status!==f.status)return false;
    if(f.priority&&t.priority!==f.priority)return false;
    if(f.company&&!taskHasCompany(t,f.company))return false;
    if(f.sector&&t.sector!==f.sector)return false;
    if(f.label&&!t.labels.includes(f.label))return false;
    if(f.assignee&&!t.assignees.includes(f.assignee))return false;
    if(f.month!=null&&f.month!==""&&t.dueDate){const d=new Date(t.dueDate+"T12:00:00");if(d.getMonth()!==+f.month)return false;}
    if(f.year&&t.dueDate){const d=new Date(t.dueDate+"T12:00:00");if(d.getFullYear()!==+f.year)return false;}
    return true;
  });
}

    const next=[...saved,{id:uid(),name:nameInput.trim(),filters}];

        <select style={ss} value={filters.sector||""} onChange={e=>sf("sector",e.target.value)}><option value="">Setor</option>{data.sectors.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</select>

        <select style={ss} value={filters.assignee||""} onChange={e=>sf("assignee",e.target.value)}><option value="">Responsável</option>{data.collaborators.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}</select>

          <select style={ss} value={filters.year||""} onChange={e=>sf("year",e.target.value?+e.target.value:"")}><option value="">Ano</option>{[2025,2026,2027].map(y=><option key={y} value={y}>{y}</option>)}</select>

/* ===========================================
   TASK CARD  - with ✓ Quick Complete button */
function TCard({task,data,onEdit,onDelete,onComplete,onArchive,onPointerDown,isDragging,ghost,onPomodoro,onPin,onMoveTop}){
  const cardRef=useRef(null);
  const assignees=data.collaborators.filter(c=>task.assignees.includes(c.id));
  const labels=data.labels.filter(l=>task.labels.includes(l.id));
  const rec=task.recurrence?data.recurrences.find(r=>r.id===task.recurrence):null;
  const DOW_NAMES=["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
  const DOW_COLORS=["#f59e0b","#6366f1","#14b8a6","#8b5cf6","#f97316","#22c55e","#ec4899"];
  const dowTag=(()=>{
    if(!task._recGroup||!task.dueDate) return null;
    const d=new Date(task.dueDate+"T12:00:00");
    const dow=d.getDay();
    const isToday=task.dueDate===todayStr();
    return {label:DOW_NAMES[dow],color:DOW_COLORS[dow],isToday};
  })();
  const sector=task.sector?data.sectors.find(s=>s.id===task.sector):null;
  const company=data.companies.find(c=>c.id===task.company);
  const ckDone=task.checklist.filter(c=>c.done).length;
  const ckTot=task.checklist.length;
  const prog=ckTot>0?Math.round((ckDone/ckTot)*100):null;
  const over=isLate(task);
  const done=task.status==="done";
  // SLA urgency: if slaHours set, check if creation + slaHours < now
  const slaUrgent=task.slaHours&&!done&&(()=>{
    const created=new Date(task.createdAt||"2000-01-01T00:00:00");
    const deadline=new Date(created.getTime()+Number(task.slaHours)*3600000);
    return deadline<new Date();
  })();
  const p=PRI[task.priority]||PRI.media;

  // Track pointer-down on handle to start drag; click anywhere else opens modal
  const dragTriggered=useRef(false);
  const handleHandlePointerDown=(e)=>{
    e.stopPropagation();
    dragTriggered.current=true;
    if(onPointerDown) onPointerDown(e,cardRef.current);
  };
  const handleCardClick=(e)=>{
    if(dragTriggered.current){dragTriggered.current=false;return;}
    if(e.target.closest("button")) return;
    if(onEdit) onEdit(task);
  };

  return(
    <div
      ref={cardRef}
      onClick={handleCardClick}
      style={{
        background:ghost?"#fff":done?"#f8fffe":task.pinned?"#fffbeb":"#fff",
        borderRadius:13,
        cursor:isDragging?"grabbing":"pointer",
        transition:"box-shadow .15s,transform .15s,opacity .15s",
        position:"relative",
        borderLeft:`3px solid ${done?"#22c55e":over?"#ef4444":task.pinned?"#f59e0b":p.d}`,
        boxShadow:task.pinned&&!isDragging?"0 2px 8px rgba(245,158,11,.25),0 0 0 1.5px #fcd34d":isDragging?"none":done?"0 1px 3px rgba(0,0,0,.05),0 0 0 1.5px #bbf7d0":"0 1px 3px rgba(0,0,0,.07),0 0 0 1px rgba(0,0,0,.05)",
        opacity:isDragging?.3:1,
        display:"flex",
        flexDirection:"row",
        overflow:"hidden",
        userSelect:"none",
      }}
      onMouseEnter={e=>{
        if(isDragging||ghost) return;
        e.currentTarget.style.boxShadow="0 8px 24px rgba(0,0,0,.1),0 0 0 1.5px rgba(99,102,241,.45)";
        e.currentTarget.style.transform="translateY(-2px)";
      }}
      onMouseLeave={e=>{
        e.currentTarget.style.boxShadow=done?"0 1px 3px rgba(0,0,0,.05),0 0 0 1.5px #bbf7d0":"0 1px 3px rgba(0,0,0,.07),0 0 0 1px rgba(0,0,0,.05)";
        e.currentTarget.style.transform="none";
      }}
    >
      {/* ── Drag handle strip ─────────────────── */}
      {!ghost&&onPointerDown&&(
        <div
          onPointerDown={handleHandlePointerDown}
          title="Arrastar card"
          style={{
            width:18,flexShrink:0,
            display:"flex",flexDirection:"column",
            alignItems:"center",justifyContent:"center",
            gap:3,padding:"0 2px",
            background:"transparent",
            cursor:"grab",
            borderRight:"1px solid #f1f5f9",
            transition:"background .15s",
          }}
          onMouseEnter={e=>e.currentTarget.style.background="#f1f5f9"}
          onMouseLeave={e=>e.currentTarget.style.background="transparent"}
        >
          {[0,1,2,3,4,5].map(i=>(
            <div key={i} style={{width:3,height:3,borderRadius:"50%",background:"#cbd5e1"}}/>
          ))}
        </div>
      )}

      {/* ── Card content ──────────────────────── */}
      <div style={{flex:1,padding:"12px 14px",minWidth:0}}>
        <QCBtn status={task.status} onClick={()=>onComplete&&onComplete(task)} size={26} absolute={true}/>

        {dowTag&&(
          <div style={{display:"inline-flex",alignItems:"center",gap:5,marginBottom:8,padding:"3px 10px 3px 8px",borderRadius:20,background:dowTag.isToday?"linear-gradient(90deg,#f59e0b,#d97706)":dowTag.color+"22",border:`1.5px solid ${dowTag.color}`,alignSelf:"flex-start"}}>
            <span style={{width:7,height:7,borderRadius:"50%",background:dowTag.color,flexShrink:0}}/>
            <span style={{fontSize:11,fontWeight:900,color:dowTag.isToday?"#fff":dowTag.color,letterSpacing:".04em"}}>{dowTag.label}</span>
            {dowTag.isToday&&<span style={{fontSize:10,color:"#fff",fontWeight:700,marginLeft:2}}>· hoje</span>}
          </div>
        )}
        {labels.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:8,paddingRight:36}}>{labels.map(l=><Chip key={l.id} label={l.name} color={l.color}/>)}</div>}

        <div style={{fontSize:13,fontWeight:800,color:done?"#94a3b8":"#0f172a",marginBottom:6,lineHeight:1.4,paddingRight:36,textDecoration:done?"line-through":"none",display:"flex",alignItems:"flex-start",gap:5}}>
          {task.pinned&&<span title="Fixada" style={{fontSize:12,color:"#f59e0b",flexShrink:0}}>📌</span>}
          {(task.recurrence||task._recGroup)&&<span title="Tarefa recorrente" style={{fontSize:13,color:"#6366f1",flexShrink:0}}>↻</span>}
          {task.title}
        </div>

        {task.description&&<p style={{fontSize:12,color:"#94a3b8",marginBottom:10,lineHeight:1.5}}>{task.description.length>70?task.description.slice(0,70)+"…":task.description}</p>}

        {company&&(
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8,padding:"5px 9px",borderRadius:8,background:company.color+"12",border:`1px solid ${company.color}30`}}>
            <span style={{fontSize:12,fontWeight:900,color:company.color}}>{company.logo}</span>
            <span style={{fontSize:12,fontWeight:800,color:company.color,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{company.name}</span>
            {sector&&<span style={{fontSize:10,fontWeight:700,padding:"1px 7px",borderRadius:10,background:sector.color+"22",color:sector.color,whiteSpace:"nowrap"}}>{sector.name}</span>}
          </div>
        )}

        {assignees.length>0&&(
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8,flexWrap:"wrap"}}>
            <span style={{fontSize:10,fontWeight:700,color:"#94a3b8",textTransform:"uppercase",letterSpacing:".05em"}}>Resp.</span>
            {assignees.slice(0,3).map(u=>(
              <div key={u.id} style={{display:"flex",alignItems:"center",gap:4,padding:"2px 8px 2px 3px",borderRadius:20,background:u.color+"15",border:`1.5px solid ${u.color}40`}}>
                <Av initials={u.initials} color={u.color} size={18}/>
                <span style={{fontSize:11,fontWeight:700,color:u.color,maxWidth:80,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u.name||u.initials||"?"}</span>
              </div>
            ))}
            {assignees.length>3&&<span style={{fontSize:11,color:"#94a3b8",fontWeight:700}}>+{assignees.length-3}</span>}
          </div>
        )}

        <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:8}}>
          <span style={{fontSize:11,padding:"2px 8px",borderRadius:20,fontWeight:700,background:p.bg,color:p.t}}><span style={{display:"inline-block",width:5,height:5,borderRadius:"50%",background:p.d,marginRight:4,verticalAlign:"middle"}}/>{p.l}</span>
          {task.dueDate&&<span style={{fontSize:11,color:over?"#ef4444":"#94a3b8",fontWeight:over?800:400}}>📅 {fmtDate(task.dueDate)}{task.dueTime?` ${task.dueTime}`:""}</span>}
          {slaUrgent&&<span style={{fontSize:10,padding:"2px 7px",borderRadius:20,background:"#fef3c7",color:"#b45309",fontWeight:800,animation:"pulse 1.5s infinite"}}>⏱ SLA</span>}
          {task.slaHours&&!slaUrgent&&!done&&<span style={{fontSize:10,color:"#f59e0b",fontWeight:700}}>⏱ {task.slaHours}h</span>}
          {toArr(task.assignees).length===0&&!done&&<span style={{fontSize:10,padding:"2px 7px",borderRadius:20,background:"#f1f5f9",color:"#94a3b8",fontWeight:700,border:"1px dashed #cbd5e1"}}>👤 Sem responsável</span>}
          {rec&&(()=>{
            // Find next occurrence: look for future tasks in same _recGroup
            const nextTask=task._recGroup
              ? data.tasks.filter(t=>t._recGroup===task._recGroup&&t.dueDate>task.dueDate&&t.status!=="done"&&t.status!=="archived").sort((a,b)=>a.dueDate.localeCompare(b.dueDate))[0]
              : null;
            return(
              <span style={{fontSize:11,color:"#14b8a6",fontWeight:700,display:"inline-flex",alignItems:"center",gap:4}}>
                ↻ {rec.name}
                {nextTask&&<span style={{fontSize:10,color:"#94a3b8",fontWeight:500}}>· próx: {fmtDate(nextTask.dueDate)}</span>}
              </span>
            );
          })()}
          {task.dependencies?.length>0&&<span style={{fontSize:11,color:"#f59e0b",fontWeight:700}}>⬡ {task.dependencies.length}</span>}
          {task._competencia&&<span style={{fontSize:11,padding:"2px 9px",borderRadius:20,background:"#f5f3ff",color:"#7c3aed",fontWeight:800,border:"1.5px solid #ddd6fe"}}>🏷 {task._competencia}</span>}
        </div>

        {prog!==null&&(
          <div style={{marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
              <span style={{fontSize:10,color:"#94a3b8"}}>Checklist</span>
              <span style={{fontSize:10,fontWeight:700,color:"#64748b"}}>{ckDone}/{ckTot}</span>
            </div>
            <div style={{height:4,borderRadius:3,background:"#f1f5f9",overflow:"hidden"}}>
              <div style={{width:`${prog}%`,height:"100%",background:prog===100?"#22c55e":"#6366f1",borderRadius:3,transition:"width .4s"}}/>
            </div>
          </div>
        )}

        {!ghost&&(
          <div style={{display:"flex",justifyContent:"flex-end",alignItems:"center",gap:4}}>
            {onMoveTop&&!task.pinned&&<button onClick={e=>{e.stopPropagation();onMoveTop(task.id);}} title="Mover para o topo da coluna" style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:"#e2e8f0",padding:"2px 4px",borderRadius:5,transition:"color .15s",fontWeight:900}} onMouseEnter={e=>e.currentTarget.style.color="#6366f1"} onMouseLeave={e=>e.currentTarget.style.color="#e2e8f0"}>⬆</button>}
            {onPin&&<button onClick={e=>{e.stopPropagation();onPin(task.id,!task.pinned);}} title={task.pinned?"Desafixar do topo":"Fixar no topo"} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:task.pinned?"#f59e0b":"#e2e8f0",padding:"2px 4px",borderRadius:5,transition:"color .15s"}} onMouseEnter={e=>e.currentTarget.style.color="#f59e0b"} onMouseLeave={e=>e.currentTarget.style.color=task.pinned?"#f59e0b":"#e2e8f0"}>📌</button>}
            {onArchive&&<button onClick={e=>{e.stopPropagation();onArchive(task.id);}} title="Arquivar" style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:"#e2e8f0",padding:"2px 4px",borderRadius:5,transition:"color .15s"}} onMouseEnter={e=>e.currentTarget.style.color="#f59e0b"} onMouseLeave={e=>e.currentTarget.style.color="#e2e8f0"}>📦</button>}
            {onPomodoro&&<button onClick={e=>{e.stopPropagation();onPomodoro(task);}} title="Iniciar Pomodoro" style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:"#e2e8f0",padding:"2px 4px",borderRadius:5,transition:"color .15s"}} onMouseEnter={e=>e.currentTarget.style.color="#ef4444"} onMouseLeave={e=>e.currentTarget.style.color="#e2e8f0"}>🍅</button>}
            {onDelete&&<button onClick={e=>{e.stopPropagation();onDelete(task.id);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:"#e2e8f0",padding:"2px 4px",borderRadius:5,transition:"color .15s"}} onMouseEnter={e=>e.currentTarget.style.color="#ef4444"} onMouseLeave={e=>e.currentTarget.style.color="#e2e8f0"}>🗑</button>}
          </div>
        )}
      </div>
    </div>
  );
}

/* ===========================================
   KANBAN VIEW - Drag & Drop com pointer events */
function QuickCreateBar({data,onAdd}){
  const [title,setTitle]=useState("");
  const [company,setCompany]=useState("");
  const [date,setDate]=useState("");
  const [show,setShow]=useState(false);
  const inp=useRef(null);
  const submit=()=>{
    if(!title.trim()) return;
    onAdd({title:title.trim(),company,dueDate:date,status:"todo",priority:"media"});
    setTitle("");setDate("");setShow(false);
  };
  if(!show) return(
    <button onClick={()=>{setShow(true);setTimeout(()=>inp.current?.focus(),50);}}
      style={{display:"flex",alignItems:"center",gap:7,padding:"8px 14px",borderRadius:10,border:"1.5px dashed #c7d2fe",background:"#eef2ff",cursor:"pointer",fontSize:12,fontWeight:700,color:"#6366f1",marginBottom:14,fontFamily:"inherit",transition:"all .15s"}}
      onMouseEnter={e=>e.currentTarget.style.background="#e0e7ff"}
      onMouseLeave={e=>e.currentTarget.style.background="#eef2ff"}
    >✦ Criar tarefa rápida</button>
  );
  return(
    <div style={{display:"flex",gap:8,marginBottom:14,padding:"10px 12px",background:"#eef2ff",borderRadius:12,border:"1.5px solid #c7d2fe",flexWrap:"wrap",alignItems:"center"}}>
      <input ref={inp} value={title} onChange={e=>setTitle(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} placeholder="Título da tarefa... (Enter para criar)" style={{flex:"1 1 180px",padding:"7px 11px",borderRadius:8,border:"2px solid #c7d2fe",outline:"none",fontSize:13,fontFamily:"inherit",background:"#fff"}}/>
      <select value={company} onChange={e=>setCompany(e.target.value)} style={{padding:"7px 10px",borderRadius:8,border:"2px solid #c7d2fe",fontSize:12,fontFamily:"inherit",background:"#fff",color:company?"#0f172a":"#94a3b8"}}>
        <option value="">Empresa...</option>
        {data.companies.map(co=><option key={co.id} value={co.id}>{co.name}</option>)}
      </select>
      <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{padding:"7px 10px",borderRadius:8,border:"2px solid #c7d2fe",fontSize:12,fontFamily:"inherit",background:"#fff"}}/>
      <Btn onClick={submit} disabled={!title.trim()} sz="sm">✦ Criar</Btn>
      <button onClick={()=>setShow(false)} style={{background:"none",border:"none",cursor:"pointer",color:"#94a3b8",fontSize:18,padding:"0 4px"}}>✕</button>
    </div>
  );
}

function KanbanView({data,onEdit,onDelete,onAdd,onComplete,onStatusChange,myCollabId,myCollab,onArchive,onPomodoro,onPin,onMoveTop}){
  const [kanbanFilter,setKanbanFilter]=useState("week");
  const [ownerFilter,setOwnerFilter]=useState("all");
  const [collabFilter,setCollabFilter]=useState(""); // NEW: filter by specific collaborator
  const [dragging,setDragging]=useState(null);   // {task, x, y, offX, offY}
  const [dragOver,setDragOver]=useState(null);   // colId
  const ghostRef=useRef(null);
  const colRefs=useRef({});
  const today=todayStr();

  const mySectors=myCollab
    ? (toArr(myCollab.sectors).length>0?toArr(myCollab.sectors):(myCollab.sector?[myCollab.sector]:[]))
    : [];

  const btnStyle=(active,color="#6366f1")=>({
    padding:"4px 13px",borderRadius:20,
    border:"1.5px solid "+(active?color:"#e2e8f0"),
    background:active?color:"var(--bg3)",
    color:active?"#fff":"#64748b",
    fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit",transition:"all .15s"
  });

  // ── Pointer-based drag ──────────────────────────────────────────
  const startDrag=(e,task,cardEl)=>{
    if(e.button!==0) return;
    e.preventDefault();
    const rect=cardEl.getBoundingClientRect();
    const offX=e.clientX-rect.left;
    const offY=e.clientY-rect.top;
    const width=rect.width;
    const height=rect.height;
    setDragging({task,x:e.clientX-offX,y:e.clientY-offY,offX,offY,width,height,cardEl});
    document.body.style.userSelect="none";
    document.body.style.cursor="grabbing";
  };

  useEffect(()=>{
    if(!dragging) return;
    const onMove=(e)=>{
      const nx=e.clientX-dragging.offX;
      const ny=e.clientY-dragging.offY;
      setDragging(d=>({...d,x:nx,y:ny}));
      // Hit-test columns
      let hit=null;
      Object.entries(colRefs.current).forEach(([colId,el])=>{
        if(!el) return;
        const r=el.getBoundingClientRect();
        if(e.clientX>=r.left&&e.clientX<=r.right&&e.clientY>=r.top&&e.clientY<=r.bottom) hit=colId;
      });
      setDragOver(hit);
    };
    const onUp=()=>{
      if(dragOver&&dragging.task.status!==dragOver) onStatusChange(dragging.task.id,dragOver);
      setDragging(null);setDragOver(null);
      document.body.style.userSelect="";
      document.body.style.cursor="";
    };
    window.addEventListener("pointermove",onMove);
    window.addEventListener("pointerup",onUp);
    return()=>{window.removeEventListener("pointermove",onMove);window.removeEventListener("pointerup",onUp);};
  },[dragging,dragOver,onStatusChange]);

  return(
    <div style={{position:"relative"}}>
      {/* ── Cabeçalho fixo do Kanban ─────────────────────────── */}
      <div className="kanban-sticky-header" style={{
        position:"sticky",top:"var(--topbar-h,86px)",zIndex:50,
        margin:"-12px -28px 10px",padding:"10px 28px 10px",
        background:"var(--bg)",
        borderBottom:"1px solid var(--border)",
        backdropFilter:"blur(12px)",
      }}>
        <QuickCreateBar data={data} onAdd={onAdd}/>
        {/* Filtro de período */}
        <div style={{display:"flex",gap:5,marginBottom:6,alignItems:"center",flexWrap:"wrap"}}>
          <span style={{fontSize:12,fontWeight:700,color:"#64748b",marginRight:2}}>📅 Período:</span>
          {[["week","Esta semana"],["today","🟡 Hoje"],["overdue","🔴 Vencidas"],["all","☰ Todas"]].map(([v,l])=>(
            <button key={v} style={btnStyle(kanbanFilter===v)} onClick={()=>setKanbanFilter(v)}>{l}</button>
          ))}
        </div>
        <div style={{display:"flex",gap:5,alignItems:"center",flexWrap:"wrap"}}>
          <span style={{fontSize:12,fontWeight:700,color:"#64748b",marginRight:2}}>👤 Ver:</span>
          <button style={btnStyle(ownerFilter==="all","#64748b")} onClick={()=>{setOwnerFilter("all");setCollabFilter("");}}>Todas as tarefas</button>
          {myCollabId&&<button style={btnStyle(ownerFilter==="mine","#8b5cf6")} onClick={()=>{setOwnerFilter("mine");setCollabFilter("");}}>⭐ Minhas</button>}
          {mySectors.length>0&&<button style={btnStyle(ownerFilter==="sector","#14b8a6")} onClick={()=>{setOwnerFilter("sector");setCollabFilter("");}}>🏢 Meu setor</button>}
          <button style={btnStyle(ownerFilter==="unassigned","#94a3b8")} onClick={()=>{setOwnerFilter("unassigned");setCollabFilter("");}}>👤 Sem responsável</button>
          <span style={{fontSize:11,color:"#94a3b8",marginLeft:"auto"}}>⠿ Segure e arraste o card para mover</span>
        </div>
        {/* Filtro por colaborador específico */}
        <div style={{display:"flex",gap:5,alignItems:"center",flexWrap:"wrap",marginTop:6}}>
          <span style={{fontSize:12,fontWeight:700,color:"#64748b",marginRight:2}}>🔍 Colaborador:</span>
          <button style={btnStyle(collabFilter==="","#6366f1")} onClick={()=>setCollabFilter("")}>Todos</button>
          {data.collaborators.map(u=>(
            <button key={u.id} style={{...btnStyle(collabFilter===u.id,u.color),display:"flex",alignItems:"center",gap:4}}
              onClick={()=>{setCollabFilter(collabFilter===u.id?"":u.id);setOwnerFilter("all");}}>
              <span style={{width:16,height:16,borderRadius:"50%",background:u.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,color:"#fff",fontWeight:900,flexShrink:0}}>{u.initials||u.name.slice(0,1)}</span>
              {u.name}
            </button>
          ))}
        </div>
      </div>

      <div className="kanban-wrap" style={{display:"flex",gap:14,overflowX:"auto",paddingBottom:20,paddingLeft:28,paddingRight:28,margin:"0 -28px",alignItems:"flex-start"}}>
        {getFullSTS(data.customStatuses).filter(st=>st.id!=="archived").map(st=>{
          const now=new Date();
          const wkStart=new Date(now);wkStart.setDate(now.getDate()-now.getDay());wkStart.setHours(0,0,0,0);
          const wkEnd=new Date(wkStart);wkEnd.setDate(wkStart.getDate()+6);wkEnd.setHours(23,59,59,999);
          const tasks=data.tasks.filter(t=>{
            if(t.status!==st.id||t.status==="archived") return false;
            if(collabFilter){if(!toArr(t.assignees).includes(collabFilter)) return false;}
            else if(ownerFilter==="mine"){if(!myCollabId||!toArr(t.assignees).includes(myCollabId)) return false;}
            else if(ownerFilter==="unassigned"){if(toArr(t.assignees).length>0) return false;}
            else if(ownerFilter==="sector"){
              const inSector=mySectors.length>0&&mySectors.includes(t.sector);
              const isMine=myCollabId&&toArr(t.assignees).includes(myCollabId);
              if(!inSector&&!isMine) return false;
            }
            if(kanbanFilter==="all") return true;
            if(!t.dueDate) return kanbanFilter==="week";
            const due=new Date(t.dueDate+"T12:00:00");
            const isOverdue=due<now&&t.dueDate!==today;
            const isDueToday=t.dueDate===today;
            if(kanbanFilter==="overdue") return isOverdue;
            if(kanbanFilter==="today") return isDueToday;
            return isOverdue||isDueToday||(due>=wkStart&&due<=wkEnd);
          });
          tasks.sort((a,b)=>{
            if(a.pinned&&!b.pinned) return -1;
            if(!a.pinned&&b.pinned) return 1;
            return (a.dueDate||"").localeCompare(b.dueDate||"");
          });
          const isDropTarget=dragOver===st.id;
          return(
            <div key={st.id} className="kanban-col" style={{flexShrink:0,width:268}}
              ref={el=>colRefs.current[st.id]=el}
            >
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 12px",borderRadius:10,
                background:isDropTarget?st.c+"28":st.bg,
                border:`1.5px solid ${isDropTarget?st.c:st.c+"33"}`,
                marginBottom:10,transition:"all .2s",
                boxShadow:isDropTarget?`0 0 0 3px ${st.c}44`:"none",
              }}>
                <div style={{display:"flex",alignItems:"center",gap:7}}>
                  <span style={{width:9,height:9,borderRadius:"50%",background:st.c,display:"inline-block"}}/>
                  <span style={{fontSize:12,fontWeight:800,color:st.c}}>{st.l}</span>
                  <span style={{fontSize:11,fontWeight:800,color:st.c,background:st.c+"28",borderRadius:10,padding:"1px 7px"}}>{tasks.length}</span>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  {(()=>{
                    const ckTot=tasks.reduce((s,t)=>s+toArr(t.checklist).length,0);
                    const ckDone=tasks.reduce((s,t)=>s+toArr(t.checklist).filter(c=>c.done).length,0);
                    const pct=ckTot>0?Math.round(ckDone/ckTot*100):null;
                    return pct!==null&&(
                      <div style={{display:"flex",alignItems:"center",gap:4}}>
                        <div style={{width:40,height:4,borderRadius:4,background:st.c+"28",overflow:"hidden"}}>
                          <div style={{width:pct+"%",height:"100%",background:st.c,borderRadius:4,transition:"width .3s"}}/>
                        </div>
                        <span style={{fontSize:9,fontWeight:800,color:st.c}}>{pct}%</span>
                      </div>
                    );
                  })()}
                  <button onClick={()=>onAdd(st.id)} style={{background:st.c+"20",border:"none",borderRadius:7,width:24,height:24,cursor:"pointer",color:st.c,fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                </div>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:8,minHeight:80,
                padding:isDropTarget?"6px":"2px",
                borderRadius:12,
                border:isDropTarget?`2px dashed ${st.c}`:"2px dashed transparent",
                background:isDropTarget?st.c+"08":"transparent",
                transition:"all .2s",
              }}>
                {tasks.map(t=>(
                  <TCard key={t.id} task={t} data={data}
                    isDragging={dragging?.task?.id===t.id}
                    onPointerDown={(e,el)=>startDrag(e,t,el)}
                    onEdit={onEdit} onDelete={onDelete}
                    onComplete={onComplete} onArchive={onArchive}
                    onPomodoro={onPomodoro}
                    onPin={(id,val)=>onPin&&onPin(id,val)}
                    onMoveTop={(id)=>onMoveTop&&onMoveTop(id,st.id)}
                  />
                ))}
                {tasks.length===0&&(
                  <div style={{padding:18,textAlign:"center",fontSize:12,color:isDropTarget?st.c:"#cbd5e1",
                    fontWeight:isDropTarget?700:400,
                    border:`2px dashed ${isDropTarget?st.c:"var(--border)"}`,
                    borderRadius:10,transition:"all .2s",
                  }}>
                    {isDropTarget?"Soltar aqui →":ownerFilter==="mine"?"Nenhuma tarefa sua":ownerFilter==="unassigned"?"Nenhuma sem responsável":ownerFilter==="sector"?"Nenhuma do setor":"Sem tarefas"}
                  </div>
                )}
                {isDropTarget&&tasks.length>0&&(
                  <div style={{padding:10,textAlign:"center",fontSize:12,color:st.c,fontWeight:700,borderRadius:10,border:`2px dashed ${st.c}`,background:st.c+"10"}}>
                    Soltar aqui →
                  </div>
                )}
              </div>
            </div>
          );
        })}
      </div>

      {/* Ghost card que segue o cursor */}
      {dragging&&(
        <div ref={ghostRef} style={{
          position:"fixed",
          left:dragging.x,top:dragging.y,
          width:dragging.width,
          pointerEvents:"none",
          zIndex:9999,
          opacity:.88,

        }}>
          <TCard task={dragging.task} data={data} isDragging={false}

}

function ListView({data,onEdit,onDelete,onComplete,onBulkUpdate}){
  const [fl,sfl]=useState({});

  const groupOptions=[["none","Sem agrupamento"],["company","Empresa"],["sector","Setor"],["priority","Prioridade"],["status","Status"]];

  const grouped=useMemo(()=>{
    if(groupBy==="none") return [["",tasks]];
    const map=new Map();
    tasks.forEach(t=>{
      let key="";
      if(groupBy==="company"){const co=taskCompanies(t)[0];key=co||"_none";}
      else if(groupBy==="sector") key=t.sector||"_none";
      else if(groupBy==="priority") key=t.priority||"media";
      else if(groupBy==="status") key=t.status||"todo";
      if(!map.has(key)) map.set(key,[]);
      map.get(key).push(t);
    });
    return [...map.entries()];
  },[tasks,groupBy]);

  const groupLabel=(key)=>{
    if(!key||key==="_none") return "Sem grupo";
    if(groupBy==="company") return data.companies.find(c=>c.id===key)?.name||key;
    if(groupBy==="sector") return data.sectors.find(s=>s.id===key)?.name||key;
    if(groupBy==="priority") return PRI[key]?.l||key;
    if(groupBy==="status") return STS.find(s=>s.id===key)?.l||key;

    if(groupBy==="company") return data.companies.find(c=>c.id===key)?.color||"#6366f1";
    if(groupBy==="sector") return data.sectors.find(s=>s.id===key)?.color||"#6366f1";
    if(groupBy==="priority") return PRI[key]?.d||"#6366f1";

/* ===========================================
   GANTT VIEW */
function GanttView({data,onEdit}){
  const [groupBy,setGroupBy]=useState("company"); // company | assignee | sector
  const [weeks,setWeeks]=useState(8);
  const today=todayStr();

  // Build weeks array starting from current week Monday
  const ganttDays=useMemo(()=>{
    const days=[];
    const d=new Date();
    d.setDate(d.getDate()-d.getDay()+1); // Monday
    for(let i=0;i<weeks*7;i++){
      days.push(new Date(d));
      d.setDate(d.getDate()+1);
    }
    return days;
  },[weeks]);

  const startDate=ganttDays[0];
  const endDate=ganttDays[ganttDays.length-1];
  const totalDays=ganttDays.length;

  // Only tasks with dueDate in range
  const tasks=useMemo(()=>data.tasks.filter(t=>
    t.status!=="archived"&&t.dueDate&&
    t.dueDate>=startDate.toISOString().slice(0,10)&&
    t.dueDate<=endDate.toISOString().slice(0,10)
  ),[data.tasks,startDate,endDate]);

  // Group
  const groups=useMemo(()=>{
    if(groupBy==="company"){
      return data.companies.map(c=>({
        id:c.id,label:`${c.logo} ${c.name}`,color:c.color,
        tasks:tasks.filter(t=>taskHasCompany(t,c.id))
      })).filter(g=>g.tasks.length>0);
    }
    if(groupBy==="assignee"){
      const unassigned=tasks.filter(t=>!t.assignees||t.assignees.length===0);
      const gs=data.collaborators.map(u=>({
        id:u.id,label:`${u.initials} ${u.name}`,color:u.color,
        tasks:tasks.filter(t=>toArr(t.assignees).includes(u.id))
      })).filter(g=>g.tasks.length>0);
      if(unassigned.length>0) gs.push({id:"none",label:"Sem responsável",color:"#94a3b8",tasks:unassigned});
      return gs;
    }
    if(groupBy==="sector"){
      return data.sectors.map(s=>({
        id:s.id,label:s.name,color:s.color||"#6366f1",
        tasks:tasks.filter(t=>t.sector===s.id)
      })).filter(g=>g.tasks.length>0);
    }
    return [{id:"all",label:"Todas",color:"#6366f1",tasks}];
  },[tasks,groupBy,data]);

  const dayW=34; // px per day
  const rowH=34;

  const dayOffset=(dateStr)=>{
    const d=new Date(dateStr+"T12:00:00");
    const diff=Math.floor((d-startDate)/(1000*60*60*24));
    return Math.max(0,Math.min(diff,totalDays-1));
  };

  // Week headers
  const weekHeaders=[];
  for(let i=0;i<ganttDays.length;i+=7){
    const d=ganttDays[i];
    weekHeaders.push({label:`${d.getDate()}/${d.getMonth()+1}`,offset:i});
  }

  const todayOffset=dayOffset(today);
  const labelW=180;

  return(
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:10}}>
        <h2 style={{fontSize:18,fontWeight:900,color:"var(--text)",margin:0}}>🗓 Linha do Tempo (Gantt)</h2>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <span style={{fontSize:12,fontWeight:700,color:"#64748b"}}>Agrupar por:</span>
          {[["company","Empresa"],["assignee","Responsável"],["sector","Setor"]].map(([v,l])=>(
            <button key={v} onClick={()=>setGroupBy(v)} style={{padding:"4px 12px",borderRadius:20,border:`1.5px solid ${groupBy===v?"#6366f1":"#e2e8f0"}`,background:groupBy===v?"#6366f1":"var(--bg3)",color:groupBy===v?"#fff":"#64748b",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{l}</button>
          ))}
          <span style={{fontSize:12,fontWeight:700,color:"#64748b",marginLeft:8}}>Semanas:</span>
          {[4,8,12].map(w=>(
            <button key={w} onClick={()=>setWeeks(w)} style={{padding:"4px 10px",borderRadius:20,border:`1.5px solid ${weeks===w?"#6366f1":"#e2e8f0"}`,background:weeks===w?"#6366f1":"var(--bg3)",color:weeks===w?"#fff":"#64748b",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{w}</button>
          ))}
        </div>
      </div>

      {tasks.length===0&&(
        <div style={{textAlign:"center",padding:"60px 20px",color:"#94a3b8",fontSize:14}}>
          <div style={{fontSize:40,marginBottom:12}}>🗓</div>
          Nenhuma tarefa com prazo nas próximas {weeks} semanas.
        </div>
      )}

      {tasks.length>0&&(
        <div style={{overflowX:"auto",borderRadius:14,border:"1px solid var(--border)",background:"var(--bg2)",boxShadow:"0 1px 4px rgba(0,0,0,.05)"}}>
          {/* Header */}
          <div style={{display:"flex",borderBottom:"2px solid var(--border)",position:"sticky",top:0,background:"var(--bg2)",zIndex:10}}>
            <div style={{width:labelW,minWidth:labelW,padding:"10px 16px",fontSize:12,fontWeight:800,color:"#64748b",borderRight:"1px solid var(--border)",flexShrink:0}}>Tarefa</div>
            <div style={{display:"flex",position:"relative",overflow:"hidden",minWidth:totalDays*dayW}}>
              {weekHeaders.map(({label,offset})=>(
                <div key={offset} style={{position:"absolute",left:offset*dayW,top:0,width:7*dayW,height:"100%",borderRight:"1px solid #f1f5f9",display:"flex",alignItems:"center",padding:"0 6px",fontSize:11,fontWeight:700,color:"#94a3b8"}}>{label}</div>
              ))}
              {/* Today line in header */}
              {todayOffset>=0&&todayOffset<totalDays&&(
                <div style={{position:"absolute",left:todayOffset*dayW+dayW/2,top:0,bottom:0,width:2,background:"#ef4444",opacity:.5,borderRadius:1}}/>
              )}
              <div style={{height:36,minWidth:totalDays*dayW}}/>
            </div>
          </div>

          {/* Rows */}
          {groups.map(g=>(
            <div key={g.id}>
              {/* Group header */}
              <div style={{display:"flex",background:g.color+"12",borderBottom:"1px solid var(--border)"}}>
                <div style={{width:labelW,minWidth:labelW,padding:"6px 16px",fontSize:12,fontWeight:800,color:g.color,borderRight:"1px solid var(--border)",flexShrink:0}}>{g.label}</div>
                <div style={{minWidth:totalDays*dayW,position:"relative"}}>
                  {/* day stripes */}
                  {ganttDays.map((d,i)=>d.toISOString().slice(0,10)===today&&(
                    <div key={i} style={{position:"absolute",left:i*dayW,top:0,bottom:0,width:dayW,background:"rgba(239,68,68,.06)"}}/>
                  ))}
                  {todayOffset>=0&&todayOffset<totalDays&&<div style={{position:"absolute",left:todayOffset*dayW+dayW/2,top:0,bottom:0,width:2,background:"#ef4444",opacity:.4}}/>}
                </div>
              </div>
              {/* Task rows */}
              {g.tasks.map(t=>{
                const p=PRI[t.priority]||PRI.media;
                const done=t.status==="done";
                const over=isLate(t);
                const barColor=done?"#22c55e":over?"#ef4444":p.d;
                // Bar spans from createdAt to dueDate
                const startOff=t.createdAt?Math.max(0,dayOffset(t.createdAt)):dayOffset(t.dueDate);
                const endOff=dayOffset(t.dueDate);
                const barLeft=Math.min(startOff,endOff)*dayW;
                const barW=Math.max(dayW,(Math.abs(endOff-startOff)+1)*dayW);
                return(
                  <div key={t.id} style={{display:"flex",borderBottom:"1px solid #f8fafc",cursor:"pointer"}}
                    onMouseEnter={e=>e.currentTarget.style.background="var(--bg3)"}
                    onMouseLeave={e=>e.currentTarget.style.background="transparent"}
                    onClick={()=>onEdit(t)}
                  >
                    <div style={{width:labelW,minWidth:labelW,padding:"7px 16px",borderRight:"1px solid var(--border)",flexShrink:0,display:"flex",alignItems:"center",gap:6,overflow:"hidden"}}>
                      {t.pinned&&<span style={{fontSize:10,color:"#f59e0b",flexShrink:0}}>📌</span>}
                      <span style={{fontSize:11,fontWeight:700,color:done?"#94a3b8":over?"#ef4444":"#0f172a",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",textDecoration:done?"line-through":"none"}}>{t.title}</span>
                    </div>
                    <div style={{position:"relative",minWidth:totalDays*dayW,height:rowH,flexShrink:0}}>
                      {/* Today stripe */}
                      {ganttDays.map((d,i)=>d.toISOString().slice(0,10)===today&&(
                        <div key={i} style={{position:"absolute",left:i*dayW,top:0,bottom:0,width:dayW,background:"rgba(239,68,68,.06)"}}/>
                      ))}
                      {/* Today line */}
                      {todayOffset>=0&&todayOffset<totalDays&&<div style={{position:"absolute",left:todayOffset*dayW+dayW/2,top:0,bottom:0,width:2,background:"#ef4444",opacity:.4,zIndex:2}}/>}
                      {/* Bar */}
                      <div title={`${t.title} — vence ${fmtDate(t.dueDate)}`} style={{position:"absolute",left:barLeft,top:7,height:20,width:barW,borderRadius:6,background:barColor,opacity:done?.6:1,display:"flex",alignItems:"center",paddingLeft:6,overflow:"hidden",zIndex:3,boxShadow:`0 1px 3px ${barColor}44`}}>
                        <span style={{fontSize:10,fontWeight:700,color:"#fff",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{t.title}</span>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ===========================================
   CALENDAR VIEW */
function CalView({data,onEdit,onReschedule}){
  const now=new Date();
  const [m,sm]=useState(now.getMonth());
  const [y,sy]=useState(now.getFullYear());
  const [dragTask,setDragTask]=useState(null);
  const [dragOver,setDragOver]=useState(null);
  const wD=["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
  const dim=new Date(y,m+1,0).getDate(),fd=new Date(y,m,1).getDay();
  const tbd=useMemo(()=>{
    const mp={};
    const dim2=new Date(y,m+1,0).getDate();
    data.tasks.filter(t=>t.status!=="archived").forEach(t=>{
      if(!t.recurrence){
        if(!t.dueDate)return;
        const d=new Date(t.dueDate+"T12:00:00");
        if(d.getMonth()===m&&d.getFullYear()===y){const day=d.getDate();mp[day]=[...(mp[day]||[]),t];}
        return;
      }
      const rec=data.recurrences.find(r=>r.id===t.recurrence);
      if(!rec)return;
      for(let day=1;day<=dim2;day++){
        const dt=new Date(y,m,day);
        const dow=dt.getDay();
        let show=false;
        if(rec.interval==="daily") show=true;
        else if(rec.interval==="custom_days"&&Array.isArray(rec.days)) show=rec.days.includes(dow);
        else if(rec.interval==="weekly"&&t.dueDate){const sd=new Date(t.dueDate+"T12:00:00");show=dow===sd.getDay();}
        else if(rec.interval==="biweekly"&&t.dueDate){const sd=new Date(t.dueDate+"T12:00:00");const diff=Math.round((dt-sd)/86400000);show=dow===sd.getDay()&&diff>=0&&diff%14===0;}
        else if(rec.interval==="monthly"&&t.dueDate){const sd=new Date(t.dueDate+"T12:00:00");show=day===sd.getDate();}
        else if(rec.interval==="yearly"&&t.dueDate){const sd=new Date(t.dueDate+"T12:00:00");show=day===sd.getDate()&&m===sd.getMonth();}
        if(show) mp[day]=[...(mp[day]||[]),{...t,_recurring:true}];
      }
    });
    return mp;
  },[data.tasks,data.recurrences,m,y]);
  const cells=[];for(let i=0;i<fd;i++)cells.push(null);for(let i=1;i<=dim;i++)cells.push(i);
  const prev=()=>{if(m===0){sm(11);sy(y-1);}else sm(m-1);};
  const next=()=>{if(m===11){sm(0);sy(y+1);}else sm(m+1);};
  return(
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18}}>
        <button onClick={prev} style={{background:"#f1f5f9",border:"none",borderRadius:9,width:38,height:38,cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
        <h3 style={{fontSize:17,fontWeight:800,color:"#0f172a"}}>{MN[m]} {y}</h3>
        <button onClick={next} style={{background:"#f1f5f9",border:"none",borderRadius:9,width:38,height:38,cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:4}}>
        {wD.map(d=><div key={d} style={{textAlign:"center",fontSize:10,fontWeight:800,color:"#94a3b8",padding:"4px 0"}}>{d}</div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
        {cells.map((day,i)=>{
          if(!day)return<div key={`e${i}`}/>;
          const isT=day===now.getDate()&&m===now.getMonth()&&y===now.getFullYear();
          const tasks=tbd[day]||[];
          return(
            <div key={day}
              onDragOver={e=>{e.preventDefault();setDragOver(day);}}
              onDragLeave={()=>setDragOver(null)}
              onDrop={e=>{
                e.preventDefault();setDragOver(null);
                if(!dragTask||dragTask._recurring) return;
                const newDate=`${y}-${String(m+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
                if(onReschedule) onReschedule(dragTask.id,newDate);
                setDragTask(null);
              }}
              style={{minHeight:78,padding:5,borderRadius:9,
                background:dragOver===day?"#eef2ff":isT?"#f0f4ff":"#fafafa",
                border:`1.5px solid ${dragOver===day?"#6366f1":isT?"#6366f1":"#f1f5f9"}`,
                transition:"background .1s,border .1s"
              }}>
              <div style={{fontSize:11,fontWeight:800,width:22,height:22,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:"50%",background:isT?"#6366f1":"transparent",color:isT?"#fff":"#374151",marginBottom:3}}>{day}</div>
              {tasks.slice(0,3).map(t=>{
                const st=STS.find(s=>s.id===t.status)||STS[0];
                const co=(taskCompanies(t).map(id=>data.companies.find(x=>x.id===id)).filter(Boolean))[0]||null;
                const taskCos=taskCompanies(t).map(id=>data.companies.find(x=>x.id===id)).filter(Boolean);
                const asg=data.collaborators.filter(x=>t.assignees.includes(x.id)).slice(0,2);
                const lbs=data.labels.filter(x=>t.labels.includes(x.id)).slice(0,2);
                const over=isLate(t);
                return(
                  <div key={t.id}
                    draggable={!t._recurring}
                    onDragStart={e=>{setDragTask(t);e.dataTransfer.effectAllowed="move";}}
                    onDragEnd={()=>setDragTask(null)}
                    onClick={()=>onEdit(t)}
                    style={{marginBottom:3,borderRadius:6,border:"1.5px solid "+st.c+"33",background:"var(--bg2)",cursor:t._recurring?"pointer":"grab",overflow:"hidden",opacity:dragTask?.id===t.id?.45:1,outline:over?"1.5px solid #ef444488":"none"}}>
                    <div style={{background:st.c,height:2}}/>
                    <div style={{padding:"2px 4px"}}>
                      <div style={{fontSize:9,fontWeight:800,color:over?"#ef4444":"#0f172a",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.title}</div>
                      {taskCos.length>0&&<div style={{display:"flex",gap:2,flexWrap:"wrap"}}>
                    {taskCos.slice(0,3).map(cx=><span key={cx.id} style={{fontSize:8,color:cx.color,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{cx.logo||cx.name.slice(0,2)}</span>)}
                    {taskCos.length>3&&<span style={{fontSize:8,color:"#94a3b8"}}>+{taskCos.length-3}</span>}
                  </div>}
                      {asg.length>0&&<div style={{display:"flex",gap:2,marginTop:1}}>{asg.map(u=><span key={u.id} style={{fontSize:7,fontWeight:700,padding:"1px 4px",borderRadius:4,background:u.color+"22",color:u.color}}>{u.initials||u.name.slice(0,2)}</span>)}</div>}
                      {lbs.length>0&&<div style={{display:"flex",gap:2,marginTop:1,flexWrap:"wrap"}}>{lbs.map(l=><span key={l.id} style={{fontSize:7,fontWeight:700,padding:"1px 4px",borderRadius:4,background:l.color+"22",color:l.color}}>{l.name}</span>)}</div>}
                    </div>
                  </div>
                );
              })}
              {tasks.length>2&&<div style={{fontSize:9,color:"#94a3b8"}}>+{tasks.length-2}</div>}
            </div>
          );
        })}
      </div>
    </div>
  );
}
